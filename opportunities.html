   ============================================================================ */
function plOpenDataModal() {
  const body =
    '<div style="display:flex;flex-direction:column;gap:10px">' +
    '<button class="btn ghost" style="width:100%;justify-content:flex-start" onclick="plBackupJSON()">\u{1F4E6} ' + t('backupJSON') + '</button>' +
    '<button class="btn ghost" style="width:100%;justify-content:flex-start" onclick="document.getElementById(\'pl-import-file\').click()">\u{1F4E5} ' + t('importData') + '</button>' +
    '<input type="file" id="pl-import-file" accept=".json,application/json" style="display:none" onchange="plImportData(event)">' +
    '<button class="btn ghost" style="width:100%;justify-content:flex-start;border-color:rgba(176,69,64,0.4);color:var(--red)" onclick="plClearConfirm()">\u{1F5D1}\uFE0F ' + t('clearAll') + '</button>' +
    '</div>' +
    '<p style="font-size:11.5px;color:var(--ink-faint);margin-top:14px;line-height:1.5">' + t('dataHint') + '</p>';
  openModal(t('dataTitle'), body, '<button class="btn ghost" onclick="closeModal()">' + t('cancel') + '</button>');
}

function plBackupJSON() {
  const payload = {
    type: 'opportunities-backup', version: 1, exportedAt: nowISO(),
    leads: state.leads, products: state.products,
    settings: { probConfig: getProbConfig(), scoreConfig: getScoreConfig() }
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'opportunities_backup_' + todayDate() + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(t('toastBackup'));
}

function plImportData(ev) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function () {
    let data;
    try { data = JSON.parse(reader.result); } catch (e) { toast(t('importError'), true); ev.target.value = ''; return; }
    let leads = [], products = [], settings = null;
    if (Array.isArray(data)) { leads = data; }
    else if (data && typeof data === 'object') {
      leads = Array.isArray(data.leads) ? data.leads : [];
      products = Array.isArray(data.products) ? data.products : [];
      settings = data.settings || null;
    }
    if (!leads.length && !products.length) { toast(t('importError'), true); ev.target.value = ''; return; }
    if (!confirm(t('importConfirm'))) { ev.target.value = ''; return; }

    state.leads = leads;
    if (products.length) state.products = products;
    if (settings) {
      try {
        if (settings.probConfig) localStorage.setItem(PROB_CONFIG_KEY, JSON.stringify(settings.probConfig));
        if (settings.scoreConfig) { localStorage.setItem(SCORE_CONFIG_KEY, JSON.stringify(settings.scoreConfig)); _scoreCfg = null; }
      } catch (e) {}
    }
    cacheLocal(); render(); closeModal();
    toast(t('toastImported'));

    if (supabaseClient) {
      try {
        if (state.leads.length) await supabaseClient.from('leads').upsert(state.leads.map(l => ({ id: l.id, data: l })), { onConflict: 'id' });
        if (products.length) await supabaseClient.from('products').upsert(state.products.map(p => ({ id: p.id, data: p })), { onConflict: 'id' });
      } catch (e) { console.error('Import push failed:', e); toast(t('toastError'), true); }
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
}

function plClearConfirm() {
  openModal(t('clearTitle'),
    '<p style="font-size:14px;color:var(--ink-muted)">' + t('clearMsg') + '</p>',
    '<button class="btn" style="background:var(--red)" onclick="plClearAll()">' + t('confirmClear') + '</button>' +
    '<button class="btn ghost" onclick="closeModal()">' + t('cancel') + '</button>');
}
async function plClearAll() {
  const leadIds = state.leads.map(l => l.id);
  const prodIds = state.products.map(p => p.id);
  state.leads = []; state.products = [];
  cacheLocal(); render(); closeModal();
  toast(t('toastCleared'));
  if (supabaseClient) {
    try {
      if (leadIds.length) await supabaseClient.from('leads').delete().in('id', leadIds);
      if (prodIds.length) await supabaseClient.from('products').delete().in('id', prodIds);
    } catch (e) { console.error('Clear failed:', e); toast(t('toastError'), true); }
  }
}

/* ============================================================================
   ALERT THRESHOLDS CONFIG MODAL (business days)
   ============================================================================ */
function plOpenThresholds() {
  const c = getThresholds();
  const row = (id, label, val) => `<div class="form-row"><label>${label}</label><input id="pl-thr-${id}" type="number" min="0" value="${val}"></div>`;
  const body = `<p style="font-size:13px;color:var(--ink-faint);margin-bottom:14px">${t('thrHint')}</p>`
    + row('agingWarn', t('thrAgingWarn'), c.agingWarn)
    + row('agingCrit', t('thrAgingCrit'), c.agingCrit)
    + row('staleDays', t('thrStaleDays'), c.staleDays)
    + row('stageStaleDays', t('thrStageStale'), c.stageStaleDays)
    + row('stuckBizDays', t('thrStuckBiz'), c.stuckBizDays);
  openModal(t('thrTitle'), body,
    `<button class="btn" onclick="plSaveThresholds()">${t('save')}</button>
     <button class="btn ghost" onclick="plResetThresholds()">${t('resetDefaults')}</button>
     <button class="btn ghost" onclick="closeModal()">${t('cancel')}</button>`);
}
function plSaveThresholds() {
  const g = id => Math.max(0, parseInt(document.getElementById('pl-thr-' + id).value, 10) || 0);
  const cfg = { agingWarn: g('agingWarn'), agingCrit: g('agingCrit'), staleDays: g('staleDays'), stageStaleDays: g('stageStaleDays'), stuckBizDays: g('stuckBizDays') };
  try { localStorage.setItem(THRESHOLDS_KEY, JSON.stringify(cfg)); } catch (e) {}
  _thrCfg = null; closeModal(); render(); toast(t('toastThrSaved'));
}
function plResetThresholds() {
  try { localStorage.removeItem(THRESHOLDS_KEY); } catch (e) {}
  _thrCfg = null; render(); plOpenThresholds(); toast(t('toastThrSaved'));
}

'@media print{.oap-bar{display:none}.oap-top{-webkit-print-color-adjust:exact;print-color-adjust:exact}.oap-card{break-inside:avoid;box-shadow:none}.oap-note{border:none;background:transparent;min-height:0;padding:4px 0}body{background:#fff}}' +
'</style></head><body>' +
'<div class="oap-top"><div class="oap-brand"><div class="oap-bd">BD</div><div><h1>' + L.title + '</h1><div class="sub">' + L.subtitle + '</div></div></div>' +
'<div class="oap-intro">' + L.intro + '</div>' +
'<div class="oap-genline">' + L.generated + ': ' + today + ' · ' + open.length + ' ' + L.count + '</div></div>' +
'<div class="oap-bar">' +
'<button class="oap-btn" onclick="oapSave()">' + L.save + '</button>' +
'<button class="oap-btn ghost" onclick="oapLoad()">' + L.load + '</button>' +
'<button class="oap-btn ghost" onclick="window.print()">' + L.pdf + '</button>' +
'<button class="oap-btn ghost" onclick="oapCopy()">' + L.copy + '</button>' +
'<span class="oap-msg" id="oap-msg"></span></div>' +
'<div class="oap-wrap">' + (cards || '<p style="color:var(--faint)">' + L.none + '</p>') + '</div>' +
S1 +
'var OAP_KEY="offline_action_pack_notes";' +
'var MSG={saved:' + JSON.stringify(L.saved) + ',loaded:' + JSON.stringify(L.loaded) + ',copied:' + JSON.stringify(L.copied) + '};' +
'function oapMsg(t){var e=document.getElementById("oap-msg");e.textContent=t;setTimeout(function(){if(e.textContent===t)e.textContent="";},2600);}' +
'function oapSave(){var d={};document.querySelectorAll(".oap-note").forEach(function(n){d[n.getAttribute("data-id")]=d[n.getAttribute("data-id")]||{};d[n.getAttribute("data-id")].note=n.value;});' +
'document.querySelectorAll(".oap-rem").forEach(function(c){var id=c.getAttribute("data-id");d[id]=d[id]||{};d[id].reminder=c.checked;});' +
'try{localStorage.setItem(OAP_KEY,JSON.stringify(d));oapMsg(MSG.saved);}catch(e){oapMsg("⚠️ "+e.message);}}' +
'function oapLoad(){var raw;try{raw=localStorage.getItem(OAP_KEY);}catch(e){return;}if(!raw)return;var d=JSON.parse(raw);' +
'document.querySelectorAll(".oap-note").forEach(function(n){var id=n.getAttribute("data-id");if(d[id]&&d[id].note!=null)n.value=d[id].note;});' +
'document.querySelectorAll(".oap-rem").forEach(function(c){var id=c.getAttribute("data-id");if(d[id])c.checked=!!d[id].reminder;});oapMsg(MSG.loaded);}' +
'function oapCopy(){var NL=String.fromCharCode(10);var out=[];document.querySelectorAll(".oap-card").forEach(function(card){var id=card.getAttribute("data-id");' +
'var company=(card.querySelector(".oap-company")||{}).textContent||"";var note=(card.querySelector(".oap-note")||{}).value||"";var rem=(card.querySelector(".oap-rem")||{}).checked?"yes":"no";' +
'out.push("=== "+company+" (id: "+id+") ===");out.push("Reminder: "+rem);out.push("Note: "+note);out.push("");});' +
'var text=out.join(NL);function done(){oapMsg(MSG.copied);}' +
'if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done,function(){fallback();});}else{fallback();}' +
'function fallback(){var ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");done();}catch(e){oapMsg("⚠️");}document.body.removeChild(ta);}}' +
'try{oapLoad();}catch(e){}' +
S2 +
'</body></html>';

  const blob = new Blob([doc], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'offline_action_pack_' + today + '.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1500);
  toast(t('toastOfflinePack'));
}

/* ============================================================================
   RENDER ROOT
   ============================================================================ */
function renderToday() {
  const el = document.getElementById('pl-today'); if (!el) return;
  const opts = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
  const ds = new Date().toLocaleDateString(currentLang === 'ar' ? 'ar-SA-u-ca-gregory' : 'en-GB', opts);
  el.textContent = '📅 ' + t('todayLabel') + ': ' + ds;
}
function renderLegend() {
  const el = document.getElementById('pl-legend'); if (!el) return;
  const thr = getThresholds();
  el.innerHTML =
    `<span class="lg-title">${t('legendTitle')}:</span>` +
    `<span class="lg-item"><span class="lg-sw" style="background:#ffd1d1"></span>${t('legendOverdue')}</span>` +
    `<span class="lg-item"><span class="lg-sw" style="background:#ffe1c4"></span>${t('legendCritical', thr.agingCrit)}</span>` +
    `<span class="lg-item"><span class="lg-sw" style="background:#fdf3d3"></span>${t('legendStale', thr.agingWarn, thr.stageStaleDays)}</span>`;
}
function render() {
  renderToday();
  renderAgenda();
  renderFocus();
  renderStats();
  renderLegend();
  renderFilters();
  renderTable();
}

   BOOT
   ============================================================================ */
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal').onclick = (e) => { if (e.target.id === 'modal') closeModal(); };

applyLangToDocument();
try { state.agendaFilter = localStorage.getItem('opp_agenda_filter_v1') || 'today'; } catch(e) { state.agendaFilter = 'today'; }
try { const v = localStorage.getItem('opp_agenda_collapsed_v1'); state.agendaCollapsed = v === null ? true : v === '1'; } catch(e) { state.agendaCollapsed = true; }
loadData();
