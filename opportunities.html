<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Business Opportunities – SOE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!--
  ============================================================================
  BUSINESS OPPORTUNITIES – SOE
  Standalone page that shares the SAME Supabase project as the governance system.
  Built on top of pipeline.html. It READS/WRITES the `leads` table, READS the
  existing `partners` table, READS/WRITES a new `products` table, and on
  "Convert" INSERTS into the existing `partners` / `projects` tables using the
  identical { id, data } JSONB shape the governance app uses.

  ---------------------------------------------------------------------------
  RUN THESE ONCE in the Supabase SQL editor.
  `partners` already exists — do NOT recreate it. Only `leads` and `products`
  are new:

      -- Leads (opportunities)
      create table if not exists leads (
        id   text primary key,
        data jsonb not null
      );
      alter table leads disable row level security;

      -- Products catalogue (configurable from the gear icon)
      create table if not exists products (
        id   text primary key,
        data jsonb not null
      );
      alter table products disable row level security;

  product.data shape: { id, name, type, description }
    - type matches a lead type: own-product | partner-product | open-source | consulting | other
  ============================================================================
-->
<style>
  /* ---- Design tokens: identical to the governance / pipeline system ---- */
  :root {
    --bg: #f5f3ee;
    --bg-card: #ffffff;
    --ink: #1a1f2e;
    --ink-muted: #5a6478;
    --ink-faint: #8a92a3;
    --line: #e4e0d6;
    --line-strong: #c8c2b0;
    --accent: #1a3a52;
    --accent-warm: #b8884a;
    --gold: #c9a96e;
    --green: #4a7c59;
    --amber: #c47e2a;
    --red: #b04540;
    --crit: #7a2d2a;
    --green-bg: #e8f0e8;
    --amber-bg: #faf0e0;
    --red-bg: #f5e0de;
    --crit-bg: #ead8d6;
    --shadow: 0 1px 2px rgba(26, 31, 46, 0.04), 0 4px 12px rgba(26, 31, 46, 0.06);
    --shadow-lg: 0 8px 28px rgba(26, 31, 46, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'IBM Plex Sans Arabic', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184, 136, 74, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(26, 58, 82, 0.03) 0%, transparent 40%);
  }

  h1, h2, h3, h4 { font-family: 'Reem Kufi', serif; font-weight: 600; letter-spacing: -0.01em; }

  /* ---- Page header ---- */
  .pl-topbar {
    background: var(--accent);
    color: #f5f3ee;
    padding: 16px 44px;
    display: flex; align-items: center; gap: 18px;
    box-shadow: var(--shadow);
  }
  .pl-brand { display: flex; align-items: center; gap: 12px; }
  .pl-brand-mark {
    width: 42px; height: 42px; border-radius: 8px;
    background: rgba(201,169,110,0.18); color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Reem Kufi', serif; font-size: 15px; font-weight: 700;
    overflow: hidden;
  }
  .pl-brand-mark img { width: 100%; height: 100%; object-fit: contain; }
  .pl-soe-logo { height: 40px; width: auto; display: block; }
  .pl-brand-divider { width: 1px; height: 34px; background: rgba(245,243,238,0.18); }
  .pl-bd-square {
    width: 40px; height: 40px; flex: none;
    border: 1.5px solid rgba(201,169,110,0.6); border-radius: 4px;
    color: var(--gold); display: flex; align-items: center; justify-content: center;
    font-family: 'Reem Kufi', serif; font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
  }
  .pl-brand-title { font-family: 'Reem Kufi', serif; font-size: 18px; font-weight: 700; line-height: 1.2; }
  .pl-brand-sub { font-size: 11px; color: rgba(245,243,238,0.55); }
  .pl-topbar-spacer { flex: 1; }
  .pl-back {
    color: rgba(245,243,238,0.75); text-decoration: none; font-size: 13px;
    border: 1px solid rgba(245,243,238,0.18); border-radius: 6px;
    padding: 7px 14px; transition: all 0.15s;
  }
  .pl-back:hover { background: rgba(245,243,238,0.08); color: #f5f3ee; }
  .pl-lang-toggle {
    display: flex; background: rgba(245,243,238,0.06);
    border: 1px solid rgba(245,243,238,0.1); border-radius: 6px; padding: 3px;
  }
  .pl-lang-toggle button {
    background: none; border: none; color: rgba(245,243,238,0.6);
    padding: 6px 12px; font-family: inherit; font-size: 12px; cursor: pointer;
    border-radius: 4px; transition: all 0.15s;
  }
  .pl-lang-toggle button:hover { color: rgba(245,243,238,0.9); }
  .pl-lang-toggle button.active { background: rgba(201,169,110,0.18); color: var(--gold); font-weight: 500; }

  .main { padding: 36px 44px; max-width: 1500px; margin: 0 auto; }

  .page-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--line); gap: 16px; flex-wrap: wrap;
  }
  .page-title { font-size: 26px; font-weight: 600; }
  .page-sub { font-size: 13px; color: var(--ink-muted); margin-top: 4px; }
  .page-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .pl-gear {
    background: var(--bg-card); border: 1px solid var(--line-strong); color: var(--ink-muted);
    width: 38px; height: 38px; border-radius: 6px; cursor: pointer; font-size: 16px;
    display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .pl-gear:hover { border-color: var(--accent); color: var(--accent); background: #faf8f3; }

  /* Stats / focus cards */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
  .stat {
    background: var(--bg-card); border: 1px solid var(--line);
    padding: 20px; border-radius: 6px; position: relative; overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; inset-inline-end: 0; width: 3px; height: 100%;
    background: var(--accent);
  }
  .stat.warn::before { background: var(--amber); }
  .stat.danger::before { background: var(--red); }
  .stat.good::before { background: var(--green); }
  .stat-label { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.04em; }
  .stat-value { font-size: 32px; font-weight: 600; font-family: 'Reem Kufi', serif; margin-top: 6px; color: var(--accent); }
  .stat.warn .stat-value { color: var(--amber); }
  .stat.danger .stat-value { color: var(--red); }
  .stat.good .stat-value { color: var(--green); }
  .stat-meta { font-size: 12px; color: var(--ink-faint); margin-top: 8px; }

  /* ---- Focus widget (NEW: sits ABOVE the stats) ---- */
  .pl-agenda { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 16px 20px 18px; margin-bottom: 18px; box-shadow: var(--shadow); }
.pl-agenda-collapsed { padding: 0; margin-bottom: 14px; cursor: pointer; transition: background .15s, border-color .15s; }
.pl-agenda-collapsed:hover { background: #faf8f3; border-color: var(--line2); }
.pl-agenda-collapsed:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
.pl-agenda-bar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 13px; line-height: 1.4; }
.pl-agenda-bar-title { color: var(--accent); font-weight: 600; font-family: 'Reem Kufi', serif; font-size: 14px; }
.pl-agenda-bar-sep { color: var(--ink-faint); }
.pl-agenda-bar-summary { color: var(--ink-muted); flex: 1; min-width: 0; }
.pl-agenda-bar-summary b { color: var(--accent); font-weight: 700; }
.pl-agenda-bar-empty { color: var(--ink-faint); font-style: italic; }
.pl-agenda-bar-chevron { color: var(--ink-faint); font-size: 14px; flex: none; }
.pl-agenda-collapse-btn { background: transparent; border: 1px solid var(--line); color: var(--ink-faint); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; font-family: inherit; transition: background .12s, color .12s; margin-inline-start: 8px; }
.pl-agenda-collapse-btn:hover { background: #faf8f3; color: var(--ink); }
.pl-agenda-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.pl-agenda-head h3 { font-size: 16px; color: var(--accent); margin: 0; font-family: 'Reem Kufi', serif; }
.pl-agenda-head .pl-agenda-sub { font-size: 12px; color: var(--ink-faint); }
.pl-agenda-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.pl-agenda-chip { background: #faf8f3; border: 1px solid var(--line); color: var(--ink-muted); padding: 5px 11px; border-radius: 14px; font-size: 12px; cursor: pointer; transition: background .12s, border-color .12s; font-family: inherit; }
.pl-agenda-chip:hover { background: #f3eee0; }
.pl-agenda-chip.active { background: var(--accent); color: #f5f3ee; border-color: var(--accent); }
.pl-agenda-count { font-size: 11px; color: var(--ink-faint); margin-inline-start: auto; }
.pl-agenda-empty { color: var(--ink-faint); font-size: 13px; padding: 14px 0; text-align: center; }
.pl-agenda-list { display: grid; gap: 8px; }
.pl-agenda-item { display: grid; grid-template-columns: auto 1fr auto; gap: 12px; padding: 10px 12px; background: #faf8f3; border: 1px solid var(--line); border-inline-start: 3px solid var(--line); border-radius: 7px; cursor: pointer; transition: background .12s, transform .08s; align-items: center; }
.pl-agenda-item:hover { background: #f3eee0; }
.pl-agenda-item:active { transform: translateY(1px); }
.pl-agenda-item.overdue { border-inline-start-color: var(--red); background: #fff5f4; }
.pl-agenda-item.today { border-inline-start-color: var(--amber); background: #fffaf0; }
.pl-agenda-item.reminder { border-inline-start-color: var(--accent); }
.pl-ag-when { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 5px; background: #ece7dd; color: var(--ink-muted); white-space: nowrap; min-width: 70px; text-align: center; }
.pl-ag-when.overdue { background: var(--red); color: #fff; }
.pl-ag-when.today { background: var(--amber); color: #fff; }
.pl-ag-when.future { background: #ece7dd; color: var(--ink-muted); }
.pl-ag-body { min-width: 0; }
.pl-ag-action { font-size: 13.5px; font-weight: 600; color: var(--ink); line-height: 1.4; word-wrap: break-word; }
.pl-ag-action .pl-ag-tag { font-size: 10.5px; font-weight: 600; color: var(--ink-faint); margin-inline-end: 6px; }
.pl-ag-context { font-size: 11.5px; color: var(--ink-faint); margin-top: 4px; line-height: 1.5; }
.pl-ag-context b { color: var(--ink); font-weight: 600; }
.pl-ag-context .pl-ag-sep { color: var(--line2); margin: 0 6px; }
.pl-ag-context .pl-ag-stage { color: var(--accent); font-weight: 600; }
.pl-ag-context .pl-ag-value { color: var(--accent-warm); font-weight: 600; }
.pl-ag-meta { font-size: 11px; color: var(--ink-faint); text-align: end; white-space: nowrap; }
.pl-ag-meta .pl-ag-score { font-weight: 700; color: var(--accent); font-size: 13px; display:block; }
@media (max-width: 760px) {
  .pl-agenda-item { grid-template-columns: 1fr; gap: 6px; }
  .pl-ag-when { justify-self: start; min-width: 0; }
  .pl-ag-meta { text-align: start; }
}

.pl-focus { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 16px; margin-bottom: 20px; }
  .pl-focus-card {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 6px; padding: 18px 20px; position: relative; overflow: hidden;
  }
  .pl-focus-card::before {
    content: ''; position: absolute; top: 0; inset-inline-end: 0; width: 3px; height: 100%;
    background: var(--gold);
  }
  .pl-focus-card.hot::before { background: var(--red); }
  .pl-focus-card.stale::before { background: var(--ink-faint); }
  .pl-focus-card.actions::before { background: var(--accent-warm); }
  .pl-focus-label { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px; }
  .pl-focus-value { font-size: 30px; font-weight: 600; font-family: 'Reem Kufi', serif; margin-top: 6px; color: var(--accent); }
  .pl-focus-card.hot .pl-focus-value { color: var(--red); }
  .pl-focus-card.stale .pl-focus-value { color: var(--ink-muted); }
  .pl-focus-meta { font-size: 12px; color: var(--ink-faint); margin-top: 6px; }
  /* Drill-down: clickable Hot / Stale cards */
  .pl-focus-card.clickable { cursor: pointer; transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease; }
  .pl-focus-card.clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .pl-focus-card.clickable:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .pl-focus-card.hot.active { background: var(--red-bg); box-shadow: 0 0 0 2px var(--red) inset; }
  .pl-focus-card.stale.active { background: var(--bg); box-shadow: 0 0 0 2px var(--ink-faint) inset; }
  .pl-focus-hint { font-size: 11px; color: var(--ink-faint); margin-top: 4px; font-style: italic; opacity: 0.85; }
  /* Active drill-down chip above table */
  .pl-focus-chip-wrap { margin: 0 0 12px 0; display: flex; }
  .pl-focus-chip { display: inline-flex; align-items: center; gap: 10px; padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1px solid var(--line-strong); background: var(--bg-card); color: var(--ink); }
  .pl-focus-chip.hot { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .pl-focus-chip.stale { background: var(--bg); border-color: var(--ink-faint); color: var(--ink-muted); }
  .pl-focus-chip-clear { cursor: pointer; background: transparent; border: none; font-size: 16px; line-height: 1; padding: 0 2px; color: inherit; opacity: 0.7; }
  .pl-focus-chip-clear:hover { opacity: 1; }
  .pl-sug-list { margin-top: 12px; max-height: 196px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .pl-sug-item {
    background: #faf8f3; border: 1px solid var(--line);
    border-inline-start: 3px solid var(--accent-warm);
    border-radius: 5px; padding: 9px 12px;
  }
  .pl-sug-company { font-weight: 600; font-size: 13px; color: var(--accent); cursor: pointer; }
  .pl-sug-company:hover { text-decoration: underline; }
  .pl-sug-stage { font-size: 11px; color: var(--ink-faint); margin: 2px 0 4px; }
  .pl-sug-action { font-size: 12.5px; color: var(--ink); line-height: 1.45; }
  .pl-sug-empty { margin-top: 14px; font-size: 14px; color: var(--green); font-weight: 500; }

  /* Buttons */
  .btn {
    background: var(--accent); color: #f5f3ee; border: none;
    padding: 9px 18px; border-radius: 5px; font-family: inherit;
    font-size: 13px; font-weight: 500; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px; transition: all 0.15s;
  }
  .btn:hover { background: #243d52; transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line-strong); }
  .btn.ghost:hover { background: var(--bg-card); border-color: var(--accent); color: var(--accent); }
  .btn.gold { background: var(--gold); color: var(--accent); }
  .btn.gold:hover { background: var(--accent-warm); color: #fff; }
  .btn.sm { padding: 6px 12px; font-size: 12px; }

  /* Table */
  .table-wrap { background: var(--bg-card); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: #faf8f3; text-align: start; padding: 12px 14px; font-weight: 500;
    color: var(--ink-muted); font-size: 12px; letter-spacing: 0.04em;
    border-bottom: 1px solid var(--line); white-space: nowrap;
  }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--accent); }
  th .sort-ind { font-size: 10px; opacity: 0.7; }
  td { padding: 13px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #faf8f3; }
  td .name { font-weight: 500; color: var(--ink); }
  td .sub { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }

  /* Badges */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 11px;
    font-size: 11px; font-weight: 500; border: 1px solid;
  }
  .badge.green { background: var(--green-bg); color: var(--green); border-color: rgba(74, 124, 89, 0.3); }
  .badge.amber { background: var(--amber-bg); color: var(--amber); border-color: rgba(196, 126, 42, 0.3); }
  .badge.red { background: var(--red-bg); color: var(--red); border-color: rgba(176, 69, 64, 0.3); }
  .badge.crit { background: var(--crit-bg); color: var(--crit); border-color: rgba(122, 45, 42, 0.3); }
  .badge.neutral { background: #eee9dd; color: var(--ink-muted); border-color: var(--line); }
  .badge.dev { background: #e6ecf2; color: var(--accent); border-color: rgba(26, 58, 82, 0.2); }
  .badge.sup { background: #f0e8d6; color: var(--accent-warm); border-color: rgba(184, 136, 74, 0.3); }
  .badge.owned { background: #dbe8de; color: #3d6b4a; border-color: rgba(61, 107, 74, 0.25); }
  .badge.vendor { background: #efe2f0; color: #7a3d82; border-color: rgba(122, 61, 130, 0.25); }
  .badge.custom-type { background: #e8e6e0; color: #555a66; border-color: rgba(85, 90, 102, 0.25); }
  .badge.blue { background: #e1ebf2; color: #2c5e7d; border-color: rgba(44, 94, 125, 0.25); }
  .badge.slate { background: #e8e6e0; color: #555a66; border-color: rgba(85, 90, 102, 0.25); }
  .badge.dark { background: #ead8d6; color: var(--crit); border-color: rgba(122, 45, 42, 0.3); }
  .badge-stack { display: inline-flex; flex-wrap: wrap; gap: 4px; }

  /* Score bars */
  .pl-score { display: flex; align-items: center; gap: 8px; }
  .pl-score-bar { width: 64px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .pl-score-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .pl-score-fill.high { background: var(--green); }
  .pl-score-fill.mid { background: var(--gold); }
  .pl-score-fill.low { background: var(--red); }
  .pl-score-num { font-size: 12px; color: var(--ink-muted); font-weight: 500; min-width: 20px; }
  /* Actionability row highlighting — distinct hues (overdue > critical > stale) */
  tr.row-stale td { background-color: #fdf3d3; }      /* yellow  = stale */
  tr.row-critical td { background-color: #ffe1c4; }   /* orange  = critical */
  tr.row-overdue td { background-color: #ffd1d1; }    /* red     = overdue */
  tr.row-stale td:first-child { border-inline-start: 4px solid #e0a92b; }
  tr.row-critical td:first-child { border-inline-start: 4px solid #d9772b; }
  tr.row-overdue td:first-child { border-inline-start: 4px solid #c0392b; }
  tr.row-stale:hover td, tr.row-critical:hover td, tr.row-overdue:hover td { filter: brightness(0.98); }
  .pl-actiondue-overdue { color: var(--red); font-weight: 700; }
  .stat.clickable { cursor: pointer; transition: background .15s, border-color .15s, transform .05s; }
  .stat.clickable:hover { background: #faf8f3; }
  .stat.clickable:active { transform: translateY(1px); }
  .stat.clickable.active { background: #faf0e0; border-color: var(--amber); }
  .stat .pl-focus-hint { font-size: 11px; color: var(--ink-faint); margin-top: 4px; }
  .pl-vel { font-size: 12px; font-weight: 700; margin-inline-start: 5px; cursor: help; }
  .pl-vel.up { color: var(--green); }
  .pl-vel.down { color: var(--red); }
  .pl-vel.flat { color: var(--ink-faint); }
  /* Win/Loss analysis */
  .wl-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
  .wl-card { border: 1px solid var(--line); border-radius: 6px; padding: 14px; text-align: center; background: #fff; }
  .wl-card .v { font-family: 'Reem Kufi', serif; font-size: 24px; font-weight: 600; color: var(--accent); }
  .wl-card.won .v { color: var(--green); }
  .wl-card.lost .v { color: var(--red); }
  .wl-card .l { font-size: 11px; color: var(--ink-muted); margin-top: 4px; }
  .wl-sec-title { font-size: 13px; font-weight: 600; color: var(--accent); margin: 18px 0 8px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .wl-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .wl-row:last-child { border-bottom: none; }
  .wl-row .lbl { flex: 1; }
  .wl-row .bar { width: 90px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; flex: none; }
  .wl-row .bar > span { display: block; height: 100%; border-radius: 3px; }
  .wl-row.won .bar > span { background: var(--green); }
  .wl-row.lost .bar > span { background: var(--red); }
  .wl-row .cnt { min-width: 66px; text-align: end; color: var(--ink-muted); font-size: 12px; flex: none; }
  .wl-filter { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
  .wl-filter .fld label { display:block; font-size: 11px; color: var(--ink-muted); margin-bottom: 4px; }
  .wl-filter .fld input { padding: 7px 10px; border: 1px solid var(--line-strong); border-radius: 5px; font-family: inherit; font-size: 13px; }
  .wl-empty { color: var(--ink-faint); font-size: 13px; padding: 8px 0; }
  /* Colour legend above the table */
  .pl-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: center; margin-bottom: 12px; font-size: 12px; color: var(--ink-muted); }
  .pl-legend .lg-title { font-weight: 600; color: var(--ink); }
  .pl-legend .lg-item { display: inline-flex; align-items: center; gap: 6px; }
  .pl-legend .lg-sw { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(26,31,46,0.12); display: inline-block; }
  /* Today indicator pill in the top bar */
  .pl-today { font-size: 12px; color: rgba(245,243,238,0.82); background: rgba(245,243,238,0.07); border: 1px solid rgba(245,243,238,0.14); border-radius: 6px; padding: 7px 12px; white-space: nowrap; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26, 31, 46, 0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(3px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-card); border-radius: 8px; width: 100%;
    max-width: 600px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg); border: 1px solid var(--line);
  }
  .modal-head {
    padding: 20px 24px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-close {
    background: none; border: none; font-size: 22px; cursor: pointer;
    color: var(--ink-faint); width: 28px; height: 28px; border-radius: 4px;
  }
  .modal-close:hover { background: var(--line); color: var(--ink); }
  .modal-body { padding: 24px; }
  .modal-foot {
    padding: 16px 24px; border-top: 1px solid var(--line);
    display: flex; justify-content: flex-start; gap: 10px; background: #faf8f3;
  }

  /* Form */
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--ink-muted); margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--line-strong);
    border-radius: 5px; font-family: inherit; font-size: 14px;
    color: var(--ink); background: #fafaf7; transition: all 0.15s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    outline: none; border-color: var(--accent); background: #fff;
    box-shadow: 0 0 0 3px rgba(26, 58, 82, 0.08);
  }
  .form-row textarea { min-height: 64px; resize: vertical; }
  .form-row.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row.row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-section-title {
    font-size: 12px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin: 22px 0 12px; padding-top: 14px; border-top: 1px dashed var(--line);
  }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-muted); margin-top: 6px; }
  .checkbox-row input { width: auto; }

  /* Attachment rows */
  .pl-attach-row {
    display: grid; grid-template-columns: 1fr 1.4fr 1.4fr auto; gap: 8px;
    align-items: center; margin-bottom: 8px;
  }
  .pl-attach-row input { font-size: 13px; padding: 7px 10px; }
  .pl-attach-row .pl-mini-del {
    background: none; border: 1px solid var(--line); color: var(--ink-faint);
    width: 32px; height: 32px; border-radius: 5px; cursor: pointer; font-size: 16px;
  }
  .pl-kc-row { display: grid; grid-template-columns: 1.1fr 1fr 0.9fr 0.9fr 1.3fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .pl-kc-row input, .pl-kc-row select { font-size: 13px; padding: 7px 9px; border: 1px solid var(--line-strong); border-radius: 5px; font-family: inherit; background: #fafaf7; }
  .pl-warm-badge { cursor: help; }
  .pl-mini-del:hover { border-color: var(--red); color: var(--red); }

  /* Config list (products) */
  .pl-cfg-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .pl-cfg-item {
    display: flex; align-items: center; gap: 10px; justify-content: space-between;
    background: #faf8f3; border: 1px solid var(--line); border-radius: 5px; padding: 9px 12px;
  }
  .pl-cfg-item .name { font-weight: 500; font-size: 13px; }
  .pl-cfg-item .sub { font-size: 11px; color: var(--ink-faint); }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-select {
    padding: 7px 12px; border: 1px solid var(--line-strong); border-radius: 5px;
    font-family: inherit; font-size: 13px; background: var(--bg-card); color: var(--ink);
  }
  .filter-select:focus { outline: none; border-color: var(--accent); }
  .search-input {
    flex: 1; min-width: 200px; max-width: 300px; padding: 7px 12px;
    border: 1px solid var(--line-strong); border-radius: 5px;
    font-family: inherit; font-size: 13px; background: var(--bg-card);
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .filters-label { font-size: 12px; color: var(--ink-faint); margin-inline-end: 4px; }

  /* Empty state */
  .empty { padding: 48px 24px; text-align: center; color: var(--ink-faint); font-size: 14px; }
  .empty-icon { font-size: 32px; opacity: 0.4; margin-bottom: 10px; }

  /* Compact table actions */
  .row-actions { display: flex; gap: 4px; flex-wrap: wrap; }
  .row-btn {
    background: none; border: 1px solid var(--line); padding: 5px 10px;
    border-radius: 4px; font-family: inherit; font-size: 11px;
    cursor: pointer; color: var(--ink-muted); transition: all 0.15s;
  }
  .row-btn:hover { border-color: var(--accent); color: var(--accent); background: #faf8f3; }
  .row-btn.danger:hover { border-color: var(--red); color: var(--red); }
  .row-btn.gold { border-color: rgba(184,136,74,0.4); color: var(--accent-warm); }
  .row-btn.gold:hover { background: #faf0e0; border-color: var(--accent-warm); color: var(--accent-warm); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 24px; background: var(--accent);
    color: #f5f3ee; padding: 12px 20px; border-radius: 6px; font-size: 13px;
    box-shadow: var(--shadow-lg); transform: translateY(120%);
    transition: transform 0.3s; z-index: 200;
  }
  .toast.show { transform: translateY(0); }
  .toast.error { background: var(--red); }

  .hidden { display: none !important; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  @media (max-width: 1000px) {
    .pl-focus { grid-template-columns: 1fr 1fr; }
    .pl-focus-card.actions { grid-column: 1 / -1; }
  }
  /* Tablet / mid widths: let the wide table scroll horizontally */
  @media (max-width: 900px) and (min-width: 761px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .table-wrap table { min-width: 1000px; }
  }
  @media (max-width: 900px) {
    .pl-topbar { padding: 14px 16px; }
    .main { padding: 20px 16px; }
  }

  /* ===== Mobile (<=760px): stacked cards instead of a wide table ===== */
  @media (max-width: 760px) {
    .main { padding: 16px 12px; }
    .stats { grid-template-columns: 1fr 1fr; gap: 10px; }
    .pl-focus { grid-template-columns: 1fr; }
    .stat { padding: 14px 16px; }
    .stat-value { font-size: 26px; }

    /* Topbar wraps; brand stays, controls drop below if needed */
    .pl-topbar { flex-wrap: wrap; gap: 10px 12px; padding: 12px 14px; }
    .pl-soe-logo { height: 34px; }
    .pl-brand-divider { display: none; }
    .pl-brand-title { font-size: 16px; }
    .pl-back { padding: 8px 12px; }

    /* Header + toolbar stack; primary buttons grow, gears stay square */
    .page-head { flex-direction: column; align-items: stretch; gap: 12px; }
    .page-actions { width: 100%; flex-wrap: wrap; gap: 8px; }
    .page-actions .btn { flex: 1 1 auto; justify-content: center; min-height: 44px; }
    .pl-gear { flex: none; width: 44px; height: 44px; }

    /* Filters stack full width */
    .filters { flex-direction: column; align-items: stretch; gap: 6px; }
    .filters-label { margin: 4px 0 0; }
    .filter-select, .search-input { width: 100%; max-width: none; min-height: 44px; }

    /* Table -> cards */
    .table-wrap { overflow-x: visible; background: transparent; border: none; box-shadow: none; }
    table { min-width: 0 !important; }
    thead { display: none; }
    table, tbody, tr, td { display: block; width: 100%; }
    tr { background: var(--bg-card); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
    tr:hover td { background: inherit; }
    td { display: flex; justify-content: space-between; align-items: center; gap: 14px; text-align: end; padding: 10px 14px; border-bottom: 1px solid var(--line); }
    td:last-child { border-bottom: none; }
    td:before { content: attr(data-label); font-size: 11px; font-weight: 600; color: var(--ink-muted); letter-spacing: 0.03em; text-align: start; flex: 0 0 auto; max-width: 45%; }
    /* Company cell becomes the card title (no label, full width) */
    td.cell-company { display: block; text-align: start; background: #faf8f3; padding: 12px 14px; }
    td.cell-company:before { display: none; }
    td.cell-company .name { font-size: 16px; }
    /* Actions row full width, buttons sized for touch */
    td.cell-actions { display: block; }
    td.cell-actions:before { display: block; margin-bottom: 6px; }
    .row-actions { justify-content: flex-start; flex-wrap: wrap; gap: 6px; }
    .row-actions .row-btn { flex: 1 1 auto; min-height: 40px; text-align: center; justify-content: center; }
    .pl-score-bar { width: 90px; }

    /* Modals: breathing room + single-column form rows */
    .modal-overlay { padding: 10px; }
    .modal { max-width: 100%; }
    .modal-body { padding: 18px 16px; }
    .form-row.row-2, .form-row.row-3 { grid-template-columns: 1fr; }
    .pl-attach-row { grid-template-columns: 1fr; gap: 6px; }
    .pl-attach-row .pl-mini-del { width: 100%; height: 38px; }
    .pl-kc-row { grid-template-columns: 1fr 1fr; }
    tr.row-stale { border-inline-start: 4px solid #e0a92b; }
    tr.row-critical { border-inline-start: 4px solid #d9772b; }
    tr.row-overdue { border-inline-start: 4px solid #c0392b; }
    .pl-today { width: 100%; text-align: center; }
    .wl-cards { grid-template-columns: 1fr; }
    .wl-filter .fld, .wl-filter .fld input { width: 100%; }
    .modal-foot { flex-wrap: wrap; }
    .modal-foot .btn { flex: 1 1 auto; justify-content: center; min-height: 44px; }
    .form-row input, .form-row select, .form-row textarea { font-size: 16px; }  /* avoid iOS zoom-on-focus */
  }

  @media (max-width: 380px) {
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function nowISO() { return new Date().toISOString(); }
function todayDate() { return new Date().toISOString().slice(0, 10); }

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function daysBetween(fromISO, toISO) {
  if (!fromISO || !toISO) return null;
  const a = new Date(fromISO).getTime(), b = new Date(toISO).getTime();
  if (isNaN(a) || isNaN(b)) return null;
  return Math.floor((b - a) / 86400000);
}

/* Business days (Sun–Thu) between two dates; Fri (5) & Sat (6) are weekend. */
function businessDaysBetween(fromISO, toISO) {
  if (!fromISO) return 0;
  const start = new Date(fromISO), end = new Date(toISO || nowISO());
  if (isNaN(start) || isNaN(end) || end <= start) return 0;
  let count = 0;
  const cur = new Date(start.getFullYear(), start.getMonth(), start.getDate());
  cur.setDate(cur.getDate() + 1); // count whole days elapsed after the start day
  const endDay = new Date(end.getFullYear(), end.getMonth(), end.getDate());
  while (cur <= endDay) {
    const d = cur.getDay();
    if (d !== 5 && d !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function isClosed(lead) { return CLOSED_STAGES.includes(lead.stage); }

function stageEnteredAt(lead) { return lead.stageEnteredAt || lead.updatedAt || lead.createdAt; }
function daysInCurrentStage(lead) { return businessDaysBetween(stageEnteredAt(lead), nowISO()); }

/* Score configuration (localStorage, cached). Lets the user tune the formula. */
let _scoreCfg = null;
function getScoreConfig(force) {
  if (_scoreCfg && !force) return _scoreCfg;
  let cfg = JSON.parse(JSON.stringify(DEFAULT_SCORE));
  try {
    const raw = localStorage.getItem(SCORE_CONFIG_KEY);
    if (raw) {
      const c = JSON.parse(raw) || {};
      cfg = Object.assign(cfg, c);
      cfg.stageBonus = Object.assign({}, DEFAULT_SCORE.stageBonus, c.stageBonus || {});
    }
  } catch (e) {}
  _scoreCfg = cfg;
  return cfg;
}

/* Lead score = (probability × weight) + stage bonus + high-value bonus, clamped 0..100. */
function leadScore(lead) {
  const cfg = getScoreConfig();
  let s = (Number(lead.probability) || 0) * (Number(cfg.probabilityWeight) || 0);
  s += Number(cfg.stageBonus[lead.stage]) || 0;
  if ((Number(cfg.highValueBonus) || 0) > 0 && (Number(lead.expectedValue) || 0) > (Number(cfg.highValueThreshold) || 0)) {
    s += Number(cfg.highValueBonus) || 0;
  }
  return Math.max(0, Math.min(100, Math.round(s)));
}

/* Priority = (probability × expected value) / (days in current stage + 1). */
function priorityScore(lead) {
  const prob = Number(lead.probability) || 0;
  const val = Number(lead.expectedValue) || 0;
  return (prob * val) / (daysInCurrentStage(lead) + 1);
}

/* Probability configuration (localStorage). */
function getProbConfig() {
  try {
    const raw = localStorage.getItem(PROB_CONFIG_KEY);
    if (raw) { const c = JSON.parse(raw); return Object.assign({}, DEFAULT_PROB, c); }
  } catch (e) {}
  return Object.assign({}, DEFAULT_PROB);
}
function probabilityForStage(stage) {
  if (stage === 'Closed Won') return 100;
  if (stage === 'Closed Lost') return 0;
  const c = getProbConfig();
  return c[stage] != null ? c[stage] : 0;
}

/* ============================================================================

   ============================================================================ */
async function loadData() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const c = JSON.parse(raw) || {};
      if (Array.isArray(c.leads)) state.leads = c.leads;
      if (Array.isArray(c.partners)) state.partners = c.partners;
      if (Array.isArray(c.products)) state.products = c.products;
    }
  } catch (e) {}

  if (!supabaseClient) { render(); return; }

  try {
    const [leadsRes, partnersRes, productsRes] = await Promise.all([
      supabaseClient.from('leads').select('*'),
      supabaseClient.from('partners').select('*'),
      supabaseClient.from('products').select('*')
    ]);
    if (!leadsRes.error) state.leads = (leadsRes.data || []).map(r => r.data).filter(Boolean);
    if (!partnersRes.error) state.partners = (partnersRes.data || []).map(r => r.data).filter(Boolean);
    if (!productsRes.error) state.products = (productsRes.data || []).map(r => r.data).filter(Boolean);
    cacheLocal();
  } catch (e) {
    console.error('Load failed:', e);
    toast(t('toastLoadError'), true);
  }
  render();
}

function cacheLocal() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ leads: state.leads, partners: state.partners, products: state.products })); } catch (e) {}
}

async function persistRow(table, obj) {
  cacheLocal();
  if (!supabaseClient) return true;
  try {
    const { error } = await supabaseClient.from(table).upsert({ id: obj.id, data: obj }, { onConflict: 'id' });
    if (error) throw error;
    return true;
  } catch (e) { console.error(table + ' save failed:', e); toast(t('toastError'), true); return false; }
}

async function removeRow(table, id) {
  cacheLocal();
  if (!supabaseClient) return true;
  try {
    const { error } = await supabaseClient.from(table).delete().eq('id', id);
    if (error) throw error;
    return true;
  } catch (e) { console.error(table + ' delete failed:', e); toast(t('toastError'), true); return false; }
}

function isHot(l) { return !isClosed(l) && (Number(l.probability) || 0) >= 60 && (Number(l.expectedValue) || 0) > 100000; }
function isStale(l) { return !isClosed(l) && businessDaysBetween(l.updatedAt, nowISO()) > getThresholds().staleDays; }
function isAging(l) { return !isClosed(l) && daysInSystem(l) > getThresholds().agingWarn; }

/* Rule engine: combines stage + type + product + value tier + source. */
function suggestionFor(lead) {
  const stage = lead.stage, type = lead.leadType, tier = valueTier(lead.expectedValue), src = lead.leadSource;
  const prod = getProduct(lead.productId);
  const pname = prod ? prod.name : '';

  if (stage === 'Negotiation') {
    if (tier === 'high') return { key: 'sug_negotiation_high' };
    if (src === 'Inbound' && tier === 'low') return { key: 'sug_negotiation_inbound_low' };
    return { key: 'sug_negotiation_any' };
  }
  if (stage === 'Proposal') {
    if (type === 'own-product' && tier === 'high') return { key: 'sug_proposal_own_high' };
    if (type === 'partner-product') return { key: 'sug_proposal_partner' };
    return { key: 'sug_proposal_med_any' };
  }
  if (stage === 'Qualified') {
    if (type === 'partner-product' && tier === 'med') return { key: 'sug_qualified_partner_med' };
    if (type === 'own-product' && tier === 'high') return { key: 'sug_qualified_own_high' };
    if (type === 'consulting') return { key: 'sug_qualified_consult' };
    if (src === 'Referral') return { key: 'sug_referral_any' };
    if (tier === 'low') return { key: 'sug_qualified_low' };
    return { key: 'sug_fallback', arg: t('stage_' + stage) };
  }
  if (stage === 'Prospect') {
    if (src === 'Referral') return { key: 'sug_referral_any' };
    if (type === 'own-product' && tier === 'high') return { key: 'sug_prospect_own_high', arg: pname || t('genericSolution') };
    if (type === 'consulting' && tier === 'low') return { key: 'sug_prospect_consult_low' };
    if (type === 'partner-product') return { key: 'sug_prospect_partner' };
    if (src === 'Outbound' && tier === 'low') return { key: 'sug_outbound_low' };
    if (tier === 'high') return { key: 'sug_prospect_high_any' };
    if (type === 'own-product' && tier === 'med') return { key: 'sug_prospect_own_med' };
    return { key: 'sug_fallback', arg: t('stage_' + stage) };
  }
  return { key: 'sug_fallback', arg: t('stage_' + stage) };
}

function stuckLeads() {
  return state.leads
    .filter(l => !isClosed(l))
    .map(l => ({ lead: l, biz: businessDaysBetween(stageEnteredAt(l), nowISO()) }))
    .filter(x => x.biz > getThresholds().stuckBizDays)
    .sort((a, b) => b.biz - a.biz);
}

/* ============================================================================
   AGENDA — every open lead's next-action + reminders, business-week filtered.
   Mirrors the Governance Daily Agenda pattern.
   ============================================================================ */
function _agendaSaudiWeekRange(ref) {
  // Saudi work week: Sunday → Thursday. Today = Fri/Sat -> show the upcoming Sun..Thu.
  const d = new Date(ref + 'T00:00:00');
  const dow = d.getDay(); // Sun=0 ... Sat=6
  let startOffset;
  if (dow === 5) startOffset = 2;
  else if (dow === 6) startOffset = 1;
  else startOffset = -dow;
  const sun = new Date(d); sun.setDate(d.getDate() + startOffset);
  const thu = new Date(sun); thu.setDate(sun.getDate() + 4);
  const iso = x => x.toISOString().slice(0,10);
  return { start: iso(sun), end: iso(thu) };
}
function _agendaMonthRange(ref) {
  const d = new Date(ref + 'T00:00:00');
  const start = new Date(d.getFullYear(), d.getMonth(), 1);
  const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
  const iso = x => x.toISOString().slice(0,10);
  return { start: iso(start), end: iso(end) };
}
function plSetAgendaFilter(kind) {
  state.agendaFilter = kind;
  try { localStorage.setItem('opp_agenda_filter_v1', kind); } catch(e) {}
  renderAgenda();
}
function plAgendaCollect() {
  const items = [];
  for (const l of state.leads) {
    if (isClosed(l)) continue;
    if (l.nextAction && l.nextActionDue) {
      items.push({ kind: 'action', dueDate: l.nextActionDue, lead: l, text: l.nextAction });
    }
    if (l.reminderDate) {
      items.push({ kind: 'reminder', dueDate: l.reminderDate, lead: l, text: l.reminderReason || t('agendaReminderTag') });
    }
  }
  items.sort((a,b) => {
    const da = a.dueDate || '9999-12-31', db = b.dueDate || '9999-12-31';
    if (da !== db) return da < db ? -1 : 1;
    return (leadScore(b.lead) - leadScore(a.lead));
  });
  return items;
}
function plToggleAgenda() {
  state.agendaCollapsed = !state.agendaCollapsed;
  try { localStorage.setItem('opp_agenda_collapsed_v1', state.agendaCollapsed ? '1' : '0'); } catch(e) {}
  renderAgenda();
}
function renderAgenda() {
  const mount = document.getElementById('pl-agenda');
  if (!mount) return;
  const today = todayDate();
  const filter = state.agendaFilter || 'today';
  const all = plAgendaCollect();

  let scoped;
  if (filter === 'today')          scoped = all.filter(it => it.dueDate <= today);
  else if (filter === 'week')      { const r = _agendaSaudiWeekRange(today); scoped = all.filter(it => it.dueDate <= r.end); }
  else if (filter === 'month')     { const r = _agendaMonthRange(today);    scoped = all.filter(it => it.dueDate <= r.end); }
  else if (filter === 'reminders') scoped = all.filter(it => it.kind === 'reminder');
  else                              scoped = all;

  // Always compute the summary counts for the collapsed bar (independent of current filter)
  const _todayCount = all.filter(it => it.dueDate <= today).length;
  const _weekRange  = _agendaSaudiWeekRange(today);
  const _weekCount  = all.filter(it => it.dueDate <= _weekRange.end).length;
  const _remCount   = all.filter(it => it.kind === 'reminder').length;

  // ----- Collapsed mode: just a slim summary bar with a chevron. -----
  if (state.agendaCollapsed) {
    const summaryParts = [];
    summaryParts.push(`<b>${_todayCount}</b> ${t('agendaSummaryToday')}`);
    summaryParts.push(`<b>${_weekCount}</b> ${t('agendaSummaryWeek')}`);
    if (_remCount > 0) summaryParts.push(`<b>${_remCount}</b> ${t('agendaSummaryRem')}`);
    const isEmpty = (_todayCount + _weekCount + _remCount) === 0;
    mount.innerHTML = `
      <div class="pl-agenda pl-agenda-collapsed" onclick="plToggleAgenda()" role="button" tabindex="0"
           onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();plToggleAgenda();}"
           title="${t('agendaExpandHint')}">
        <div class="pl-agenda-bar">
          <span class="pl-agenda-bar-title">${t('agendaTitle')}</span>
          <span class="pl-agenda-bar-sep">—</span>
          <span class="pl-agenda-bar-summary">${isEmpty ? `<span class="pl-agenda-bar-empty">${t('agendaSummaryEmpty')}</span>` : summaryParts.join(' <span class="pl-ag-sep">·</span> ')}</span>
          <span class="pl-agenda-bar-chevron">▾</span>
        </div>
      </div>`;
    return;
  }

  const emptyKey = { today:'agendaNoneToday', week:'agendaNoneWeek', month:'agendaNoneMonth', reminders:'agendaNoneReminders', all:'agendaNoneAll' }[filter];
  const chip = (kind, label) => `<button class="pl-agenda-chip ${filter===kind?'active':''}" onclick="plSetAgendaFilter('${kind}')">${label}</button>`;

  const body = scoped.length === 0
    ? `<div class="pl-agenda-empty">${t(emptyKey)}</div>`
    : `<div class="pl-agenda-list">` + scoped.map(it => {
        const l = it.lead;
        const due = it.dueDate;
        const diff = businessDaysBetween(today, due);
        let whenCls = 'future', whenTxt = '';
        if (due < today)        { whenCls = 'overdue'; whenTxt = t('agendaOverdueTag'); }
        else if (due === today) { whenCls = 'today';   whenTxt = t('agendaTodayTag'); }
        else                    { whenCls = 'future';  whenTxt = t('agendaInDays', diff); }

        const stageDays = daysInCurrentStage(l);
        const value = Number(l.expectedValue) || 0;
        const valueLbl = value ? value.toLocaleString() + ' SAR' : '—';
        const score = leadScore(l);
        const tag = it.kind === 'reminder' ? t('agendaReminderTag') : t('agendaActionTag');
        const itemCls = it.kind === 'reminder' ? 'reminder' : whenCls;

        return `
          <div class="pl-agenda-item ${itemCls}" onclick="plOpenLeadForm('${l.id}')" title="${escapeHtml(l.companyName)} — ${escapeHtml(it.text)}">
            <div class="pl-ag-when ${whenCls}">${whenTxt}</div>
            <div class="pl-ag-body">
              <div class="pl-ag-action"><span class="pl-ag-tag">${tag}</span>${escapeHtml(it.text)}</div>
              <div class="pl-ag-context">
                <b>${escapeHtml(l.companyName)}</b>${l.contactName ? ' · ' + escapeHtml(l.contactName) : ''}
                <span class="pl-ag-sep">·</span>
                <span class="pl-ag-stage">${escapeHtml(l.stage)}</span>
                <span class="pl-ag-sep">·</span>
                <span class="pl-ag-value">${valueLbl}</span>
                <span class="pl-ag-sep">·</span>
                <span>${t('agendaStageDays', l.stage, stageDays)}</span>
                <span class="pl-ag-sep">·</span>
                <span>${t('agendaDueLabel')}: ${escapeHtml(due)}</span>
              </div>
            </div>
            <div class="pl-ag-meta">
              <span class="pl-ag-score">${score}</span>
              <span>${t('agendaScoreLabel')}</span>
            </div>
          </div>`;
      }).join('') + `</div>`;

  mount.innerHTML = `
   <div class="pl-agenda">
    <div class="pl-agenda-head">
      <div>
        <h3>${t('agendaTitle')}</h3>
        <div class="pl-agenda-sub">${t('agendaSub')}</div>
      </div>
      <div class="pl-agenda-count">${t('agendaCount', scoped.length)}</div>
      <button class="pl-agenda-collapse-btn" onclick="plToggleAgenda()" title="${t('agendaCollapseHint')}" aria-label="${t('agendaCollapseHint')}">▴</button>
    </div>
    <div class="pl-agenda-chips">
      ${chip('today',     t('agendaFilterToday'))}
      ${chip('week',      t('agendaFilterWeek'))}
      ${chip('month',     t('agendaFilterMonth'))}
      ${chip('reminders', t('agendaFilterReminders'))}
      ${chip('all',       t('agendaFilterAll'))}
    </div>
    ${body}
   </div>
  `;
}

function renderFocus() {
  const hot = state.leads.filter(isHot).length;
  const stale = state.leads.filter(isStale).length;
  const stuck = stuckLeads();
  const stuckIds = new Set(stuck.map(x => x.lead.id));
  const todayStr = todayDate();
  // Leads whose review reminder is due (today or earlier) but that aren't already in the stuck list.
  const remindOnly = state.leads.filter(l => !isClosed(l) && l.reminderDate && l.reminderDate <= todayStr && !stuckIds.has(l.id));
  const reminderLine = l => `<div class="pl-sug-action" style="color:var(--amber);font-weight:600">⏰ ${escapeHtml(t('reminderLine', l.companyName, l.reminderSetAt || l.reminderDate))}</div>`;

  let listHtml = '';
  // Due reminders first (proactive nudge), each links to edit the lead.
  remindOnly.forEach(l => {
    listHtml += `

  });
  const sugHtml = listHtml ? `<div class="pl-sug-list">${listHtml}</div>` : `<div class="pl-sug-empty">${t('noStuck')}</div>`;

  document.getElementById('pl-focus').innerHTML = `

      <div class="pl-focus-value">${hot}</div>
      <div class="pl-focus-meta">${t('focusHotMeta')}</div>
      <div class="pl-focus-hint">${t('focusClickHint')}</div>
    </div>
    <div class="pl-focus-card stale clickable${activeStale ? ' active' : ''}" role="button" tabindex="0"
         onclick="plToggleFocusFilter('stale')" onkeydown="plFocusCardKey(event,'stale')"
         aria-pressed="${activeStale}">
      <div class="pl-focus-label">${t('focusStale')}</div>
      <div class="pl-focus-value">${stale}</div>
      <div class="pl-focus-meta">${t('focusStaleMeta', getThresholds().staleDays)}</div>

function renderFocusChip() {
  const wrap = document.getElementById('pl-focus-chip-wrap');

}

function plToggleFocusFilter(kind) {
  // kind: 'hot' | 'stale' | 'aging'. Mutually exclusive; clicking the active one clears it.
  state.focusFilter = (state.focusFilter === kind) ? null : kind;
  renderFocus();
  renderStats();
  renderTable();
}
function plClearFocusFilter() {
  state.focusFilter = null;
  renderFocus();
  renderStats();
  renderTable();
}
function plFocusCardKey(ev, kind) {
  if (ev.key === 'Enter' || ev.key === ' ') {
    ev.preventDefault();

  }
}

/* ============================================================================
   STATS (kept from pipeline)
   ============================================================================ */
function computeStats() {
  const leads = state.leads;
  const winTimes = [], lossTimes = [];
  let aging = 0;
  leads.forEach(l => {
    if (l.stage === 'Closed Won') { const d = daysBetween(l.createdAt, l.closedAt); if (d != null) winTimes.push(d); }
    else if (l.stage === 'Closed Lost') { const d = daysBetween(l.createdAt, l.closedAt); if (d != null) lossTimes.push(d); }
    else { if (daysInSystem(l) > getThresholds().agingWarn) aging++; }
  });
  const avg = arr => arr.length ? Math.round(arr.reduce((s, x) => s + x, 0) / arr.length) : null;
  return { total: leads.length, avgWin: avg(winTimes), avgLoss: avg(lossTimes), aging };
}

function renderStats() {
  const s = computeStats();
  const dayStr = v => (v == null ? t('noData') : v + ' ' + t('days'));
  document.getElementById('pl-stats').innerHTML = `
    <div class="stat"><div class="stat-label">${t('statTotal')}</div><div class="stat-value">${s.total}</div></div>
    <div class="stat good"><div class="stat-label">${t('statAvgWin')}</div><div class="stat-value">${dayStr(s.avgWin)}</div></div>
    <div class="stat"><div class="stat-label">${t('statAvgLoss')}</div><div class="stat-value">${dayStr(s.avgLoss)}</div></div>
    <div class="stat ${s.aging > 0 ? 'warn' : ''} clickable${state.focusFilter === 'aging' ? ' active' : ''}" role="button" tabindex="0" aria-pressed="${state.focusFilter === 'aging'}" onclick="plToggleFocusFilter('aging')" onkeydown="plFocusCardKey(event,'aging')"><div class="stat-label">⏳ ${t('statAging', getThresholds().agingWarn)}</div><div class="stat-value">${s.aging}</div><div class="pl-focus-hint">${t('focusClickHint')}</div></div>`;
}

/* ============================================================================

function distinctSources() {

    if (l.leadSource === 'Other' && l.leadSourceCustom) set.add('custom:' + l.leadSourceCustom);
    else if (l.leadSource) set.add(l.leadSource);

}

function renderFilters() {

  const srcOpts = ['all', ...distinctSources()].map(s => {

    else label = t('src_' + s);

  }).join('');

function plSetFilter(key, value) { state.filters[key] = value; renderStats(); renderFocus(); renderTable(); }
function plSetSearch(value) {
  state.filters.search = value;

  if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}
function plSort(key) {
  if (state.sort.key === key) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';

/* ============================================================================
   TABLE
   ============================================================================ */
function filteredLeads() {
  const f = state.filters;
  const focus = state.focusFilter; // 'hot' | 'stale' | null
  let rows = state.leads.filter(l => {
    if (f.stage !== 'all' && l.stage !== f.stage) return false;
    if (f.type !== 'all' && l.leadType !== f.type) return false;
    if (f.source !== 'all') {
      if (f.source.startsWith('custom:')) {
        if (!(l.leadSource === 'Other' && l.leadSourceCustom === f.source.slice(7))) return false;
      } else if (l.leadSource !== f.source) return false;
    }
    if (f.search) {
      const q = f.search.toLowerCase();
      const hay = ((l.companyName || '') + ' ' + (l.contactName || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (focus === 'hot' && !isHot(l)) return false;
    if (focus === 'stale' && !isStale(l)) return false;
    if (focus === 'aging' && !isAging(l)) return false;
    return true;
  });

  const { key, dir } = state.sort;
  const mul = dir === 'asc' ? 1 : -1;
  rows.sort((a, b) => {
    let va, vb;
    switch (key) {
      case 'companyName': va = (a.companyName || '').toLowerCase(); vb = (b.companyName || '').toLowerCase(); break;
      case 'source': va = sourceLabel(a).toLowerCase(); vb = sourceLabel(b).toLowerCase(); break;
      case 'type': va = t('type_' + a.leadType).toLowerCase(); vb = t('type_' + b.leadType).toLowerCase(); break;
      case 'product': { const pa = getProduct(a.productId), pb = getProduct(b.productId); va = (pa ? pa.name : '').toLowerCase(); vb = (pb ? pb.name : '').toLowerCase(); break; }
      case 'daysInSystem': va = daysInSystem(a); vb = daysInSystem(b); break;
      case 'stage': va = STAGES.indexOf(a.stage); vb = STAGES.indexOf(b.stage); break;
      case 'probability': va = Number(a.probability) || 0; vb = Number(b.probability) || 0; break;
      case 'expectedValue': va = Number(a.expectedValue) || 0; vb = Number(b.expectedValue) || 0; break;
      case 'expectedCloseDate': va = a.expectedCloseDate || ''; vb = b.expectedCloseDate || ''; break;
      case 'score': va = leadScore(a); vb = leadScore(b); break;
      default: va = a.createdAt || ''; vb = b.createdAt || '';
    }
    if (va < vb) return -1 * mul;
    if (va > vb) return 1 * mul;
    return 0;
  });
  return rows;
}

function stageBadge(stage) {
  const cls = { 'Prospect': 'neutral', 'Qualified': 'blue', 'Proposal': 'sup', 'Negotiation': 'amber', 'Closed Won': 'green', 'Closed Lost': 'crit' }[stage] || 'neutral';
  return `<span class="badge ${cls}">${t('stage_' + stage)}</span>`;
}
function typeBadge(type) {
  const cls = { 'own-product': 'owned', 'partner-product': 'dev', 'open-source': 'blue', 'consulting': 'sup', 'other': 'custom-type' }[type] || 'neutral';
  return `<span class="badge ${cls}">${t('type_' + type)}</span>`;
}
function flagsHtml(lead) {
  const badges = [];
  if (isClosed(lead)) {
    const d = daysBetween(lead.createdAt, lead.closedAt);
    if (d != null) badges.push(`<span class="badge slate">${t('flagClosedDays', d)}</span>`);
  } else {
    const thr = getThresholds();
    const today = todayDate();
    if (lead.reminderDate) {
      if (lead.reminderDate <= today) {
        badges.push(`<span class="badge amber" title="${escapeHtml(t('reminderSet', lead.reminderDate))}">⏰ ${t('pendingReview')}</span>`);
      } else {
        const rem = daysBetween(nowISO(), lead.reminderDate);
        badges.push(`<span class="badge slate" title="${escapeHtml(t('reminderSet', lead.reminderDate))}">🕒 ${rem != null ? rem : 0}${t('daysShort')}</span>`);
      }
    }
    const age = daysInSystem(lead);
    if (age > thr.agingCrit) badges.push(`<span class="badge red">${t('flagAging60', thr.agingCrit)}</span>`);
    else if (age > thr.agingWarn) badges.push(`<span class="badge amber">${t('flagAging30', thr.agingWarn)}</span>`);
    const stale = businessDaysBetween(lead.updatedAt, nowISO());
    if (stale > thr.staleDays) badges.push(`<span class="badge slate">${t('flagStale', thr.staleDays)}</span>`);
  }
  return badges.length ? `<div class="badge-stack">${badges.join('')}</div>` : '<span style="color:var(--ink-faint)">—</span>';
}
function scoreHtml(lead) {
  const s = leadScore(lead);
  const cls = s >= 65 ? 'high' : (s >= 40 ? 'mid' : 'low');
  return `<div class="pl-score"><span class="pl-score-num">${s}</span><div class="pl-score-bar"><div class="pl-score-fill ${cls}" style="width:${s}%"></div></div></div>`;
}

function daysInSystem(lead) { return businessDaysBetween(lead.createdAt, nowISO()); }

/* ---- Deal velocity ---- */
// Accumulate business days spent in the stage a lead is leaving (stored on the lead's JSONB).
function recordStageDuration(lead, stage, enteredAtISO) {
  if (!stage || !VELOCITY_STAGES.includes(stage) || !enteredAtISO) return;
  const d = businessDaysBetween(enteredAtISO, nowISO());
  if (d <= 0) return;
  lead.stageDurations = lead.stageDurations || {};
  lead.stageDurations[stage] = (lead.stageDurations[stage] || 0) + d;
}
// Recalculate per-stage averages from all Closed Won leads and cache to localStorage.
function recomputeStageVelocity() {
  const acc = {}, cnt = {};
  state.leads.filter(l => l.stage === 'Closed Won' && l.stageDurations).forEach(l => {
    Object.keys(l.stageDurations).forEach(st => {
      if (!VELOCITY_STAGES.includes(st)) return;
      acc[st] = (acc[st] || 0) + l.stageDurations[st]; cnt[st] = (cnt[st] || 0) + 1;
    });
  });
  const cache = {};
  Object.keys(acc).forEach(st => { cache[st] = +(acc[st] / cnt[st]).toFixed(1); });
  try { localStorage.setItem(VELOCITY_KEY, JSON.stringify(cache)); } catch (e) {}
  _velCache = null;
  return cache;
}
let _velCache = null;
function getStageVelocity() {
  if (_velCache) return _velCache;
  let stored = {};
  try { const raw = localStorage.getItem(VELOCITY_KEY); if (raw) stored = JSON.parse(raw) || {}; } catch (e) {}
  _velCache = { vals: Object.assign({}, DEFAULT_VELOCITY, stored), real: stored };
  return _velCache;
}
// Returns a small ▲/▼/— arrow comparing current days-in-stage to the historical average.
function velocityArrow(lead) {
  if (isClosed(lead) || !VELOCITY_STAGES.includes(lead.stage)) return '';
  const cur = daysInCurrentStage(lead);
  if (cur < 1) return '';
  const avg = getStageVelocity().vals[lead.stage];
  if (avg == null) return '';
  if (cur < avg) return `<span class="pl-vel up" title="${escapeHtml(t('velFaster', avg))}">▲</span>`;
  if (cur > avg) return `<span class="pl-vel down" title="${escapeHtml(t('velSlower', avg))}">▼</span>`;
  return `<span class="pl-vel flat" title="${escapeHtml(t('velAvg', avg))}">—</span>`;
}

/* Row highlight priority: closed > overdue > critical(>60d) > stale(>30d) > stale stage(>15d). */
function rowClass(lead) {
  if (isClosed(lead)) return '';
  const today = todayDate();
  if (lead.nextActionDue && lead.nextActionDue < today) return 'row-overdue';
  const thr = getThresholds();
  const dis = daysInSystem(lead);
  if (dis > thr.agingCrit) return 'row-critical';
  if (dis > thr.agingWarn) return 'row-stale';
  if (daysInCurrentStage(lead) > thr.stageStaleDays) return 'row-stale';
  return '';
}

/* Next action + deadline cell; overdue (and not closed) shows red bold. */
function actionDueHtml(lead) {
  if (!lead.nextAction) return '<span style="color:var(--ink-faint)">—</span>';
  const today = todayDate();
  const overdue = lead.nextActionDue && !isClosed(lead) && lead.nextActionDue < today;
  const due = lead.nextActionDue ? escapeHtml(lead.nextActionDue) : '';
  const txt = escapeHtml(lead.nextAction);
  if (overdue) return `<div class="pl-actiondue-overdue">⏰ ${txt}${due ? ` · ${due}` : ''}</div>`;
  return `<div>${txt}${due ? `<div class="sub">${due}</div>` : ''}</div>`;
}

/* Returns the first "warm" key contact (High influence OR Warm relationship), or null. */
function warmKeyContact(lead) {
  if (!lead || !Array.isArray(lead.keyContacts)) return null;
  return lead.keyContacts.find(c => c && (c.influence === 'High' || c.relationship === 'Warm')) || null;

/* Returns the product's acceleration tip for this lead's current stage, or '' if none. */
function productStageTip(lead) {
  if (!lead || !lead.productId) return '';
  const p = getProduct(lead.productId);
  if (!p || !p.stageTips) return '';
  const tip = p.stageTips[lead.stage];
  return (typeof tip === 'string' && tip.trim()) ? tip.trim() : '';
}

async function plSaveLead(id) {
  const companyName = document.getElementById('pl-f-company').value.trim();
  if (!companyName) { alert(t('alertCompanyRequired')); return; }

  plSyncAttachmentsFromDOM();
  const attachments = editAttachments.filter(a => a.name || a.url || a.description);
  plSyncKeyContactsFromDOM();
  const keyContacts = editKeyContacts.filter(c => c.name || c.role || c.introPath).slice(0, 3);

  const leadSource = document.getElementById('pl-f-source').value;
  const leadType = document.getElementById('pl-f-type').value;
  const stage = document.getElementById('pl-f-stage').value;
  const manualProbability = document.getElementById('pl-f-manual').checked;
  const nextAction = document.getElementById('pl-f-nextaction').value.trim();
  const nextActionDue = document.getElementById('pl-f-deadline').value || null;

  // Require action + deadline ONLY when the stage actually changes (edit case).
  if (id) {
    const existingLead = state.leads.find(l => l.id === id);
    if (existingLead && existingLead.stage !== stage && !CLOSED_STAGES.includes(stage) && (!nextAction || !nextActionDue)) {
      alert(t('alertStageNeedsAction'));
      return;
    }
  }

  const data = {
    companyName,
    contactName: document.getElementById('pl-f-contact').value.trim(),
    contactDesignation: document.getElementById('pl-f-designation').value.trim(),
    contactEmail: document.getElementById('pl-f-email').value.trim(),
    contactPhone: document.getElementById('pl-f-phone').value.trim(),
    leadSource,
    leadSourceCustom: leadSource === 'Other' ? document.getElementById('pl-f-source-custom').value.trim() : '',
    leadType,
    productId: document.getElementById('pl-f-product').value || '',
    partnerId: leadType === 'partner-product' ? document.getElementById('pl-f-partner').value : '',
    stage,
    manualProbability,
    probability: Math.max(0, Math.min(100, parseInt(document.getElementById('pl-f-prob').value, 10) || 0)),
    expectedValue: parseFloat(document.getElementById('pl-f-value').value) || 0,
    expectedCloseDate: document.getElementById('pl-f-close').value || null,
    notes: document.getElementById('pl-f-notes').value.trim(),
    nextAction,
    nextActionDue,
    attachments,
    keyContacts
  };

  // If this save closes the lead (Won/Lost) for the first time (or switches closure type),
  // capture a Win/Loss reason first, then finalize.
  const existing = id ? state.leads.find(l => l.id === id) : null;
  const isClosingNow = CLOSED_STAGES.includes(data.stage) && (!existing || existing.stage !== data.stage);
  if (isClosingNow) {
    pendingClose = { id, data, prevNotes: existing ? (existing.wonLostNotes || '') : '' };
    plOpenReasonModal(data.stage);
    return;
  }
  await finalizeSaveLead(id, data, null);
}

/* Commit a lead save. closeInfo = {reason, notes} when the lead is being closed now. */
async function finalizeSaveLead(id, data, closeInfo) {
  let lead;
  if (id) {
    lead = state.leads.find(l => l.id === id);
    const wasClosed = isClosed(lead);
    const prevStage = lead.stage;
    const prevEnteredAt = lead.stageEnteredAt;
    const stageChanged = prevStage !== data.stage;
    Object.assign(lead, data);
    lead.updatedAt = nowISO();
    if (stageChanged) {
      recordStageDuration(lead, prevStage, prevEnteredAt);  // learn velocity from time in the stage being left
      lead.stageEnteredAt = nowISO();
      // Auto-clear any review reminder on stage change.
      lead.reminderDate = null; lead.reminderReason = ''; lead.reminderSetAt = null;
    }
    if (isClosed(lead)) {
      if (closeInfo) {
        lead.wonLostReason = closeInfo.reason;
        lead.wonLostNotes = closeInfo.notes;
        lead.closedStage = lead.stage;
        lead.closedAt = nowISO();
      } else if (!wasClosed) {
        lead.closedAt = nowISO();
      }
    } else {
      // Re-opened: clear closure data.
      lead.closedAt = null;
      lead.wonLostReason = '';
      lead.wonLostNotes = '';
      lead.closedStage = null;
    }
    if (isClosed(lead)) { lead.reminderDate = null; lead.reminderReason = ''; lead.reminderSetAt = null; }
    if (lead.stage === 'Closed Won') recomputeStageVelocity();
    toast(t('toastSaved'));
  } else {
    lead = {
      id: uid(), ...data,
      createdAt: nowISO(), updatedAt: nowISO(),
      stageEnteredAt: nowISO(),
      closedAt: CLOSED_STAGES.includes(data.stage) ? nowISO() : null
    };
    if (CLOSED_STAGES.includes(lead.stage) && closeInfo) {
      lead.wonLostReason = closeInfo.reason;
      lead.wonLostNotes = closeInfo.notes;
      lead.closedStage = lead.stage;
    }
    state.leads.push(lead);
    if (lead.stage === 'Closed Won') recomputeStageVelocity();
    toast(t('toastAdded'));
  }
  closeModal();
  render();
  await persistRow('leads', lead);
}

async function plSetReminder(id) {

const WON_REASONS = ['won_pricing', 'won_fit', 'won_relationship', 'won_technical', 'won_urgent', 'won_other'];
const LOST_REASONS = ['lost_budget', 'lost_competitor', 'lost_nodecision', 'lost_fit', 'lost_timing', 'lost_relationship', 'lost_other'];
let pendingClose = null;

function plOpenReasonModal(stage) {
  const won = stage === 'Closed Won';
  const reasons = won ? WON_REASONS : LOST_REASONS;
  const opts = '<option value="">' + t('reasonSelect') + '</option>' +
    reasons.map(r => '<option value="' + r + '">' + t('reason_' + r) + '</option>').join('');
  const prevNotes = pendingClose ? (pendingClose.prevNotes || '') : '';
  const body =
    '<div class="form-row"><label>' + t('reasonLabel') + ' *</label><select id="pl-reason-select">' + opts + '</select></div>' +
    '<div class="form-row"><label>' + t('reasonNotes') + '</label><textarea id="pl-reason-notes">' + escapeHtml(prevNotes) + '</textarea></div>';
  openModal(won ? t('reasonWonTitle') : t('reasonLostTitle'), body,
    '<button class="btn" onclick="plConfirmClose()">' + t('save') + '</button>' +
    '<button class="btn ghost" onclick="plCancelClose()">' + t('cancel') + '</button>');
}
function plConfirmClose() {
  if (!pendingClose) { closeModal(); return; }
  const reason = document.getElementById('pl-reason-select').value;
  if (!reason) { alert(t('reasonRequired')); return; }
  const notes = document.getElementById('pl-reason-notes').value.trim();
  const ctx = pendingClose; pendingClose = null;
  finalizeSaveLead(ctx.id, ctx.data, { reason: reason, notes: notes });
}
function plCancelClose() {
  // Abort the closure; re-open the edit form so the user can adjust the stage.
  const ctx = pendingClose; pendingClose = null;
  closeModal();
  if (ctx && ctx.id) plOpenLeadForm(ctx.id);
}

/* ============================================================================
   WIN/LOSS ANALYSIS
   ============================================================================ */
let wlFrom = '', wlTo = '';
function reasonLabel(key) { return (!key) ? t('reasonNone') : (T[currentLang]['reason_' + key] ? t('reason_' + key) : key); }
function wlInRange(closedAt) {
  if (!wlFrom && !wlTo) return true;
  if (!closedAt) return false;
  const d = String(closedAt).slice(0, 10);
  if (wlFrom && d < wlFrom) return false;
  if (wlTo && d > wlTo) return false;
  return true;
}
function wlTally(list) {
  const map = {};
  list.forEach(l => { const k = l.wonLostReason || ''; map[k] = (map[k] || 0) + 1; });
  const total = list.length || 1;
  return Object.keys(map).map(k => ({ key: k, count: map[k], pct: Math.round(map[k] / total * 100) }))
    .sort((a, b) => b.count - a.count);
}
function plOpenWinLoss() {
  const closed = state.leads.filter(l => isClosed(l) && wlInRange(l.closedAt));
  const won = closed.filter(l => l.stage === 'Closed Won');
  const lost = closed.filter(l => l.stage === 'Closed Lost');
  const winRate = (won.length + lost.length) ? Math.round(won.length / (won.length + lost.length) * 100) : null;

  const rows = (list, cls) => {
    if (!list.length) return '<div class="wl-empty">' + (cls === 'won' ? t('wlNoWon') : t('wlNoLost')) + '</div>';
    const tally = wlTally(list);
    return tally.map(r =>
      '<div class="wl-row ' + cls + '"><span class="lbl">' + escapeHtml(reasonLabel(r.key)) + '</span>' +
      '<span class="bar"><span style="width:' + r.pct + '%"></span></span>' +
      '<span class="cnt">' + r.count + ' · ' + r.pct + '%</span></div>'
    ).join('');
  };

  const body =
    '<div class="wl-filter">' +

   CONVERT TO PARTNER & PROJECT (unchanged from pipeline)
   ============================================================================ */
function plConvertLead(id) {
  const lead = state.leads.find(l => l.id === id);
  if (!lead || isClosed(lead)) return;
  openModal(t('convTitle'),
    `<p style="font-size:14px;color:var(--ink-muted)">${t('convMsg', escapeHtml(lead.companyName))}</p>`,
    `<button class="btn gold" onclick="plConfirmConvert('${id}')">${t('confirmConvert')}</button>
     <button class="btn ghost" onclick="closeModal()">${t('cancel')}</button>`);
}
async function plConfirmConvert(id) {
  const lead = state.leads.find(l => l.id === id);
  if (!lead || isClosed(lead)) { closeModal(); return; }
  closeModal();

  let partnerId = lead.partnerId || '';
  const ops = [];

  // Create a partner only if the lead isn't already linked to one.
  if (!partnerId) {
    const newPartner = {
      id: uid(), name: lead.companyName,
      type: 'other', customType: 'Client',
      contact: lead.contactName || '', phone: lead.contactPhone || '',
      email: lead.contactEmail || '', notes: lead.notes || '',
      team: [], createdAt: todayDate()
    };
    partnerId = newPartner.id;
    state.partners.push(newPartner);
    ops.push(persistRow('partners', newPartner));
  }

  // Mark the lead as Closed Won. Do NOT create a project — the user will do that in governance.
  lead.stage = 'Closed Won';
  lead.wonLostReason = 'won_converted';
  lead.wonLostNotes = '';
  lead.closedStage = 'Closed Won';
  lead.closedAt = nowISO();
  lead.updatedAt = nowISO();
  lead.stageEnteredAt = nowISO();
  if (!lead.partnerId) lead.partnerId = partnerId;
  ops.push(persistRow('leads', lead));

  render();
  await Promise.all(ops);
  toast(t('toastConverted'));

  // Open the governance partner detail page in a new tab so the user can create the project there.
  try {
    window.open('index.html?view=partnerDetail&partnerId=' + encodeURIComponent(partnerId), '_blank');
  } catch (e) { /* popup blocked — user still has the toast */ }
}

/* ============================================================================
   CSV EXPORT (filtered leads, all columns)
   ============================================================================ */
function csvCell(v) {
  if (v == null) v = '';
  v = String(v).replace(/"/g, '""');
  return `"${v}"`;
}
function plExportCSV() {
  const rows = filteredLeads();
  const headers = [
    'Company', 'Contact Name', 'Designation', 'Email', 'Phone',
    'Source', 'Type', 'Product', 'Partner', 'Stage',
    'Probability (%)', 'Manual Override', 'Expected Value (SAR)', 'Expected Close Date', 'Next Action', 'Deadline',
    'Lead Score', 'Days In Stage',
    'Created At', 'Updated At', 'Closed At', 'Attachments', 'Notes'
  ];
  const lines = [headers.map(csvCell).join(',')];

  rows.forEach(l => {
    const product = getProduct(l.productId);
    const partner = l.partnerId ? state.partners.find(p => p.id === l.partnerId) : null;
    const attachStr = (l.attachments || []).map(a => `${a.name || ''} (${a.url || ''})`).join(' | ');
    lines.push([
      l.companyName, l.contactName, l.contactDesignation, l.contactEmail, l.contactPhone,
      l.leadSource === 'Other' ? (l.leadSourceCustom || 'Other') : l.leadSource,
      l.leadType, product ? product.name : '', partner ? partner.name : '', l.stage,
      Number(l.probability) || 0, l.manualProbability ? 'Yes' : 'No',
      Number(l.expectedValue) || 0, l.expectedCloseDate || '', l.nextAction || '', l.nextActionDue || '',
      leadScore(l), daysInCurrentStage(l),
      l.createdAt || '', l.updatedAt || '', l.closedAt || '',
      attachStr, l.notes
    ].map(csvCell).join(','));
  });

  const csv = '\uFEFF' + lines.join('\r\n'); // BOM for Excel/Arabic
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'opportunities_export_' + todayDate() + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(t('toastExported'));
}

/* ============================================================================
   EXECUTIVE PDF REPORT (print-to-PDF; no external dependencies)
   ============================================================================ */
function plReportMetrics() {
  const leads = state.leads;
  const open = leads.filter(l => !isClosed(l));
  const won = leads.filter(l => l.stage === 'Closed Won');
  const lost = leads.filter(l => l.stage === 'Closed Lost');
  const pipelineValue = open.reduce((s, l) => s + (Number(l.expectedValue) || 0), 0);
  const weighted = open.reduce((s, l) => s + (Number(l.expectedValue) || 0) * ((Number(l.probability) || 0) / 100), 0);
  const winRate = (won.length + lost.length) ? Math.round(won.length / (won.length + lost.length) * 100) : null;
  const stats = computeStats();
  const hot = leads.filter(isHot).length;
  const stale = leads.filter(isStale).length;
  const byStage = CONFIGURABLE_STAGES.map(st => {
    const ls = open.filter(l => l.stage === st);
    return { stage: st, count: ls.length, value: ls.reduce((s, l) => s + (Number(l.expectedValue) || 0), 0) };
  });
  const top = open.slice().sort((a, b) => leadScore(b) - leadScore(a)).slice(0, 6);
  const today = todayDate();
  const needsMap = {};
  open.forEach(l => {
    const reasons = [];
    if (l.nextActionDue && l.nextActionDue < today) reasons.push('overdue');
    if (businessDaysBetween(stageEnteredAt(l), nowISO()) > getThresholds().stuckBizDays) reasons.push('stuck');
    if (l.stage === 'Negotiation' && (Number(l.expectedValue) || 0) > 200000) reasons.push('highvalue');
    if (reasons.length) needsMap[l.id] = { lead: l, reasons: reasons };
  });
  const needs = Object.values(needsMap).sort((a, b) => leadScore(b.lead) - leadScore(a.lead));
  return { total: leads.length, open: open.length, won: won.length, lost: lost.length, pipelineValue: pipelineValue, weighted: weighted, winRate: winRate, stats: stats, hot: hot, stale: stale, byStage: byStage, top: top, needs: needs };
}
