// Builds the printable daily-report popup. If existingEntry passed, reuses its
// params and metadata (for re-print from archive). Otherwise reads from current
// state.filters and creates a new entry.
function openDailyReportPopup(existingEntry) {
  let entry = existingEntry;
  let period, reportDate, includePrevious, groupBy;
  if (entry) {
    period = entry.params.period;
    reportDate = entry.params.reportDate;
    includePrevious = !!entry.params.includePrevious;
    groupBy = entry.params.groupBy || 'status';
  } else {
    period = state.filters.reportPeriod || 'today';
    reportDate = state.filters.reportDate || todayDate();
    includePrevious = !!state.filters.reportIncludePrevious;
    groupBy = state.filters.reportGroupBy || 'status';
  }

  const range = getReportPeriodRange(period, reportDate);
  let periodLabel;
  if (period === 'today') periodLabel = fmtDate(reportDate);
  else if ((period === 'week' || period === 'month' || period === 'range') && range) periodLabel = t('reportRange', fmtDate(range.start), fmtDate(range.end));
  else periodLabel = t('reportPeriodAll');

  const title = `${t('reportSectionNav')} — ${periodLabel}`;
  if (!entry) entry = saveReportEntry('daily', { period, reportDate, includePrevious, groupBy }, title);

  let actions;
  if (period === 'all') actions = [...state.actions];
  else actions = filterActionsByPeriod(state.actions, period, reportDate);
  // Only conducted (completed) meetings count in reports
  actions = actions.filter(a => isTask(a) || isCompleted(a));

  let carriedOver = [];
  if (period !== 'all' && includePrevious && range) {
    carriedOver = state.actions
      .filter(a => a.dueDate && a.dueDate < range.start && isOpen(a) && isTask(a))
      .sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
  }

  const completed = actions.filter(isCompleted);
  const open = actions.filter(isOpen);
  const meetings = actions.filter(a => isMeeting(a) && isCompleted(a));
  const openTasks = open.filter(a => !isMeeting(a) && getDelayDays(a) === 0);
  const openTasksDelayed = open.filter(a => !isMeeting(a) && getDelayDays(a) > 0);
  const completedTasks = completed.filter(a => !isMeeting(a));
  const sortByDue = (a, b) => (a.dueDate || '').localeCompare(b.dueDate || '');

  function section(label, items, sortFn) {
    if (items.length === 0) return '';
    const sorted = sortFn ? [...items].sort(sortFn) : items;
    return `<h2>${label} (${items.length})</h2>${renderReportTasksTable(sorted)}`;
  }

  let bodySections = '';
  if (carriedOver.length > 0) {
    bodySections += section(t('sectionCarriedOver'), carriedOver, sortByDue);
  }

  if (actions.length === 0 && carriedOver.length === 0) {
    bodySections += `<div style="color:#888;padding:20px;text-align:center">${t('noActionsInPeriod')}</div>`;
  } else if (groupBy !== 'status') {
    // Project-wise / partner-wise printable grouping
    const groups = {};
    actions.forEach(a => {
      const key = (groupBy === 'partner' ? a.partnerId : a.projectId) || '__none__';
      (groups[key] = groups[key] || []).push(a);
    });
    const nameOf = (key) => {
      if (key === '__none__') return '—';
      if (groupBy === 'partner') { const p = getPartner(key); return p ? p.name : '—'; }
      const pr = getProject(key); return pr ? pr.name : '—';
    };
    const keys = Object.keys(groups).sort((ka,kb) => {
      const aP = groups[ka].filter(x=>isTask(x)&&isOpen(x)&&getDelayDays(x)>0).length;
      const bP = groups[kb].filter(x=>isTask(x)&&isOpen(x)&&getDelayDays(x)>0).length;
      if (aP !== bP) return bP - aP;
      return nameOf(ka).localeCompare(nameOf(kb));
    });
    keys.forEach(key => {
      const items = groups[key];
      const ordered = [
        ...items.filter(x=>isTask(x)&&isOpen(x)&&getDelayDays(x)>0).sort((a,b)=>getDelayDays(b)-getDelayDays(a)),
        ...items.filter(x=>isTask(x)&&isOpen(x)&&getDelayDays(x)===0).sort(sortByDue),
        ...items.filter(isMeeting).sort(sortByDue),
        ...items.filter(x=>isTask(x)&&isCompleted(x)).sort(sortByDue),
        ...items.filter(x=>isTask(x)&&isMissed(x))
      ];
      const done = items.filter(x=>isTask(x)&&isCompleted(x)).length;
      const openCnt = items.filter(x=>isTask(x)&&isOpen(x)).length;
      const mtgCnt = items.filter(isMeeting).length;
      bodySections += `<h2>${groupBy==='partner'?'👤':'📁'} ${escapeHtml(nameOf(key))}</h2>
        <div class="group-label">${t('groupSummaryLine', items.length, done, openCnt, mtgCnt)}</div>
        ${renderReportTasksTable(ordered)}`;
    });
  } else if (period === 'all') {
    const sorted = [...open].sort((a, b) => getDelayDays(b) - getDelayDays(a));
    const byRisk = { critical: [], high: [], medium: [], low: [] };
    sorted.forEach(a => { byRisk[getRiskLevel(getDelayDays(a)).key].push(a); });
    const labels = { critical: t('riskCriticalGroup'), high: t('riskHighGroup'), medium: t('riskMediumGroup'), low: t('riskLowGroup') };
    ['critical','high','medium','low'].forEach(key => {
      bodySections += section(labels[key], byRisk[key]);
    });
    if (completed.length > 0) {
      bodySections += section(t('sectionTasksCompletedInPeriod'), completed.slice(0, 30));
    }
  } else {
    bodySections += section(t('sectionMeetingsConducted'), meetings, sortByDue);
    bodySections += section(t('sectionTasksMissedInPeriod'), openTasksDelayed, (a,b) => getDelayDays(b) - getDelayDays(a));
    bodySections += section(t('sectionTasksOpenInPeriod'), openTasks, sortByDue);
    bodySections += section(t('sectionTasksCompletedInPeriod'), completedTasks, sortByDue);
  }

  const body = `
    <h1>📋 ${t('reportSectionNav')}</h1>
    <div class="meta">${escapeHtml(periodLabel)}${includePrevious && carriedOver.length>0 ? ` · +${carriedOver.length} ${t('sectionCarriedOver').replace('📌 ','')}` : ''}</div>

    <h2>${t('reportSummary')}</h2>
    <div class="stats4">
      <div class="stat-cell"><div class="v">${actions.length}</div><div class="l">${t('statTotalInPeriod')}</div></div>
      <div class="stat-cell"><div class="v" style="color:var(--green)">${completed.length}</div><div class="l">${t('statCompletedInPeriod')}</div></div>
      <div class="stat-cell"><div class="v" style="color:var(--amber)">${open.length}</div><div class="l">${t('statOpenInPeriod')}</div></div>
      <div class="stat-cell"><div class="v">${meetings.length}</div><div class="l">${t('statMeetingsConducted')}</div></div>
    </div>

    ${bodySections}
  `;
  openReportWindow(title, body, entry);
}

// Re-print an archived report by ID
function reprintReport(entryId) {
  const entry = (state.reports || []).find(r => r.id === entryId);
  if (!entry) { toast(t('reportNoData')); return; }
  switch (entry.type) {
    case 'daily':         openDailyReportPopup(entry); break;
    case 'project':       printProjectReport(entry.params.projectId, entry); break;
    case 'partner':       printPartnerReport(entry.params.partnerId, entry); break;
    case 'project-tasks': printProjectTasksReport(entry.params.projectId, entry); break;
    case 'tasks-global':  printAllTasksReport(entry); break;
  }
}

// Delete a report from the archive
function deleteReportEntry(entryId) {
  const entry = (state.reports || []).find(r => r.id === entryId);
  if (!entry) return;
  if (!confirm(t('confirmDeleteReport', entry.title || entry.number))) return;
  state.reports = state.reports.filter(r => r.id !== entryId);
  saveState();
  toast(t('toastReportDeleted'));
  render();
}

function openReportWindow(title, body, metadata) {
  const w = window.open('', '_blank');
  if (!w) { alert(t('alertPopupBlocked')); return; }
  w.document.open();
  w.document.write(buildReportHTML(title, body, metadata));
  w.document.close();
}

/* ========== NOTIFICATIONS ========== */
const UPCOMING_NOTIFY_DAYS = 3;

// Returns an array of open tasks due today, within next N days, and overdue
function computePendingTasks() {
  const today = todayDate();
  const open = state.actions.filter(isOpen);
  const dueToday = open.filter(a => a.dueDate === today);
  const upcoming = open.filter(a => {
    if (!a.dueDate) return false;
    const diff = daysBetween(today, a.dueDate);
    return diff > 0 && diff <= UPCOMING_NOTIFY_DAYS;
  });
  const overdue = open.filter(a => getDelayDays(a) > 0);
  return { dueToday, upcoming, overdue };
}

function renderNotificationBanner() {
  if (dismissedToday()) return '';
  const { dueToday, upcoming, overdue } = computePendingTasks();
  if (dueToday.length === 0 && upcoming.length === 0 && overdue.length === 0) return '';
  // Build body text — show the most informative combination
  let body;
  const flags = (dueToday.length>0?1:0) + (upcoming.length>0?1:0) + (overdue.length>0?1:0);
  if (flags >= 2) {
    body = t('notifFull', dueToday.length, upcoming.length, overdue.length);
  } else if (dueToday.length > 0) {
    body = t('notifTodayOnly', dueToday.length);
  } else if (upcoming.length > 0) {
    body = t('notifUpcomingOnly', upcoming.length);
  } else {
    body = t('notifOverdueOnly', overdue.length);
  }

  // Build a compact preview of upcoming tasks (max 3)
  const previewList = [...dueToday, ...upcoming]
    .sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate))
    .slice(0, 3);
  const previewHTML = previewList.length > 0 ? `
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
      ${previewList.map(a => {
        const diff = daysBetween(todayDate(), a.dueDate);
        const when = diff === 0 ? t('today') : diff === 1 ? t('inOneDay') : diff === 2 ? t('inTwoDays') : t('upcomingDays', diff);
        return `<div style="font-size:12px;color:var(--ink-muted)">
          <span style="color:var(--accent-warm);font-weight:500">${when}</span> — ${isMeeting(a) ? '🗓 ' : ''}${escapeHtml(a.title)}
        </div>`;
      }).join('')}
    </div>
  ` : '';

  return `
    <div class="notif-banner" id="notif-banner">
      <div class="notif-banner-icon">🔔</div>
      <div class="notif-banner-content">
        <div class="notif-banner-title">${t('notifBannerTitle')}</div>
        <div class="notif-banner-body">${body}</div>
        ${previewHTML}
      </div>
      <div class="notif-banner-actions">
        <button class="btn sm" onclick="goToAgendaToday()">${t('notifViewAll')}</button>
        <button class="btn ghost sm" onclick="dismissNotificationBanner()">${t('notifDismiss')}</button>
      </div>
    </div>
  `;
}

function dismissedToday() {
  return localStorage.getItem('notif_dismissed') === todayDate();
}

function dismissNotificationBanner() {
  try { localStorage.setItem('notif_dismissed', todayDate()); } catch(e) {}
  const el = document.getElementById('notif-banner');
  if (el) el.style.display = 'none';
}

function notificationPermissionState() {
  if (!('Notification' in window)) return 'unsupported';
  return Notification.permission; // 'default', 'granted', 'denied'
}

function requestNotificationPermission() {
  if (!('Notification' in window)) {
    alert('Browser does not support notifications');
    return;
  }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      toast(t('notificationsEnabled'));
      sendDailyNotification(true); // force-send a sample
    }
    renderSidebar();
  });
}

function sendDailyNotification(force) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const today = todayDate();
  if (!force && localStorage.getItem('last_notification_sent') === today) return;

  const { dueToday, upcoming, overdue } = computePendingTasks();
  if (dueToday.length === 0 && upcoming.length === 0 && overdue.length === 0 && !force) return;

  let body;
  const flags = (dueToday.length>0?1:0) + (upcoming.length>0?1:0) + (overdue.length>0?1:0);
  if (flags >= 2) body = t('notifFull', dueToday.length, upcoming.length, overdue.length);
  else if (dueToday.length > 0) body = t('notifTodayOnly', dueToday.length);
  else if (upcoming.length > 0) body = t('notifUpcomingOnly', upcoming.length);
  else if (overdue.length > 0) body = t('notifOverdueOnly', overdue.length);
  else body = t('appTitle');

  try {
    new Notification(t('notifTitle'), { body, lang: currentLang, dir: currentLang === 'ar' ? 'rtl' : 'ltr', tag: 'governance-daily' });
    localStorage.setItem('last_notification_sent', today);
  } catch (e) { /* silent */ }
}

/* ========== EXPORTS ========== */
function exportCSV() {
  const period = state.filters.reportPeriod || 'today';
  const reportDate = state.filters.reportDate || todayDate();
  const range = getReportPeriodRange(period, reportDate);
  const includePrevious = !!state.filters.reportIncludePrevious;

  // Mirror the on-screen report's data selection
  let actions;
  if (period === 'all') {
    actions = state.actions.filter(isOpen).sort((a,b) => getDelayDays(b) - getDelayDays(a));
  } else {
    actions = filterActionsByPeriod(state.actions, period, reportDate)
      .sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
    if (includePrevious && range) {
      const carried = state.actions
        .filter(a => a.dueDate && a.dueDate < range.start && isOpen(a))
        .sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
      // Prepend carried-over items so they appear first
      actions = [...carried, ...actions];
    }
  }

  const rows = [[
    t('csvType'), t('csvTitle'), t('csvProject'), t('csvPartner'), t('csvPartnerType'),
    t('csvPriority'), t('csvDueDate'), t('csvTime'), t('csvDelayDays'), t('csvRisk'),
    t('csvStatus'), t('csvReason')
  ]];
  actions.forEach(a => {
    const p = getPartner(a.partnerId);
    const pr = getProject(a.projectId);
    const d = getDelayDays(a);
    const r = getRiskLevel(d);
    const statusMap = {
      open: t('statusOpen'), scheduled: t('statusScheduled'),
      postponed: t('statusPostponed'), completed: t('statusCompleted'),
      missed: t('statusMissed')
    };
    const priorityMap = {
      high: t('priorityHigh'), medium: t('priorityMedium'), low: t('priorityLow')
    };
    rows.push([
      isMeeting(a) ? t('typeMeetingShort') : t('typeTaskShort'),
      a.title,
      pr ? pr.name : '',
      p ? p.name : '',
      p ? getPartnerTypeLabel(p.type, p.customType) : '',
      priorityMap[a.priority] || '',
      a.dueDate || '',
      a.meetingTime || '',
      d,
      r.label,
      statusMap[a.status] || a.status,
      (a.tracking && a.tracking.length > 0) ? a.tracking.map(e => e.text).join(' | ') : (a.reason || '')
    ]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  // Filename reflects the period
  let filename;
  if (period === 'today') filename = `report-${reportDate}.csv`;
  else if (period === 'week') filename = `report-week-${range.start}-to-${range.end}.csv`;
  else if (period === 'month') filename = `report-month-${reportDate.slice(0,7)}.csv`;
  else filename = `report-all-${todayDate()}.csv`;

  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
  toast(t('toastCSVExported'));
}

function exportPDF() {
  toast(t('toastUsePrintToPDF'));
  setTimeout(() => window.print(), 300);
}

function exportData() {
  const data = {
    partners: state.partners,
    projects: state.projects,
    actions: state.actions,
    team: state.team || [],
    reports: state.reports || [],
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `governance-backup-${todayDate()}.json`;
  link.click();
  URL.revokeObjectURL(url);
  toast(t('toastBackupExported'));
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm(t('confirmReplaceData'))) return;
      state.partners = data.partners || [];
      state.projects = data.projects || [];
      state.actions = data.actions || [];
      // Restore internal team & reports when present (don't wipe existing if an older
      // backup omitted them).
      if (Array.isArray(data.team)) state.team = data.team;
      else if (!Array.isArray(state.team)) state.team = [];
      if (Array.isArray(data.reports)) state.reports = data.reports;
      else if (!Array.isArray(state.reports)) state.reports = [];
      // Run migrations on imported data
      state.actions.forEach(a => { if (!a.type) a.type = 'task'; });
      state.projects.forEach(p => { if (!Array.isArray(p.attachments)) p.attachments = []; });
      if (typeof migrateProjectsToContributions === 'function') migrateProjectsToContributions();
      if (typeof migrateBilingualContent === 'function') migrateBilingualContent();
      saveState();
      toast(t('toastDataImported'));
      render();
    } catch (err) {
      alert(t('alertInvalidFile'));
    }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm(t('confirmClearAll1'))) return;
  if (!confirm(t('confirmClearAll2'))) return;
  state.partners = [];
  state.projects = [];
  state.actions = [];
  localStorage.removeItem(STORE_KEY);
  toast(t('toastDataCleared'));
  navigate('dashboard');
}

/* ========== INIT ========== */
applyLangToDocument();
if (!loadState()) {
  // First time, load sample data
  loadSampleData();
  // NEW: apply startDate migration to seed tasks
  state.actions.forEach(a => {
    if (a.type !== 'meeting' && !a.startDate) {
      const proj = state.projects.find(pr => pr.id === a.projectId);
      if (proj && proj.startDate) a.startDate = proj.startDate;
      else if (a.dueDate) { const d = new Date(a.dueDate+'T00:00:00'); d.setDate(d.getDate()-7); a.startDate = d.toISOString().slice(0,10); }
      else a.startDate = todayDate();
    }
  });
  // NEW: normalize seed projects (engagement model, revenue certainty, SAR currency)
  state.projects.forEach(pr => {
    if (pr.partnershipCurrency === 'USD') pr.partnershipCurrency = 'SAR';
    if (!pr.engagementModel) {
      pr.engagementModel = pr.partnershipModel === 'percentage' ? 'joint-venture' : 'client-fixed';
    }
    if (pr.revenueCertainty === undefined || pr.revenueCertainty === null) {
      pr.revenueCertainty = ['joint-venture', 'own-strategic', 'own-vendor'].includes(pr.engagementModel) ? 0.4 : 1.0;
    }
  });
  migrateProjectsToContributions();
}
state.currentView = 'dashboard';
migrateBilingualContent(); // backfill dual-language title/name slots
loadConfig(); // apply any saved importance-configuration overrides
renderSidebar();
render();
// Heal any broken/missing auto-translations for the current language on load (best-effort, online).
applyContentLanguage(currentLang);
// Schedule daily notification check (also runs immediately)
sendDailyNotification(false);
setInterval(() => sendDailyNotification(false), 60 * 60 * 1000); // re-check hourly while tab open

/* ===================== MOBILE INTERACTIONS (additive UI only) ===================== */
function toggleSidebar() { document.body.classList.toggle('sidebar-open'); }
function closeSidebar() { document.body.classList.remove('sidebar-open'); }
function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
// Close the drawer after tapping a nav item or sidebar button (mobile only)
(function () {
  const sb = document.getElementById('sidebar');
  if (sb) sb.addEventListener('click', function (e) {
    if (window.innerWidth <= 980 && e.target.closest('.nav-item, .sb-btn')) {
      setTimeout(closeSidebar, 60);
    }
  });
  // Close drawer with Escape
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSidebar(); });
  // Show/hide back-to-top on scroll
  const btt = document.getElementById('backToTop');
  if (btt) {
    const onScroll = () => btt.classList.toggle('show', (window.scrollY || document.documentElement.scrollTop) > 300);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }
})();
</script>
