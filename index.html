views.agenda = () => {
  const taskFilter = state.filters.agendaTaskFilter || 'today';
  const meetFilter = state.filters.agendaMeetFilter || 'today';

  function getWeekRange() {
    const now = new Date();
    const day = now.getDay(); // 0=Sun
    const sun = new Date(now);
    sun.setDate(now.getDate() - day);
    const thu = new Date(sun);
    thu.setDate(sun.getDate() + 4);
    return {
      start: sun.toISOString().slice(0,10),
      end: thu.toISOString().slice(0,10)
    };
  }

  function getMonthRange() {
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
    const end = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().slice(0,10);
    return { start, end };
  }

  function filterByPeriod(items, filter) {
    const today = todayDate();
    if (filter === 'today') return items.filter(a => a.dueDate === today);
    if (filter === 'week') {
      const { start, end } = getWeekRange();
      return items.filter(a => a.dueDate >= start && a.dueDate <= end);
    }
    if (filter === 'month') {
      const { start, end } = getMonthRange();
      return items.filter(a => a.dueDate >= start && a.dueDate <= end);
    }
    if (filter === 'delayed') return items.filter(a => isOpen(a) && getDelayDays(a) > 0);
    return items;
  }

  const allTasks = state.actions.filter(a => a.type !== 'meeting');
  const allMeetings = state.actions.filter(a => a.type === 'meeting');

  const filteredTasks = filterByPeriod(allTasks, taskFilter).sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
  const filteredMeetings = filterByPeriod(allMeetings, meetFilter).sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));

  function filterChips(current, stateKey) {
    const filters = ['today', 'week', 'month', 'delayed'];
    const labels = { today: t('filterToday'), week: t('filterThisWeek'), month: t('filterThisMonth'), delayed: t('filterDelayed') };
    return filters.map(f =>
      `<button class="filter-chip ${current===f?'active':''}" onclick="setFilter('${stateKey}','${f}')">${labels[f]}</button>`
    ).join('');
  }

  return `
    ${backToDashBtn()}
    <div class="page-head">
      <div>
        <h1 class="page-title">${t('dailyAgenda')}</h1>
        <div class="page-sub">${t('dailyAgendaSub')}</div>
      </div>
    </div>

    <div style="margin-bottom:32px">
      <h2 style="font-size:18px;margin-bottom:12px;color:var(--accent)">${t('agendaTasksSection')}</h2>
      <div class="filters" style="margin-bottom:16px">
        ${filterChips(taskFilter, 'agendaTaskFilter')}
      </div>
      ${filteredTasks.length === 0
        ? `<div class="empty" style="padding:24px"><div class="empty-icon">✅</div>${t('agendaNoTasks')}</div>`
        : `<div class="card-list">${filteredTasks.map(a => renderActionCard(a)).join('')}</div>`
      }
    </div>

    <div>
      <h2 style="font-size:18px;margin-bottom:12px;color:var(--accent)">${t('agendaMeetingsSection')}</h2>
      <div class="filters" style="margin-bottom:16px">
        ${filterChips(meetFilter, 'agendaMeetFilter')}
      </div>
      ${filteredMeetings.length === 0
        ? `<div class="empty" style="padding:24px"><div class="empty-icon">📅</div>${t('agendaNoMeetings')}</div>`
        : `<div class="card-list">${filteredMeetings.map(a => renderActionCard(a)).join('')}</div>`
      }
    </div>
  `;
};

views.actions = () => {
  const filter = state.filters.actionStatus || 'all';
  const projFilter = state.filters.actionProject || 'all';
  const period = state.filters.actionPeriod || 'all';
  const actionDate = state.filters.actionDate || todayDate();
  const includeMeetings = !!state.filters.includeMeetings;
  const search = (state.filters.actionSearch || '').toLowerCase();
  let list = state.actions;

  // Meetings inclusion toggle (default off → tasks only)
  if (!includeMeetings) list = list.filter(a => !isMeeting(a));

  // Status filter
  if (filter === 'open') list = list.filter(isOpen);
  if (filter === 'completed') list = list.filter(isCompleted);
  if (filter === 'overdue') list = list.filter(a => isOpen(a) && getDelayDays(a) > 0);
  if (filter === 'delayed') list = list.filter(a => isOpen(a) && getDelayDays(a) > DELAY_THRESHOLD_DAYS);
  if (filter === 'critical') list = list.filter(a => isOpen(a) && getDelayDays(a) > 14);
  if (filter === 'missed') list = list.filter(isMissed);

  // Period filter
  if (period !== 'all') {
    list = filterActionsByPeriod(list, period, actionDate);
  }

  if (projFilter !== 'all') list = list.filter(a => a.projectId === projFilter);
  if (search) list = list.filter(a => a.title.toLowerCase().includes(search));

  list = list.sort((a, b) => {
    const aOpen = isOpen(a), bOpen = isOpen(b);
    if (aOpen !== bOpen) return aOpen ? -1 : 1;
    return getDelayDays(b) - getDelayDays(a);
  });

  // Period label for header
  const range = getReportPeriodRange(period, actionDate);
  let periodLabel = '';
  if (period === 'today') periodLabel = ` · ${fmtDate(actionDate)}`;
  else if (period === 'week' && range) periodLabel = ` · ${t('reportRange', fmtDate(range.start), fmtDate(range.end))}`;
  else if (period === 'month') periodLabel = ` · ${new Date(actionDate).toLocaleDateString(t('locale'), { year: 'numeric', month: 'long' })}`;

  return `
    ${backToDashBtn()}
    <div class="page-head">
      <div>
        <h1 class="page-title">${t('actionsNav')}</h1>
        <div class="page-sub">${t('actionsTotalCount', getTasks().length)}${periodLabel ? ` <span style="color:var(--accent-warm)">${periodLabel}</span>` : ''}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn ghost" onclick="printAllTasksReport()">${t('exportTasksReportGlobal')}</button>
        <button class="btn" onclick="showActionForm()">${t('addActionBtn')}</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-chip ${filter==='all'?'active':''}" onclick="setFilter('actionStatus','all')">${t('filterAll')}</button>
      <button class="filter-chip ${filter==='open'?'active':''}" onclick="setFilter('actionStatus','open')">${t('filterOpenOrScheduled')}</button>
      <button class="filter-chip ${filter==='overdue'?'active':''}" onclick="setFilter('actionStatus','overdue')">⚠️ ${t('filterOverdue')}</button>
      <button class="filter-chip ${filter==='delayed'?'active':''}" onclick="setFilter('actionStatus','delayed')">${t('filterDelayed')}</button>
      <button class="filter-chip ${filter==='critical'?'active':''}" onclick="setFilter('actionStatus','critical')">🔴 ${t('filterCritical')}</button>
      <button class="filter-chip ${filter==='missed'?'active':''}" onclick="setFilter('actionStatus','missed')">${t('filterMissed')}</button>
      <button class="filter-chip ${filter==='completed'?'active':''}" onclick="setFilter('actionStatus','completed')">${t('filterCompleted')}</button>
      <input type="text" class="search-input" placeholder="${t('searching')}" value="${escapeHtml(search)}" oninput="setFilter('actionSearch', this.value)">
    </div>

    <div class="filters" style="margin-top:8px">
      <select class="search-input" style="max-width:220px;min-width:180px" onchange="setFilter('actionProject', this.value)">
        <option value="all">📁 ${t('filterByProject')}</option>
        ${state.projects.map(p => `<option value="${p.id}" ${projFilter===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}
      </select>
      <select class="search-input" style="max-width:200px;min-width:160px" onchange="setActionPeriod(this.value)">
        <option value="all" ${period==='all'?'selected':''}>📅 ${t('actionsPeriodAll')}</option>
        <option value="today" ${period==='today'?'selected':''}>${t('actionsPeriodToday')}</option>
        <option value="week" ${period==='week'?'selected':''}>${t('actionsPeriodWeek')}</option>
        <option value="month" ${period==='month'?'selected':''}>${t('actionsPeriodMonth')}</option>
      </select>
      ${period !== 'all' ? `
        <input type="date" class="search-input" style="max-width:180px" value="${actionDate}" onchange="setActionDate(this.value)">
      ` : ''}
      <label class="toggle-chip ${includeMeetings?'active':''}" title="${t('toggleIncludeMeetings')}">
        <input type="checkbox" ${includeMeetings?'checked':''} onchange="toggleIncludeMeetings(this.checked)">
        ${t('toggleIncludeMeetings')}
      </label>
    </div>

    <div class="table-wrap">
      ${list.length === 0 ? `<div class="empty"><div class="empty-icon">✓</div>${t('noActionsMatch')}</div>` : `
      <table>
        <thead>
          <tr>
            <th>${t('colTitle')}</th>
            <th>${t('colPartnerProject')}</th>
            <th>${t('colStatus')}</th>
            <th>${t('colPriority')}</th>
            <th>${t('colDate')}</th>
            <th>${t('colDelay')}</th>
            <th>${t('colRisk')}</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${list.map(a => {
            const partner = getPartner(a.partnerId);
            const project = getProject(a.projectId);
            const delay = getDelayDays(a);
            const risk = isOpen(a) ? getRiskLevel(delay) : null;
            const meeting = isMeeting(a);
            return `
            <tr>
              <td>
                <div class="name">${meeting ? '🗓 ' : ''}${escapeHtml(a.title)}</div>
                ${meeting && a.meetingTime ? `<div class="sub">⏰ ${fmtTime(a.meetingTime)}</div>` : ''}
                ${!meeting && getOwnerName(a) ? `<div class="sub">${ownerTag(a)}</div>` : ''}
                ${!meeting && Array.isArray(a.dependsOnIds) && a.dependsOnIds.length > 0 ? `<div class="sub" style="color:var(--accent-warm)">⛓ ${a.dependsOnIds.map(did => { const dt = state.actions.find(x=>x.id===did); return escapeHtml(dt ? dt.title : '?'); }).join(', ')}</div>` : ''}
                ${!meeting ? (() => { const c = getTaskDelayCause(a); if (c.key === 'dep') return `<div class="sub" style="color:var(--crit)">⚠ ${escapeHtml(c.label)}</div>`; if (c.key === 'other' && a.note) return `<div class="sub">📝 ${escapeHtml(a.note)}</div>`; return ''; })() : ''}
              </td>
              <td>
                <div style="font-size:12px;font-weight:500">${escapeHtml(getTaskStakeholderName(a))}</div>
                <div class="sub">${escapeHtml(project ? project.name : '—')}</div>
              </td>
              <td>${statusBadge(a.status)}</td>
              <td>${priorityBadge(a.priority)}</td>
              <td>${!isMeeting(a) && a.startDate ? `<div style="font-size:10px;color:var(--ink-faint)">${t("taskStartDate")}: ${fmtDate(a.startDate)}</div>` : ""}${fmtDate(a.dueDate)}</td>
              <td>${delay > 0 && !isCompleted(a) ? t('daysShort', delay) : (isCompleted(a) && delay > 0 ? `<span style="color:var(--ink-faint)">+${delay}</span>` : '—')}</td>
              <td>${risk ? `<span class="badge ${risk.cls}">${risk.label}</span>` : (isMissed(a) ? `<span class="badge dark">${t('statusMissed')}</span>` : '—')}</td>
              <td>
                <div class="row-actions">
                  ${isOpen(a) ? `<button class="row-btn" onclick="completeAction('${a.id}')">${t('completeBtn')}</button>` : ''}
                  <button class="row-btn" onclick="showActionForm('${a.id}')">${t('edit')}</button>
                  <button class="row-btn danger" onclick="deleteAction('${a.id}')">${t('delete')}</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
  `;
};

views.meetings = () => {
  const filter = state.filters.meetingStatus || 'all';
  const search = (state.filters.meetingSearch || '').toLowerCase();
  const meetingView = state.filters.meetingView || 'list';
  const calRefDate = state.filters.meetingCalDate || todayDate();
  let list = state.actions.filter(isMeeting);
  if (filter !== 'all') list = list.filter(a => a.status === filter);
  if (search) list = list.filter(a => a.title.toLowerCase().includes(search));

  // Sort: upcoming/scheduled first by date asc, then others by date desc
  list = list.sort((a, b) => {
    const aActive = a.status === 'scheduled' || a.status === 'postponed';
    const bActive = b.status === 'scheduled' || b.status === 'postponed';
    if (aActive !== bActive) return aActive ? -1 : 1;
    if (aActive) return new Date(a.dueDate) - new Date(b.dueDate);
    return new Date(b.dueDate) - new Date(a.dueDate);
  });

  const all = state.actions.filter(isMeeting);
  const counts = {
    all: all.length,
    scheduled: all.filter(a => a.status === 'scheduled').length,
    completed: all.filter(a => a.status === 'completed').length,
    missed: all.filter(a => a.status === 'missed').length,
    postponed: all.filter(a => a.status === 'postponed').length
  };

  // Identify today / upcoming for highlighting
  const today = todayDate();
  const upcomingSoon = all.filter(a => (a.status === 'scheduled' || a.status === 'postponed') && a.dueDate >= today)
    .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate))
    .slice(0, 3);

  return `
    ${backToDashBtn()}
    <div class="page-head">
      <div>
        <h1 class="page-title">${t('meetings')}</h1>
        <div class="page-sub">${t('meetingsCount', counts.all, counts.scheduled + counts.postponed, counts.completed, counts.missed)}</div>
      </div>
      <button class="btn" onclick="showActionForm(null,null,null,'meeting')">${t('scheduleMeeting')}</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">${t('statScheduled')}</div>
        <div class="stat-value">${counts.scheduled}</div>
        <div class="stat-meta">${t('statScheduledSub')}</div>
      </div>
      <div class="stat good">
        <div class="stat-label">${t('statDoneMeetings')}</div>
        <div class="stat-value">${counts.completed}</div>
        <div class="stat-meta">${t('statDoneMeetingsSub')}</div>
      </div>
      <div class="stat warn">
        <div class="stat-label">${t('statPostponed')}</div>
        <div class="stat-value">${counts.postponed}</div>
        <div class="stat-meta">${t('statPostponedSub')}</div>
      </div>
      <div class="stat danger">
        <div class="stat-label">${t('statMissed')}</div>
        <div class="stat-value">${counts.missed}</div>
        <div class="stat-meta">${t('statMissedSub')}</div>
      </div>
    </div>

    <div class="view-toggle">
      <button class="vt-btn ${meetingView==='list'?'active':''}" onclick="setMeetingView('list')">${t('calViewList')}</button>
      <button class="vt-btn ${meetingView==='week'?'active':''}" onclick="setMeetingView('week')">${t('calViewWeek')}</button>
      <button class="vt-btn ${meetingView==='month'?'active':''}" onclick="setMeetingView('month')">${t('calViewMonth')}</button>
    </div>

    ${meetingView === 'list' ? `
    ${upcomingSoon.length > 0 ? `
      <div class="section">
        <div class="section-head">
          <div class="section-title">${t('sectionUpcomingMeetings')}<span class="accent-line"></span></div>
        </div>
        ${upcomingSoon.map(renderActionCard).join('')}
      </div>
    ` : ''}

    <div class="filters">
      <button class="filter-chip ${filter==='all'?'active':''}" onclick="setFilter('meetingStatus','all')">${t('filterAll')} (${counts.all})</button>
      <button class="filter-chip ${filter==='scheduled'?'active':''}" onclick="setFilter('meetingStatus','scheduled')">${t('filterScheduled')} (${counts.scheduled})</button>
      <button class="filter-chip ${filter==='postponed'?'active':''}" onclick="setFilter('meetingStatus','postponed')">${t('filterPostponed')} (${counts.postponed})</button>
      <button class="filter-chip ${filter==='completed'?'active':''}" onclick="setFilter('meetingStatus','completed')">${t('filterDone')} (${counts.completed})</button>
      <button class="filter-chip ${filter==='missed'?'active':''}" onclick="setFilter('meetingStatus','missed')">${t('filterNotDone')} (${counts.missed})</button>
      <input type="text" class="search-input" placeholder="${t('meetingsSearchPlaceholder')}" value="${escapeHtml(search)}" oninput="setFilter('meetingSearch', this.value)">
    </div>

    <div class="table-wrap">
      ${list.length === 0 ? `<div class="empty"><div class="empty-icon">🗓</div>${counts.all === 0 ? t('noMeetingsYet') : t('noMeetingsMatch')}</div>` : `
      <table>
        <thead>
          <tr>
            <th>${t('colMeetingTopic')}</th>
            <th>${t('colPartnerProject')}</th>
            <th>${t('colDate')}</th>
            <th>${t('colTime')}</th>
            <th>${t('colStatus')}</th>
            <th>${t('notes')}</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${list.map(a => {
            const partner = getPartner(a.partnerId);
            const project = getProject(a.projectId);
            const isUpcoming = (a.status === 'scheduled' || a.status === 'postponed') && a.dueDate >= today;
            const isToday = a.dueDate === today;
            const linkedTask = a.linkedTaskId ? state.actions.find(x => x.id === a.linkedTaskId && isTask(x)) : null;
            return `
            <tr>
              <td>
                <div class="name">🗓 ${escapeHtml(a.title)}${isToday ? ` <span class="badge amber" style="margin-inline-start:6px">${t('today')}</span>` : ''}</div>
                ${a.participants ? `<div class="sub">👥 ${escapeHtml(a.participants)}</div>` : ''}
                ${linkedTask ? `<div class="sub">🔗 ${t('linkedToLabel')}: ${escapeHtml(linkedTask.title)}</div>` : ''}
                ${a.seriesId ? `<span class="series-badge">🔄 ${t('sessionXofY', a.seriesIndex || '?', a.seriesTotal || '?')}</span>` : ''}
                ${priorityBadge(a.priority)}
              </td>
              <td>
                <div style="font-size:12px;font-weight:500">${escapeHtml(getTaskStakeholderName(a))}</div>
                <div class="sub">${escapeHtml(project ? project.name : '—')}</div>
              </td>
              <td>${fmtDate(a.dueDate)}${isUpcoming && !isToday ? `<div class="sub">${t('inDays', daysBetween(today, a.dueDate))}</div>` : ''}</td>
              <td>${a.meetingTime ? fmtTime(a.meetingTime) : '—'}</td>
              <td>${statusBadge(a.status)}</td>
              <td><div style="font-size:12px;color:var(--ink-muted);max-width:200px">${escapeHtml(a.meetingNotes || '—')}</div></td>
              <td>
                <div class="row-actions">
                  ${joinMeetingBtn(a)}
                  ${(a.status === 'scheduled' || a.status === 'postponed') ? `<button class="row-btn" onclick="completeAction('${a.id}')">${t('updateBtn')}</button>` : ''}
                  <button class="row-btn" onclick="showActionForm('${a.id}')">${t('edit')}</button>
                  <button class="row-btn danger" onclick="deleteAction('${a.id}')">${t('delete')}</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
    ` : meetingView === 'week' ? renderMeetingsWeek(calRefDate, list) : renderMeetingsMonth(calRefDate, list)}
  `;
};

/* ========== MEETINGS CALENDAR ========== */
window.setMeetingView = function(v) {
  state.filters.meetingView = v;
  if (!state.filters.meetingCalDate) state.filters.meetingCalDate = todayDate();
  render();
};
window.calShift = function(unit, dir) {
  const d = new Date(state.filters.meetingCalDate || todayDate());
  if (unit === 'week') d.setDate(d.getDate() + dir * 7);
  else d.setMonth(d.getMonth() + dir);
  state.filters.meetingCalDate = d.toISOString().split('T')[0];
  render();
};
window.calGoToday = function() {
  state.filters.meetingCalDate = todayDate();
  render();
};

// Build a YYYY-MM-DD from a Date
// Build YYYY-MM-DD from a Date using LOCAL components (not UTC).
// Using toISOString() here caused an off-by-one in calendars for users east of UTC.
function ymd(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// Render a single meeting chip for calendar cells
function meetingChip(a) {
  const statusCls = a.status === 'completed' ? 'done' : a.status === 'missed' ? 'missed' : a.status === 'postponed' ? 'postponed' : 'scheduled';
  const time = a.meetingTime ? fmtTime(a.meetingTime) + ' ' : '';
  const link = a.meetingLink ? ' 🔗' : '';
  return `<div class="cal-chip ${statusCls}" title="${escapeHtml(a.title)}" onclick="showActionForm('${a.id}')">${time}${escapeHtml(a.title)}${link}</div>`;
}

// Weekly calendar (Sunday → Saturday) containing the reference date
function renderMeetingsWeek(refDate, list) {
  const ref = new Date(refDate);
  const start = new Date(ref);
  start.setDate(ref.getDate() - ref.getDay()); // back to Sunday
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    days.push(d);
  }
  const today = todayDate();
  const weekdayNames = T[currentLang].weekdayShort || T.ar.weekdayShort;
  const monthNames = T[currentLang].monthNames || T.ar.monthNames;
  const rangeLabel = `${days[0].getDate()} ${monthNames[days[0].getMonth()]} — ${days[6].getDate()} ${monthNames[days[6].getMonth()]} ${days[6].getFullYear()}`;
  const weekMeetings = list.filter(a => a.dueDate >= ymd(days[0]) && a.dueDate <= ymd(days[6]));

  return `
    <div class="cal-nav">
      <button class="vt-btn" onclick="calShift('week',-1)">${t('calPrev')}</button>
      <button class="vt-btn" onclick="calGoToday()">${t('calToday')}</button>
      <button class="vt-btn" onclick="calShift('week',1)">${t('calNext')}</button>
      <div class="cal-range">${rangeLabel}</div>
    </div>
    ${weekMeetings.length === 0 ? `<div class="table-wrap"><div class="empty"><div class="empty-icon">🗓</div>${t('calNoMeetingsWeek')}</div></div>` : ''}
    <div class="cal-week">
      ${days.map((d, i) => {
        const key = ymd(d);
        const dayMeetings = list.filter(a => a.dueDate === key)
          .sort((a,b) => (a.meetingTime||'').localeCompare(b.meetingTime||''));
        const isToday = key === today;
        return `
          <div class="cal-day-col ${isToday ? 'today' : ''}">
            <div class="cal-day-head">
              <span class="cal-day-name">${weekdayNames[d.getDay()]}</span>
              <span class="cal-day-num ${isToday ? 'today' : ''}">${d.getDate()}</span>
            </div>
            <div class="cal-day-body">
              ${dayMeetings.map(meetingChip).join('') || '<div class="cal-empty-day"></div>'}
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

// Monthly calendar grid (weeks as rows)
function renderMeetingsMonth(refDate, list) {
  const ref = new Date(refDate);
  const year = ref.getFullYear();
  const month = ref.getMonth();
  const monthNames = T[currentLang].monthNames || T.ar.monthNames;
  const weekdayNames = T[currentLang].weekdayShort || T.ar.weekdayShort;
  const first = new Date(year, month, 1);
  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - first.getDay()); // back to Sunday
  const today = todayDate();
  const monthMeetings = list.filter(a => {
    const dd = new Date(a.dueDate);
    return dd.getFullYear() === year && dd.getMonth() === month;
  });

  // Build 6 weeks (42 cells) to cover any month layout
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart); d.setDate(gridStart.getDate() + i);
    cells.push(d);
  }
  // Trim trailing full empty week if not needed
  const weeksNeeded = Math.ceil((first.getDay() + new Date(year, month + 1, 0).getDate()) / 7);

  return `
    <div class="cal-nav">
      <button class="vt-btn" onclick="calShift('month',-1)">${t('calPrev')}</button>
      <button class="vt-btn" onclick="calGoToday()">${t('calToday')}</button>
      <button class="vt-btn" onclick="calShift('month',1)">${t('calNext')}</button>
      <div class="cal-range">${monthNames[month]} ${year}</div>
    </div>
    ${monthMeetings.length === 0 ? `<div class="table-wrap" style="margin-bottom:12px"><div class="empty" style="padding:20px">${t('calNoMeetingsMonth')}</div></div>` : ''}
    <div class="cal-month">
      <div class="cal-month-head">
        ${weekdayNames.map(n => `<div class="cal-month-hcell">${n}</div>`).join('')}
      </div>
      <div class="cal-month-grid">
        ${cells.slice(0, weeksNeeded * 7).map(d => {
          const key = ymd(d);
          const inMonth = d.getMonth() === month;
          const isToday = key === today;
          const dayMeetings = list.filter(a => a.dueDate === key)
            .sort((a,b) => (a.meetingTime||'').localeCompare(b.meetingTime||''));
          const shown = dayMeetings.slice(0, 3);
          const extra = dayMeetings.length - shown.length;
          return `
            <div class="cal-cell ${inMonth ? '' : 'out'} ${isToday ? 'today' : ''}">
              <div class="cal-cell-num">${d.getDate()}</div>
              ${shown.map(meetingChip).join('')}
              ${extra > 0 ? `<div class="cal-more" onclick="setMeetingView('week');calJumpTo('${key}')">${t('calMore', extra)}</div>` : ''}
            </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

};

// Read every config input, update IMPORTANCE_CONFIG, persist, and recalc everything.
window.saveConfigForm = function() {
  document.querySelectorAll('[data-cfg-section]').forEach(inp => {
    const s = inp.getAttribute('data-cfg-section');
    const k = inp.getAttribute('data-cfg-key');
    const v = parseFloat(inp.value);
    if (!isNaN(v) && IMPORTANCE_CONFIG[s] && IMPORTANCE_CONFIG[s][k] !== undefined) {
      IMPORTANCE_CONFIG[s][k] = v;
    }
  });
  saveConfig();
  render();
  alert(t('cfgSavedMsg'));
};

// Partners list: click a sortable column header to sort by it; clicking the active
// column toggles asc/desc. Default is importance descending.
function setPartnerSort(key) {
  const currentKey = state.filters.partnerSortKey === 'commitment' ? 'commitment' : 'importance';
  if (currentKey === key) {
    state.filters.partnerSortDir = (state.filters.partnerSortDir === 'asc') ? 'desc' : 'asc';
  } else {
    state.filters.partnerSortKey = key;
    state.filters.partnerSortDir = 'desc';
  }
  render(state.detailParam);
}

function render(param) {
  const main = document.getElementById('main-content');
  const view = state.currentView;
  if (view === 'partnerDetail') {
    main.innerHTML = views.partnerDetail(param || state.detailParam);
  } else if (view === 'projectDetail') {
    main.innerHTML = views.projectDetail(param || state.detailParam);
    setupDragDrop(param || state.detailParam);
  } else if (view === 'teamMemberDetail') {
    main.innerHTML = views.teamMemberDetail(param || state.detailParam);
  } else if (views[view]) {
    main.innerHTML = views[view]();
  }
  window.scrollTo(0, 0);
}

function setupDragDrop(projectId) {
  const zone = document.getElementById('upload-zone-' + projectId);
  if (!zone) return;
  ['dragenter','dragover'].forEach(ev => {
    zone.addEventListener(ev, e => {
      e.preventDefault();
      zone.classList.add('dragover');
    });
  });
  ['dragleave','drop'].forEach(ev => {
    zone.addEventListener(ev, e => {
      e.preventDefault();
      zone.classList.remove('dragover');
    });
  });
  zone.addEventListener('drop', e => {
    if (e.dataTransfer && e.dataTransfer.files.length) {
      handleAttachUpload(projectId, e.dataTransfer.files);
    }
  });
}

function savePartner(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert(t('alertNameRequired')); return; }
  let type = document.getElementById('f-type').value;
  let customType = '';
  const STANDARD_TYPES = ['development','supervision','ownership','vendor'];
  if (type === 'other') {
    customType = (document.getElementById('f-custom-type').value || '').trim();
    if (customType) type = customType; // store the custom string as the type
    else type = 'other';
  } else if (!STANDARD_TYPES.includes(type)) {
    // a previously-used custom category was picked from the dropdown
    customType = type;
  }
  const team = (window._editingPartnerTeam || [])
    .filter(m => m.name && m.name.trim())
    .map(m => ({ id: m.id || ('pm_' + uid()), name: m.name.trim(), email: (m.email||'').trim() }));
  const data = {
    name,
    type,
    customType,
    contact: document.getElementById('f-contact').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    team
  };
  if (id) {
    const p = getPartner(id);
    Object.assign(p, data);
    toast(t('toastSavedChanges'));
  } else {
    state.partners.push({ id: uid(), ...data, createdAt: todayDate() });
    toast(t('toastPartnerAdded'));
  }
  saveState();
  closeModal();
  render(state.detailParam);
}

window.applyPartnershipModelUI = function(preferredCurrency) {
  const modelEl = document.getElementById('f-partnership-model');
  const currencyEl = document.getElementById('f-partnership-currency');
  const amountEl = document.getElementById('f-partnership-amount');
  const hintEl = document.getElementById('partnership-amount-hint');
  const amountRow = document.getElementById('partnership-amount-row');
  const customRow = document.getElementById('partnership-custom-row');
  if (!modelEl || !currencyEl || !amountEl) return;
  const model = modelEl.value;
  // 'Other' (custom) agreement type → hide structured amount, show free-text fields
  if (model === 'other') {
    if (amountRow) amountRow.classList.add('hidden');
    if (customRow) customRow.classList.remove('hidden');
    return;
  }
  if (amountRow) amountRow.classList.remove('hidden');
  if (customRow) customRow.classList.add('hidden');
  const previousCurrency = preferredCurrency || currencyEl.value;
  if (model === 'percentage') {
    currencyEl.innerHTML = `<option value="%">% — ${t('currencyPercent')}</option>`;
    currencyEl.value = '%';
    amountEl.setAttribute('max', '100');
    amountEl.placeholder = '30';
    hintEl.textContent = t('percentageHint');
  } else {
    currencyEl.innerHTML = `<option value="SAR">${t('currencySAR')}</option>`;
    currencyEl.value = 'SAR';
    amountEl.removeAttribute('max');
    amountEl.placeholder = '50000';
    hintEl.textContent = t('amountHint');
  }
};

  if (!box) return;
  const store = window._projectContribs || (window._projectContribs = {});
  const checked = Array.from(document.querySelectorAll('#f-partners-container .partner-cb:checked')).map(cb => cb.value);
  const internal = document.getElementById('f-internal-project')?.checked;
  if (internal || checked.length === 0) {
    box.innerHTML = `<div style="font-size:12px;color:var(--ink-faint)">${internal ? t('internalProjectLabel') : t('fieldPartnerHint')}</div>`;
    return;
  }
  const ROLES = ['Strategic Partner', 'Investor', 'Customer', 'Vendor'];
  const ROLE_LBL = { 'Strategic Partner': t('role_strategic'), 'Investor': t('role_investor'), 'Customer': t('role_customer'), 'Vendor': t('role_vendor') };
  const FIN = ['Revenue (fixed)', 'Revenue (percentage)', 'Cost', 'Monthly Retainer'];
  const FIN_LBL = { 'Revenue (fixed)': t('ft_revenueFixed'), 'Revenue (percentage)': t('ft_revenuePercent'), 'Cost': t('ft_cost'), 'Monthly Retainer': t('ft_monthlyRetainer') };
  box.innerHTML = checked.map(pid => {
    const partner = getPartner(pid);
    const c = store[pid] || (store[pid] = { partnerId: pid, role: 'Customer', financialType: 'Revenue (fixed)', amount: '', certainty: 0.4 });

// Update a single contribution field; re-toggle amount label / certainty on type change.
window.updateContrib = function(pid, field, value) {
  const store = window._projectContribs || (window._projectContribs = {});
  const c = store[pid] || (store[pid] = { partnerId: pid, role: 'Customer', financialType: 'Revenue (fixed)', amount: '', certainty: 0.4 });
  if (field === 'certainty') c.certainty = parseFloat(value);
  else c[field] = value;
  if (field === 'financialType') {
    const block = document.querySelector(`.contrib-block[data-pid="${pid}"]`);
    if (block) {
      const isPct = value === 'Revenue (percentage)';
      const isRetainer = value === 'Monthly Retainer';
      const lbl = block.querySelector('.contrib-amount-label');
      const certWrap = block.querySelector('.contrib-certainty-wrap');
      if (lbl) lbl.textContent = isPct ? t('percentOnlyLabel') : (isRetainer ? t('monthlyAmountLabel') : t('amountSARLabel'));
      if (certWrap) certWrap.style.display = isPct ? '' : 'none';
    }
  }
};

function saveProject(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert(t('alertProjectNameRequired')); return; }

  const isInternal = !!document.getElementById('f-internal-project')?.checked;
  const partnerIds = isInternal ? [] : Array.from(document.querySelectorAll('#f-partners-container .partner-cb:checked')).map(cb => cb.value);
  if (!isInternal && partnerIds.length === 0) { alert(t('alertSelectPartner')); return; }

  // Ownership
  let ownershipType, ownershipStake = 0, ownershipCertainty = 1.0;
  let internalTier = null;
  if (isInternal) {
    ownershipType = 'majorityOwn'; ownershipStake = 0; ownershipCertainty = 1.0;
    internalTier = document.getElementById('f-internal-tier')?.value || 'operational';
  } else {
    ownershipType = document.getElementById('f-ownership-type')?.value || 'noOwnership';
    if (ownershipType === 'jointVenture') {
      ownershipStake = parseFloat(document.getElementById('f-ownership-stake')?.value) || 0;
      ownershipCertainty = parseFloat(document.getElementById('f-ownership-certainty')?.value) || IMPORTANCE_CONFIG.financial.defaultCertainty;
    }
  }

  // Partner contributions (one per selected partner)
  let partnerContributions = [];
  if (!isInternal) {
    const store = window._projectContribs || {};
    partnerContributions = partnerIds.map(pid => {
      const c = store[pid] || { partnerId: pid, role: 'Customer', financialType: 'Revenue (fixed)', amount: 0 };
      const entry = {
        partnerId: pid,
        role: c.role || 'Customer',
        financialType: c.financialType || 'Revenue (fixed)',
        amount: parseFloat(c.amount) || 0
      };
      if (entry.financialType === 'Revenue (percentage)') {
        entry.certainty = (typeof c.certainty === 'number') ? c.certainty : IMPORTANCE_CONFIG.financial.defaultCertainty;
      }
      return entry;
    });
  }

  // Derived display summary (project lists/reports still show an "agreement" badge/value)
  const derivedModel = ownershipType === 'jointVenture' ? 'percentage' : 'fixed';
  let derivedValue;
  if (isInternal) {
    derivedValue = t('em_internal');
  } else if (ownershipType === 'jointVenture') {
    derivedValue = (ownershipStake || 0) + '%';
  } else {
    const totalRevenue = partnerContributions
      .filter(c => c.financialType === 'Revenue (fixed)')
      .reduce((s, c) => s + (parseFloat(c.amount) || 0), 0);
    derivedValue = totalRevenue > 0 ? (totalRevenue.toLocaleString('en-US')) + ' ' + t('currencySAR') : (ownershipType === 'majorityOwn' ? t('ot_majorityOwn') : t('ot_noOwnership'));
  }

  const teamMemberIds = Array.from(document.querySelectorAll('#f-team-container .team-cb:checked')).map(cb => cb.value);
  const data = {
    name,
    partnerId: partnerIds[0] || '',
    partnerIds,
    teamMemberIds,
    description: document.getElementById('f-desc').value.trim(),
    startDate: document.getElementById('f-start').value,
    targetDate: document.getElementById('f-target').value,
    status: 'active',
    internalProject: isInternal,
    internalTier,
    ownershipType,
    ownershipStake,
    ownershipCertainty,
    partnerContributions,
    // derived display-only fields (importance no longer depends on these)
    partnershipModel: derivedModel,
    partnershipValue: derivedValue,
    partnershipCustomType: ''
  };
  if (id) {
    const p = getProject(id);
    Object.assign(p, data); // preserves p.attachments
    setBilingualField(p, 'name', p.name);
    if (p.description) setBilingualField(p, 'description', p.description);
    Promise.all([
      ensureBilingual(p, 'name', detectContentLang(p.name) === 'ar' ? 'en' : 'ar'),
      p.description ? ensureBilingual(p, 'description', detectContentLang(p.description) === 'ar' ? 'en' : 'ar') : Promise.resolve(false)
    ]).then(rs => { if (rs.some(Boolean)) saveState(); });
  } else {
    const newId = uid();
    const newP = { id: newId, ...data, attachments: [] };
    setBilingualField(newP, 'name', newP.name);
    if (newP.description) setBilingualField(newP, 'description', newP.description);
    state.projects.push(newP);
    Promise.all([
      ensureBilingual(newP, 'name', detectContentLang(newP.name) === 'ar' ? 'en' : 'ar'),
      newP.description ? ensureBilingual(newP, 'description', detectContentLang(newP.description) === 'ar' ? 'en' : 'ar') : Promise.resolve(false)
    ]).then(rs => { if (rs.some(Boolean)) saveState(); });
    // Create optional milestone tasks defined in the project form
    (window._editingProjectMilestones || [])
      .filter(m => m.name && m.name.trim())
      .forEach(m => {
        state.actions.push({
          id: uid(), type: 'task', isMilestone: true,
          title: m.name.trim(), projectId: newId, partnerId: data.partnerId,
          status: 'open', priority: 'medium',
          dueDate: m.date || data.targetDate || todayDate(),
          completedDate: null, reason: '', tracking: [],
          ownerId: '', ownerKind: '', dependsOnIds: [], note: '',
          createdAt: todayDate()
        });
      });
  }
  saveState();
  toast(t('toastSaved'));
  closeModal();
  render(state.detailParam);
}

/* ========== ATTACHMENTS ========== */
const MAX_ATTACH_SIZE = 3 * 1024 * 1024; // 3MB per file

function handleAttachUpload(projectId, files) {
  const project = getProject(projectId);
  if (!project) return;
  if (!Array.isArray(project.attachments)) project.attachments = [];
  const fileArr = Array.from(files);
  let processed = 0;
  fileArr.forEach(file => {
    if (file.size > MAX_ATTACH_SIZE) {
      alert(t('alertFileTooLarge', file.name, formatBytes(file.size), formatBytes(MAX_ATTACH_SIZE)));
      processed++;
      if (processed === fileArr.length) finishUpload(projectId);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      project.attachments.push({
        id: 'at_' + uid(),
        name: file.name,
        type: file.type || 'application/octet-stream',
        size: file.size,
        data: e.target.result,
        description: '',
        uploadedAt: todayDate()
      });
      processed++;
      if (processed === fileArr.length) finishUpload(projectId);
    };
    reader.onerror = () => {
      alert(t('alertFileReadError', file.name));
      processed++;
      if (processed === fileArr.length) finishUpload(projectId);
    };
    reader.readAsDataURL(file);
  });
}

function finishUpload(projectId) {
  try {
    saveState();
    toast(t('toastUploaded'));
  } catch (err) {
    alert(t('alertStorageFull'));
  }
  const input = document.getElementById('attach-input');
  if (input) input.value = '';
  render(state.detailParam);
}

  if (!newWin) {

  } else {
    newWin.location = att.data;
  }
}

  // Build the Task Owner dropdown: internal team members + the project's partner team
  // FIX: refreshOwnerOptions — uses project.partnerIds + project.teamMemberIds
  function refreshOwnerOptions() {
    const sel = document.getElementById('f-owner');
    if (!sel) return;
    const pid = projectEl.value;
    const proj = getProject(pid);
    const cur = editing?.ownerId || '';
    let html = `<option value="">${t('ownerNone')}</option>`;
    // Only internal members explicitly assigned to THIS project may own its tasks.
    const projTeamIds = Array.isArray(proj?.teamMemberIds) ? proj.teamMemberIds : [];
    const internal = (state.team || []).filter(m => projTeamIds.includes(m.id));
    if (internal.length) {
      html += `<optgroup label="${t('ownerInternalGroup')}">` +
        internal.map(m => `<option value="i:${m.id}" ${cur===m.id && editing?.ownerKind==='internal'?'selected':''}>${escapeHtml(m.name)}</option>`).join('') +
        `</optgroup>`;
    }
    // FIX #1: iterate ALL project partners for team members
    const allPids = Array.isArray(proj?.partnerIds) ? proj.partnerIds : (proj?.partnerId ? [proj.partnerId] : []);
    allPids.forEach(partnerId => {
      const partner = getPartner(partnerId);
      const pteam = (partner && Array.isArray(partner.team)) ? partner.team : [];
      if (pteam.length) {
        html += `<optgroup label="${t('ownerPartnerGroup')} — ${escapeHtml(partner.name)}">` +
          pteam.map(m => `<option value="p:${m.id}" ${cur===m.id && editing?.ownerKind==='partner'?'selected':''}>${escapeHtml(m.name)}</option>`).join('') +
          `</optgroup>`;
      }
    });
    // Helpful hint when the project has no assignable owners yet
    if (!html.includes('<optgroup')) {
      html += `<option value="" disabled>— ${t('noAssignableOwners')} —</option>`;
    }
    sel.innerHTML = html;
  }

  // Build the Depends-On multi-select: tasks in the same project, plus any
  // current dependencies that live in other projects (so they stay selectable).
  function refreshDependsOnOptions() {
    const container = document.getElementById('f-depends-on-container');
    if (!container) return;
    const pid = projectEl.value;
    const curIds = Array.isArray(editing?.dependsOnIds) ? editing.dependsOnIds : [];
    const tasks = state.actions.filter(a => isTask(a) && a.projectId === pid && (!editing || a.id !== editing.id));
    curIds.forEach(did => {
      if (!tasks.some(tk => tk.id === did)) {
        const ext = state.actions.find(a => a.id === did && isTask(a));
        if (ext) {
          const pr = getProject(ext.projectId);
          tasks.push({ id: ext.id, title: ext.title + (pr ? ' — ' + pr.name : '') });
        }
      }
    });
    if (tasks.length === 0) {
      container.innerHTML = `<div class="checkbox-grid-empty">${t('dependsOnNone')}</div>`;
      return;
    }
    container.innerHTML = tasks.map(tk =>
      `<label><input type="checkbox" class="dep-cb" value="${tk.id}" ${curIds.includes(tk.id)?'checked':''}> <span>${escapeHtml(tk.title)}</span></label>`
    ).join('');
  }

  // Populate the "Linked Deliverable" dropdown with the OPEN/ALL tasks of the selected project
  function refreshLinkedDeliverableOptions() {
    const sel = document.getElementById('f-linked-task');
    if (!sel) return;
    const pid = projectEl.value;
    const tasks = state.actions.filter(a => isTask(a) && a.projectId === pid);
    const current = editing?.linkedTaskId || '';
    sel.innerHTML = `<option value="">${t('linkedDeliverableNone')}</option>` +
      tasks.map(tk => `<option value="${tk.id}" ${current === tk.id ? 'selected' : ''}>${escapeHtml(tk.title)}</option>`).join('');
  }

  // Render the list of meetings linked to the task currently being edited
  window._renderRelatedMeetingsBox = function() {
    const box = document.getElementById('related-meetings-box');
    if (!box || !editing) return;
    const projTasksProject = editing.projectId;
    const linked = getMeetingsForTask(editing.id);
    const candidates = state.actions.filter(a => isMeeting(a) && a.projectId === projTasksProject);
    if (candidates.length === 0) {
      box.innerHTML = `<div class="empty" style="padding:16px;font-size:13px">${t('noMeetingsInProject')}</div>`;
      return;
    }
    box.innerHTML = `
      <div style="font-size:11px;color:var(--ink-faint);margin-bottom:6px">${t('linkMeetingCheckboxHint')}</div>
      <div class="related-mtg-list">
        ${candidates.sort((a,b)=>(b.dueDate||'').localeCompare(a.dueDate||'')).map(m => {
          const checked = m.linkedTaskId === editing.id;
          return `<label class="related-mtg-item ${checked?'on':''}">
            <input type="checkbox" ${checked?'checked':''} onchange="toggleMeetingTaskLink('${m.id}','${editing.id}', this.checked)">
            <span class="related-mtg-info">
              <span class="related-mtg-title">🗓 ${escapeHtml(m.title)}</span>
              <span class="related-mtg-meta">${fmtDate(m.dueDate)}${m.meetingTime ? ' · ' + fmtTime(m.meetingTime) : ''} · ${statusBadge(m.status)}</span>
            </span>
            ${m.meetingLink ? joinMeetingBtn(m) : ''}
          </label>`;
        }).join('')}
      </div>`;
  };

  function applyType() {
    const isMeet = typeEl.value === 'meeting';
    const isMs = typeEl.value === 'milestone';
    timeRow.classList.toggle('hidden', !isMeet);
    titleLabel.textContent = isMeet ? t('fieldMeetingTopic') : isMs ? t('fieldMilestoneTitle') : t('fieldActionTitle');
    dueLabel.textContent = isMeet ? t('fieldMeetingDate') : isMs ? t('fieldMilestoneDate') : t('fieldDueDate');
    // NEW: hide start date for meetings
    const startDateRow = document.getElementById('start-date-row');
    if (startDateRow) startDateRow.style.display = isMeet ? 'none' : '';
    if (!titleInput.value) {
      titleInput.placeholder = isMeet ? t('fieldMeetingTopicPh') : isMs ? t('fieldMilestoneTitlePh') : t('fieldActionTitlePh');
    }
    const showRecurrence = isMeet && !editing;
    recurrenceRow.classList.toggle('hidden', !showRecurrence);
    // Meeting-only fields
    participantsRow.classList.toggle('hidden', !isMeet);
    meetingNotesRow.classList.toggle('hidden', !isMeet);
    meetingLinkRow.classList.toggle('hidden', !isMeet);
    linkedDeliverableRow.classList.toggle('hidden', !isMeet);
    if (isMeet) refreshLinkedDeliverableOptions();
    // Related-meetings box only when editing an existing task (deliverable)
    const showRelated = !isMeet && !!editing;
    relatedMeetingsRow.classList.toggle('hidden', !showRelated);
    if (showRelated) window._renderRelatedMeetingsBox();
    // Task-only fields: owner, dependency, note
    ownerRow.classList.toggle('hidden', isMeet);
    dependsOnRow.classList.toggle('hidden', isMeet);
    taskNoteRow.classList.toggle('hidden', isMeet);
    if (!isMeet) { refreshOwnerOptions(); refreshDependsOnOptions(); }
    applyRecurrence();
    Array.from(statusEl.options).forEach(opt => {
      const f = opt.dataset.for;
      const show = f === 'both' || (isMeet ? f === 'meeting' : f === 'task');
      opt.hidden = !show;
      opt.disabled = !show;
    });
    if (statusEl.options[statusEl.selectedIndex].hidden) {
      const firstValid = Array.from(statusEl.options).find(o => !o.hidden);
      if (firstValid) statusEl.value = firstValid.value;
    }
    toggleCompleted();
  }
  function applyRecurrence() {
    const isMeet = typeEl.value === 'meeting';
    const showEnd = isMeet && !editing && recurrenceEl.value !== 'none';
    recurrenceEndRow.classList.toggle('hidden', !showEnd);
  }
  function toggleCompleted() {
    completedRow.classList.toggle('hidden', statusEl.value !== 'completed');
  }
  typeEl.addEventListener('change', applyType);
  statusEl.addEventListener('change', toggleCompleted);
  recurrenceEl.addEventListener('change', applyRecurrence);
  projectEl.addEventListener('change', () => {
    if (typeEl.value === 'meeting') refreshLinkedDeliverableOptions();
    else { refreshOwnerOptions(); refreshDependsOnOptions(); }
  });
  applyType();
}

// Link / unlink a meeting to a task (deliverable). Applies immediately since
// meetings are independent records. Completing a meeting never completes the task.
window.toggleMeetingTaskLink = function(meetingId, taskId, checked) {
  const m = state.actions.find(x => x.id === meetingId);
  if (!m) return;
  m.linkedTaskId = checked ? taskId : '';
  saveState();
  if (typeof window._renderRelatedMeetingsBox === 'function') window._renderRelatedMeetingsBox();
};

function saveAction(id) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert(t('alertActionTitleRequired')); return; }
  const projSel = document.getElementById('f-project');
  const projectId = projSel.value;
  const partnerId = projSel.options[projSel.selectedIndex].dataset.partner;
  const status = document.getElementById('f-status').value;
  const rawType = document.getElementById('f-type').value;
  // 'milestone' is stored as a task with isMilestone=true (keeps the data model stable)
  const type = rawType === 'milestone' ? 'task' : rawType;
  const isMilestoneSel = rawType === 'milestone';
  const dueDate = document.getElementById('f-due').value;
  if (!dueDate) { alert(t('alertDateRequired')); return; }
  const data = {
    title,
    type,
    projectId,
    partnerId,
    startDate: document.getElementById('f-start-date')?.value || todayDate(),
    dueDate,
    meetingTime: type === 'meeting' ? document.getElementById('f-time').value : null,
    priority: document.getElementById('f-priority').value,
    status,
    completedDate: status === 'completed' ? document.getElementById('f-completed').value : null,
    reason: '', // legacy field kept blank — content lives in `tracking` now
    tracking: (window._editingTracking || []).map(e => ({...e}))
  };
  // Meeting-only fields (participants / notes / link / linked deliverable)
  if (type === 'meeting') {
    data.participants = (document.getElementById('f-participants')?.value || '').trim();
    data.meetingNotes = (document.getElementById('f-meeting-notes')?.value || '').trim();
    data.meetingLink = (document.getElementById('f-meeting-link')?.value || '').trim();
    data.linkedTaskId = document.getElementById('f-linked-task')?.value || '';
  } else {
    // Task / milestone fields: owner (internal/partner), dependency, note, milestone flag
    data.isMilestone = isMilestoneSel;
    const ownerRaw = document.getElementById('f-owner')?.value || '';
    if (ownerRaw.startsWith('i:')) { data.ownerKind = 'internal'; data.ownerId = ownerRaw.slice(2); }
    else if (ownerRaw.startsWith('p:')) { data.ownerKind = 'partner'; data.ownerId = ownerRaw.slice(2); }
    else { data.ownerKind = ''; data.ownerId = ''; }
    data.dependsOnIds = Array.from(document.querySelectorAll('#f-depends-on-container .dep-cb:checked')).map(cb => cb.value);
    data.note = (document.getElementById('f-task-note')?.value || '').trim();
  }

  // Recurring meeting: generate series of separate records
  if (!id && type === 'meeting') {
    const recurrenceEl = document.getElementById('f-recurrence');
    const recurrence = recurrenceEl ? recurrenceEl.value : 'none';
    if (recurrence !== 'none') {
      const endDate = document.getElementById('f-recurrence-end').value;
      if (!endDate) { alert(t('alertEndDateRequired')); return; }
      if (endDate < dueDate) { alert(t('alertEndAfterStart')); return; }
      const seriesId = 'sr_' + uid();
      let currentDate = dueDate;
      let count = 0;
      const generated = [];
      while (currentDate <= endDate && count < 100) {
        const record = {
          id: uid(),
          ...data,
          dueDate: currentDate,
          status: 'scheduled', // all future occurrences start as scheduled
          completedDate: null,
          seriesId,
          seriesIndex: count + 1,
          createdAt: todayDate()
        };
        state.actions.push(record);
        storeActionBilingual(record);
        generated.push(record);
        currentDate = addRecurrence(currentDate, recurrence);
        count++;
      }
      // Set series total on each
      generated.forEach(a => a.seriesTotal = count);
      saveState();
      toast(t('toastSeriesCreated', count));
      closeModal();
      render(state.detailParam);
      return;
    }
  }

  if (id) {
    const a = state.actions.find(x => x.id === id);
    Object.assign(a, data);
    storeActionBilingual(a);   // dual-language storage for title + note/meetingNotes
    autoTranslateAction(a);    // fill the other language in the background
  } else {
    const newA = { id: uid(), ...data, createdAt: todayDate() };
    storeActionBilingual(newA);
    state.actions.push(newA);
    autoTranslateAction(newA);
  }
  saveState();
  toast(t('toastSaved'));
  closeModal();
  render(state.detailParam);
}

function deleteAction(id) {
  const a = state.actions.find(x => x.id === id);
  if (a.seriesId) {
    const seriesCount = state.actions.filter(x => x.seriesId === a.seriesId).length;
    const html = `
      <div style="font-size:14px;margin-bottom:14px">"${escapeHtml(a.title)}"</div>
      <div style="font-size:13px;color:var(--ink-muted);margin-bottom:18px">
        ${t('seriesDeleteQuestion', seriesCount)}
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn ghost" style="justify-content:flex-start;padding:11px 14px" onclick="confirmDeleteAction('${id}','one')">${t('deleteThisOnly')}</button>
        <button class="btn" style="justify-content:flex-start;padding:11px 14px;background:var(--red)" onclick="confirmDeleteAction('${id}','series')">${t('deleteWholeSeries', seriesCount)}</button>
      </div>
    `;
    openModal(t('deleteSeriesTitle'), html, `<button class="btn ghost" onclick="closeModal()">${t('cancel')}</button>`);
    return;
  }
  if (!confirm(t('confirmDeleteAction', a.title))) return;
  state.actions = state.actions.filter(x => x.id !== id);
  saveState();
  toast(t('toastDeleted'));
  render(state.detailParam);
}

function confirmDeleteAction(id, scope) {
  const a = state.actions.find(x => x.id === id);
  if (scope === 'series' && a.seriesId) {
    const count = state.actions.filter(x => x.seriesId === a.seriesId).length;
    state.actions = state.actions.filter(x => x.seriesId !== a.seriesId);
    toast(t('toastSeriesDeleted', count));
  } else {
    state.actions = state.actions.filter(x => x.id !== id);
    toast(t('toastDeleted'));
  }
  saveState();
  closeModal();
  render(state.detailParam);
}

function completeAction(id) {
  const a = state.actions.find(x => x.id === id);
  if (isMeeting(a)) {
    // For meetings, show quick status picker
    showMeetingStatusPicker(id);
    return;
  }
  // Block completion if any dependency is still open
  const depIds = Array.isArray(a.dependsOnIds) ? a.dependsOnIds : [];
  if (depIds.length > 0) {
    const openDeps = depIds
      .map(did => state.actions.find(x => x.id === did))
      .filter(d => d && !isCompleted(d));
    if (openDeps.length > 0) {
      const names = openDeps.map(d => d.title).join('\n• ');
      alert(t('alertDependenciesOpen') + '\n\n• ' + names);
      return;
    }
  }
  a.status = 'completed';
  a.completedDate = todayDate();
  saveState();
  toast(t('toastActionCompleted'));
  render(state.detailParam);
}

    <div style="font-size:14px;color:var(--ink-muted);margin-bottom:14px">"${escapeHtml(a.title)}"</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn" style="justify-content:flex-start;padding:12px 16px" onclick="setMeetingStatus('${id}','completed')">${t('optMeetingDone')}</button>
      <button class="btn" style="justify-content:flex-start;padding:12px 16px;background:var(--crit)" onclick="setMeetingStatus('${id}','missed')">${t('optMeetingMissed')}</button>
      <button class="btn ghost" style="justify-content:flex-start;padding:12px 16px" onclick="promptPostpone('${id}')">${t('optMeetingPostpone')}</button>
    </div>
  `;
  openModal(t('updateMeetingStatus'), html, `<button class="btn ghost" onclick="closeModal()">${t('cancel')}</button>`);
}

function setMeetingStatus(id, status) {
  const a = state.actions.find(x => x.id === id);
  a.status = status;
  if (status === 'completed') a.completedDate = todayDate();
  saveState();
  toast(status === 'completed' ? t('toastMeetingDone') : t('toastMeetingMissed'));
  closeModal();
  render(state.detailParam);
}

function promptPostpone(id) {
  const a = state.actions.find(x => x.id === id);
  const html = `
    <div class="form-row">
      <label>${t('fieldNewDate')}</label>
      <input type="date" id="f-newdate" value="${a.dueDate || todayDate()}">
    </div>
    <div class="form-row">
      <label>${t('fieldNewTime')}</label>
      <input type="time" id="f-newtime" value="${a.meetingTime || ''}">
    </div>
    <div class="form-row">
      <label>${t('fieldPostponeReason')}</label>
      <textarea id="f-postreason" placeholder="${t('optionalPlaceholder')}"></textarea>
    </div>
  `;
  const foot = `
    <button class="btn" onclick="confirmPostpone('${id}')">${t('confirmPostponeBtn')}</button>
    <button class="btn ghost" onclick="showMeetingStatusPicker('${id}')">${t('backBtn')}</button>
  `;
  openModal(t('postponeMeeting'), html, foot);
}

function confirmPostpone(id) {
  const a = state.actions.find(x => x.id === id);
  const newDate = document.getElementById('f-newdate').value;
  if (!newDate) { alert(t('alertDateRequired')); return; }
  a.status = 'postponed';
  a.dueDate = newDate;
  a.meetingTime = document.getElementById('f-newtime').value || a.meetingTime;
  const postReason = document.getElementById('f-postreason').value.trim();
  // Add a tracking entry documenting the postponement
  if (!Array.isArray(a.tracking)) a.tracking = [];
  const trackText = `⏰ ${t('postponeMeeting')} → ${fmtDate(newDate)}${postReason ? ` — ${postReason}` : ''}`;
  a.tracking.push({ id: 'tr_' + uid(), text: trackText, date: new Date().toISOString() });
  saveState();
  toast(t('toastMeetingPostponed'));
  closeModal();
  render(state.detailParam);
}

function statusBadgeMini(s) {
  const map = {
    completed: `<span class="badge-mini green">${t('statusCompleted')}</span>`,
    open: `<span class="badge-mini">${t('statusOpen')}</span>`,
    scheduled: `<span class="badge-mini">${t('statusScheduled')}</span>`,
    missed: `<span class="badge-mini crit">${t('statusMissed')}</span>`,
    postponed: `<span class="badge-mini amber">${t('statusPostponed')}</span>`
  };
  return map[s] || map.open;
}

function riskBadgeMini(level) {
  const cls = level.cls === 'green' ? 'green' : level.cls === 'amber' ? 'amber' : level.cls === 'red' ? 'red' : 'crit';
  return `<span class="badge-mini ${cls}">${level.label}</span>`;
}

// NEW: stakeholder tag for a task (Internal Team / Partner: Name / Unassigned)
function getStakeholderTag(a) {
  if (a.ownerKind === 'internal') return { label: t('stakeholderInternal'), internal: true };
  if (a.ownerKind === 'partner') {
    const pa = state.partners.find(pp => (pp.team || []).some(m => m.id === a.ownerId));
    return { label: t('stakeholderPartner', pa ? pa.name : '—'), internal: false };
  }
  return { label: t('stakeholderUnassigned'), internal: null };
}
// NEW: stakeholder NAME for the tasks table column (owner's affiliation, not project partner)
function getTaskStakeholderName(a) {
  if (a.ownerKind === 'internal') return t('stakeholderInternal');
  if (a.ownerKind === 'partner') {
    const pa = state.partners.find(pp => (pp.team || []).some(m => m.id === a.ownerId));
    if (pa) return pa.name;
  }
  // fallback to the project's primary partner
  const proj = getProject(a.projectId);
  const pp = proj ? getPartner(proj.partnerId) : null;
  return pp ? pp.name : '—';
}
// NEW: average delay (in days) across a set of tasks that are currently delayed
function getAvgDelay(tasks) {
  const delayedTasks = tasks.filter(a => isOpen(a) && getDelayDays(a) > 0);
  if (delayedTasks.length === 0) return 0;
  const total = delayedTasks.reduce((s, a) => s + getDelayDays(a), 0);
  return Math.round(total / delayedTasks.length);
}
function stakeholderBadge(a) {
  if (isMeeting(a)) return '—';
  const s = getStakeholderTag(a);
  const bg = s.internal === true ? '#e8f0e8' : s.internal === false ? '#faf0e0' : '#eee9dd';
  const fg = s.internal === true ? '#4a7c59' : s.internal === false ? '#c47e2a' : '#5a6478';
  return `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${bg};color:${fg};white-space:nowrap">${escapeHtml(s.label)}</span>`;
}

              else if (a.note) parts.push(escapeHtml(a.note));
              return parts.length ? parts.join('<br>') : '—';
            })()}</td>
          </tr>`;
        }).join('')}
      </tbody>

  `;

// Comprehensive cross-project tasks report — grouped by project,
// shows all tasks (completed + open) with name, notes, status, delay.
// Scheduled/postponed meetings further than 7 days in the future are excluded.
function printAllTasksReport(existingEntry) {
  const entry = existingEntry || saveReportEntry('tasks-global', {}, t('globalReportTitle'));
  const projects = state.projects;
  const today = todayDate();
  const MEETING_LOOKAHEAD_DAYS = 7;

  // Decide whether an action should appear in the comprehensive report:
  // - Tasks (non-meetings): always included
  // - Completed/missed meetings: always included (historical record)
  // - Open scheduled/postponed meetings: only if within next 7 days
  //   (past-due open meetings still show because diff would be ≤ 7)
  function shouldInclude(a) {
    if (!isMeeting(a)) return true;
    if (!isOpen(a)) return true;
    if (!a.dueDate) return false;
    return daysBetween(today, a.dueDate) <= MEETING_LOOKAHEAD_DAYS;
  }

  const statusPill = (a) => {
    if (isCompleted(a)) return `<span class="badge-mini green">${t('statusCompletedShort')}</span>`;
    if (isMissed(a)) return `<span class="badge-mini crit">${t('statusMissed')}</span>`;
    return `<span class="badge-mini">${t('statusOpenShort')}</span>`;
  };

  // Sort tasks within a project: pending delayed first, then pending on-time, then completed (newest first)
  function sortTasks(items) {
    return [...items].sort((a, b) => {
      const aPending = isOpen(a) || isMissed(a);
      const bPending = isOpen(b) || isMissed(b);
      if (aPending !== bPending) return aPending ? -1 : 1;
      if (aPending) return getDelayDays(b) - getDelayDays(a);
      return (b.completedDate || b.dueDate || '').localeCompare(a.completedDate || a.dueDate || '');
    });
  }

  // Apply lookahead filter (existing rule), then split into tasks vs meetings
  const filteredActions = state.actions.filter(shouldInclude);
  const filteredTasks = filteredActions.filter(a => !isMeeting(a));
  const filteredMeetings = filteredActions.filter(isMeeting);

  // Global totals — TASKS-ONLY for the detail counters; meetings shown as a separate count
  const totalCompleted = filteredTasks.filter(isCompleted).length;
  const totalOpen = filteredTasks.filter(isOpen).length;
  const totalDelayed = filteredTasks.filter(a => isOpen(a) && getDelayDays(a) > 0).length;

  const projectsWithTasks = projects.filter(p =>
    getProjectActions(p.id).filter(shouldInclude).filter(a => !isMeeting(a)).length > 0
    || getProjectActions(p.id).filter(shouldInclude).filter(isMeeting).length > 0
  );

  const body = `
    <h1>📊 ${t('globalReportTitle')}</h1>
    <div class="meta">${t('projectsCovered', projectsWithTasks.length)}</div>

    <h2>${t('reportSummary')}</h2>
    <div class="stats4">
      <div class="stat-cell"><div class="v">${filteredTasks.length}</div><div class="l">${t('reportTotalTasks')}</div></div>
      <div class="stat-cell"><div class="v" style="color:var(--green)">${totalCompleted}</div><div class="l">${t('reportCompletedTasks')}</div></div>
      <div class="stat-cell"><div class="v" style="color:var(--amber)">${totalOpen}</div><div class="l">${t('reportOpenTasks')}</div></div>
      <div class="stat-cell"><div class="v" style="color:var(--red)">${totalDelayed}</div><div class="l">${t('reportDelayedTasks')}</div></div>
      <div class="stat-cell"><div class="v" style="color:var(--accent)">🗓 ${filteredMeetings.length}</div><div class="l">${t('statMeetingsTotal')}</div></div>
    </div>

    <h2>${t('reportProjectHeader')}</h2>
    ${projectsWithTasks.length === 0 ? `<div style="color:#888;padding:14px;text-align:center">${t('reportNoData')}</div>` :
      projectsWithTasks.map(p => {
        const allFiltered = getProjectActions(p.id).filter(shouldInclude);
        const tasks = allFiltered.filter(a => !isMeeting(a));
        const meetingsCount = allFiltered.filter(isMeeting).length;
        const sorted = sortTasks(tasks);
        const partner = getPartner(p.partnerId);
        const compCount = tasks.filter(isCompleted).length;
        const openCount = tasks.filter(isOpen).length;
        const delayedCount = tasks.filter(a => isOpen(a) && getDelayDays(a) > 0).length;
        return `
          <div style="margin-top:24px;padding:16px 18px;background:#faf8f3;border:1px solid var(--line);border-radius:8px">
            <div style="display:flex;justify-content:space-between;align-items:start;gap:12px;flex-wrap:wrap">
              <div>
                <h3 style="font-family:'Reem Kufi',serif;margin:0 0 4px;font-size:16px;color:var(--accent)">📁 ${escapeHtml(p.name)}</h3>
                ${partner ? `<div style="font-size:11px;color:var(--ink-muted)">${escapeHtml(partner.name)} · ${escapeHtml(p.partnershipValue || '')}</div>` : ''}
                ${p.description ? `<div style="font-size:11px;color:var(--ink-faint);margin-top:3px">${escapeHtml(p.description)}</div>` : ''}
              </div>
              <div style="font-size:11px;color:var(--ink-muted);text-align:end">
                ${t('projectSummaryLine', tasks.length, compCount, openCount, delayedCount)}
                ${meetingsCount > 0 ? `<div style="margin-top:4px;color:var(--accent);font-weight:500">🗓 ${meetingsCount} ${t('statMeetingsTotal')}</div>` : ''}
              </div>
            </div>
            ${tasks.length === 0 ? `<div style="margin-top:12px;font-size:12px;color:var(--ink-faint);text-align:center;padding:14px;background:#fff;border-radius:6px">${t('reportNoData')}</div>` : `
            <table class="rt" style="margin-top:12px;background:#fff">
              <thead><tr>
                <th>${t('colTitle')}</th>
                <th>${t('taskOwnerCol')}</th>
                <th>${t('colStakeholder')}</th>
                <th>${t('colStatus')}</th>
                <th>${t('colDate')}</th>

              </tr></thead>
              <tbody>
                ${sorted.map(a => {

                  const stakeholder = a.ownerKind === 'internal' ? t('stakeholderInternal') : a.ownerKind === 'partner' ? (() => { const pa = state.partners.find(pp => (pp.team||[]).some(m => m.id === a.ownerId)); return t('stakeholderPartner', pa ? pa.name : ''); })() : t('stakeholderUnassigned');

// Focused tasks report — completed + open/missed tasks with red-flag indicators
// and an editable warning note at the bottom. Type filter at top.
function printProjectTasksReport(projectId, existingEntry) {
  const p = getProject(projectId);
  if (!p) return;
  const entry = existingEntry || saveReportEntry('project-tasks', { projectId }, p.name);
  const partner = getPartner(p.partnerId);
  const allActions = getProjectActions(projectId);
  const tasksOnly = allActions.filter(a => !isMeeting(a));
  const meetingsOnly = allActions.filter(isMeeting);

  const statusPill = (a) => {
    if (isCompleted(a)) return `<span class="badge-mini green">${t('statusCompletedShort')}</span>`;
    if (isMissed(a)) return `<span class="badge-mini crit">${t('statusMissed')}</span>`;
    return `<span class="badge-mini">${t('statusOpenShort')}</span>`;
  };

  function sortItems(items) {
    return [...items].sort((a, b) => {
      const aPending = isOpen(a) || isMissed(a);
      const bPending = isOpen(b) || isMissed(b);
      if (aPending !== bPending) return aPending ? -1 : 1;
      if (aPending) return getDelayDays(b) - getDelayDays(a);
      return (b.completedDate || b.dueDate || '').localeCompare(a.completedDate || a.dueDate || '');
    });
  }

  function renderBlock(items) {
    // FIX: meetings never count as tasks or delays
    const taskItems = items.filter(a => !isMeeting(a));
    const meetingItems = items.filter(isMeeting);
    const completed = taskItems.filter(isCompleted);
    const pending = taskItems.filter(a => isOpen(a) || isMissed(a));
    const redFlagCount = pending.filter(a => getDelayDays(a) > 2).length;
    const sorted = sortItems(items);
    const stats = `
      <div class="stats4">
        <div class="stat-cell"><div class="v">${taskItems.length}</div><div class="l">${t('reportTotalTasks')}</div></div>
        <div class="stat-cell"><div class="v" style="color:var(--green)">${completed.length}</div><div class="l">${t('reportCompletedTasks')}</div></div>
        <div class="stat-cell"><div class="v" style="color:var(--amber)">${pending.length}</div><div class="l">${t('reportOpenTasks')}</div></div>
        <div class="stat-cell stat-redflag"><div class="v" style="color:var(--red)">🚩 ${redFlagCount}</div><div class="l">${t('redFlagLabel')}</div></div>
      </div>
      ${meetingItems.length ? `<div style="font-size:12px;color:var(--accent);margin:6px 0 0">🗓 ${meetingItems.length} ${t('reportMeetings')}</div>` : ''}
    `;
    const table = items.length === 0 ? `<div style="color:#888;padding:14px;text-align:center">${t('reportNoData')}</div>` : `
      <table class="rt">
        <thead><tr>
          <th>${t('colTitle')}</th>
          <th>${t('colStakeholder')}</th>
          <th>${t('colDate')}</th>
          <th>${t('colStatus')}</th>
          <th>${t('colDelay')}</th>
          <th>${t('taskOwnerCol')}</th>
          <th class="col-redflag">${t('redFlagShort')}</th>
        </tr></thead>
        <tbody>
          ${sorted.map(a => {
            const meet = isMeeting(a);
            const pendingItem = isOpen(a) || isMissed(a);
            // meetings never produce a delay or red flag
            const delay = (!meet && pendingItem) ? getDelayDays(a) : (!meet && isCompleted(a) ? getDelayDays(a) : 0);
            const redFlag = !meet && pendingItem && delay > 2;
            return `<tr class="${redFlag ? 'row-redflag' : ''}">
              <td><strong>${meet ? '🗓 ' : ''}${escapeHtml(a.title)}</strong></td>
              <td>${stakeholderBadge(a)}</td>
              <td>${!meet && a.startDate ? `<div style="font-size:10px;color:#999;margin-bottom:2px">${t('taskStartDate')}: ${fmtDate(a.startDate)}</div>` : ''}${fmtDate(a.dueDate)}${isCompleted(a) && a.completedDate ? `<div style="font-size:10px;color:#888;margin-top:2px">${t('colCompletedDate')}: ${fmtDate(a.completedDate)}</div>` : ''}</td>
              <td>${statusPill(a)}</td>
              <td>${!meet && delay > 0 ? `<span style="color:${redFlag?'var(--red)':'var(--amber)'};font-weight:${redFlag?'600':'normal'}">${t('daysShort', delay)}</span>` : '—'}</td>
              <td style="vertical-align:top"><div style="font-weight:500">${escapeHtml(getOwnerName(a)||'—')}</div><div style="font-size:10px;color:#888">${a.ownerKind==='internal'?t('ownerKindInternal'):a.ownerKind==='partner'?t('ownerKindPartner'):''}</div></td>
              <td class="col-redflag">${redFlag ? `<span class="redflag-cell">🚩 ${t('redFlagLabel')}</span>` : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
    return stats + table;
  }

  const body = `
    <h1>🚩 ${escapeHtml(p.name)}</h1>
    <div class="meta">${t('projectTasksReportTitle')}${partner ? ' · ' + escapeHtml(partner.name) : ''}</div>

    <div class="report-filter-bar no-print">
      <label class="toggle-risk-pill active" id="risk-toggle">
        <input type="checkbox" id="risk-toggle-input" checked onchange="toggleRiskDisplay(this.checked)">
        ${t('toggleRiskFlag')}
      </label>
    </div>

    <h2>${t('reportSummary')}</h2>
    <div id="content-all">${renderBlock(tasksOnly)}</div>

    <div class="warning-note-section">
      <div class="label">⚠️ ${t('warningNoteLabel')}</div>
      <div class="note" contenteditable="true" data-placeholder="${t('warningNotePlaceholder')}"></div>
    </div>

    <script>
      function setReportTypeFilter(f) {
        ['all','tasks','meetings'].forEach(name => {
          const el = document.getElementById('content-' + name);
          if (el) el.style.display = (name === f) ? 'block' : 'none';
        });
        document.querySelectorAll('.filter-pill').forEach(b => {
          b.classList.toggle('active', b.dataset.filter === f);
        });
      }
      function toggleRiskDisplay(show) {
        document.body.classList.toggle('hide-risk', !show);
        const toggle = document.getElementById('risk-toggle');
        if (toggle) toggle.classList.toggle('active', show);
      }
    <\/script>
  `;
  openReportWindow(t('projectTasksReportTitle') + ' — ' + p.name, body, entry);
}
