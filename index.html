<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام حوكمة الشركاء والمشاريع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --bg-card: #ffffff;
    --ink: #1a1f2e;
    --ink-muted: #5a6478;
    --ink-faint: #8a92a3;
    --line: #e4e0d6;
    --line-strong: #c8c2b0;
    --accent: #1a3a52;
    --accent-warm: #b8884a;
    --gold: #c9a96e;
    --green: #4a7c59;
    --amber: #c47e2a;
    --red: #b04540;
    --crit: #7a2d2a;
    --green-bg: #e8f0e8;
    --amber-bg: #faf0e0;
    --red-bg: #f5e0de;
    --crit-bg: #ead8d6;
    --shadow: 0 1px 2px rgba(26, 31, 46, 0.04), 0 4px 12px rgba(26, 31, 46, 0.06);
    --shadow-lg: 0 8px 28px rgba(26, 31, 46, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'IBM Plex Sans Arabic', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184, 136, 74, 0.04) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(26, 58, 82, 0.03) 0%, transparent 40%);
  }

  h1, h2, h3, h4 { font-family: 'Reem Kufi', serif; font-weight: 600; letter-spacing: -0.01em; }

  .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    background: var(--accent);
    color: #f5f3ee;
    padding: 32px 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    border-inline-start: 1px solid rgba(255,255,255,0.06);
  }
  .brand {
    padding-bottom: 28px;
    margin-bottom: 28px;
    border-bottom: 1px solid rgba(245, 243, 238, 0.12);
  }
  .brand-logo {
    display: block;
    width: 128px;
    height: auto;
    margin: 0 auto 18px;
  }
  .brand-mark {
    width: 44px; height: 44px;
    border: 1.5px solid var(--gold);
    display: grid; place-items: center;
    margin-bottom: 14px;
    color: var(--gold);
    font-family: 'Reem Kufi', serif;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .brand-title { font-size: 18px; font-weight: 600; line-height: 1.3; font-family: 'Reem Kufi', serif; }
  .brand-sub { font-size: 12px; color: rgba(245, 243, 238, 0.55); margin-top: 4px; letter-spacing: 0.04em; }

  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    background: none; border: none;
    color: rgba(245, 243, 238, 0.7);
    text-align: start;
    padding: 11px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(245, 243, 238, 0.06); color: #f5f3ee; }
  .nav-item.active {
    background: rgba(201, 169, 110, 0.14);
    color: var(--gold);
    font-weight: 500;
  }
  .nav-item .ico { width: 18px; height: 18px; opacity: 0.85; }
  .nav-section-title {
    font-size: 11px;
    color: rgba(245, 243, 238, 0.4);
    letter-spacing: 0.12em;
    margin: 22px 14px 8px;
    font-weight: 600;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 20px;
    font-size: 11px;
    color: rgba(245, 243, 238, 0.4);
  }
  .sidebar-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; }
  .sb-btn {
    background: rgba(245,243,238,0.06); border: 1px solid rgba(245,243,238,0.1);
    color: rgba(245,243,238,0.75); padding: 8px 12px; border-radius: 5px;
    font-family: inherit; font-size: 12px; cursor: pointer; text-align: start;
    transition: all 0.15s;
  }
  .sb-btn:hover { background: rgba(245,243,238,0.1); color: #f5f3ee; }
  .sb-btn.danger:hover { background: rgba(176, 69, 64, 0.2); color: #f5d0ce; border-color: rgba(176, 69, 64, 0.4); }

  /* Main */
  .main { padding: 36px 44px; max-width: 1400px; }
  .page-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .page-title { font-size: 26px; font-weight: 600; }
  .page-sub { font-size: 13px; color: var(--ink-muted); margin-top: 4px; }
  .page-date {
    text-align: end;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
    font-family: 'Reem Kufi', serif;
  }
  .page-date strong { color: var(--accent); display: block; font-size: 15px; margin-top: 2px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
  .stat {
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 20px;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; inset-inline-end: 0; width: 3px; height: 100%;
    background: var(--accent);
  }
  .stat.warn::before { background: var(--amber); }
  .stat.danger::before { background: var(--red); }
  .stat.good::before { background: var(--green); }
  .stat-label { font-size: 12px; color: var(--ink-muted); letter-spacing: 0.04em; }
  .stat-value { font-size: 32px; font-weight: 600; font-family: 'Reem Kufi', serif; margin-top: 6px; color: var(--accent); }
  .stat.warn .stat-value { color: var(--amber); }
  .stat.danger .stat-value { color: var(--red); }
  .stat.good .stat-value { color: var(--green); }
  .stat-meta { font-size: 12px; color: var(--ink-faint); margin-top: 8px; }
  .stat.clickable { cursor: pointer; transition: all 0.15s; }  .stat.clickable:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--line-strong); }
  .stat-drill {
    position: absolute; bottom: 10px; inset-inline-end: 14px;
    font-size: 11px; color: var(--accent); opacity: 0;
    transition: opacity 0.15s; font-weight: 500; letter-spacing: 0.02em;
  }
  .stat.clickable:hover .stat-drill { opacity: 0.9; }

  /* Section */
  .section { margin-bottom: 40px; }
  .section-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .section-title { font-size: 17px; font-weight: 600; }
  .section-title .accent-line {
    display: inline-block; width: 24px; height: 2px;
    background: var(--gold); vertical-align: middle;
    margin-inline-start: 10px;
  }

  /* Buttons */
  .btn {
    background: var(--accent);
    color: #f5f3ee;
    border: none;
    padding: 9px 18px;
    border-radius: 5px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.15s;
  }
  .btn:hover { background: #243d52; transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn.ghost {
    background: transparent; color: var(--ink); border: 1px solid var(--line-strong);
  }
  .btn.ghost:hover { background: var(--bg-card); border-color: var(--accent); color: var(--accent); }
  .btn.gold {
    background: var(--gold); color: var(--accent);
  }
  .btn.gold:hover { background: var(--accent-warm); color: #fff; }
  .btn.sm { padding: 6px 12px; font-size: 12px; }
  .btn.icon-btn { padding: 9px 12px; }

  /* Table */
  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: #faf8f3;
    text-align: start;
    padding: 12px 16px;
    font-weight: 500;
    color: var(--ink-muted);
    font-size: 12px;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--line);
  }
  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #faf8f3; }
  td .name { font-weight: 500; color: var(--ink); }
  td .sub { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 11px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }
  .badge.green { background: var(--green-bg); color: var(--green); border-color: rgba(74, 124, 89, 0.3); }
  .badge.amber { background: var(--amber-bg); color: var(--amber); border-color: rgba(196, 126, 42, 0.3); }
  .badge.red { background: var(--red-bg); color: var(--red); border-color: rgba(176, 69, 64, 0.3); }
  .badge.crit { background: var(--crit-bg); color: var(--crit); border-color: rgba(122, 45, 42, 0.3); }
  .badge.neutral { background: #eee9dd; color: var(--ink-muted); border-color: var(--line); }
  .badge.dev { background: #e6ecf2; color: var(--accent); border-color: rgba(26, 58, 82, 0.2); }
  .badge.sup { background: #f0e8d6; color: var(--accent-warm); border-color: rgba(184, 136, 74, 0.3); }
  .badge.owned { background: #dbe8de; color: #3d6b4a; border-color: rgba(61, 107, 74, 0.25); }
  .badge.vendor { background: #efe2f0; color: #7a3d82; border-color: rgba(122, 61, 130, 0.25); }
  .badge.custom-type { background: #e8e6e0; color: #555a66; border-color: rgba(85, 90, 102, 0.25); }
  .badge.blue { background: #e1ebf2; color: #2c5e7d; border-color: rgba(44, 94, 125, 0.25); }
  .badge.slate { background: #e8e6e0; color: #555a66; border-color: rgba(85, 90, 102, 0.25); }
  .badge.dark { background: #ead8d6; color: var(--crit); border-color: rgba(122, 45, 42, 0.3); }
  .type-icon {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--ink-faint);
  }

  /* Importance bar */
  .importance {
    display: flex; align-items: center; gap: 8px;
  }
  .imp-bar {
    width: 80px; height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .imp-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }
  .imp-fill.high { background: var(--green); }
  .imp-fill.mid { background: var(--gold); }
  .imp-fill.low { background: var(--red); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26, 31, 46, 0.5);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-card);
    border-radius: 8px;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
  }
  .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-close {
    background: none; border: none; font-size: 22px;
    cursor: pointer; color: var(--ink-faint);
    width: 28px; height: 28px; border-radius: 4px;
  }
  .modal-close:hover { background: var(--line); color: var(--ink); }
  .modal-body { padding: 24px; }
  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: flex-start; gap: 10px;
    background: #faf8f3;
  }

  /* Form */
  .form-row { margin-bottom: 16px; }
  .form-row label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--ink-muted); margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .form-row input,
  .form-row select,
  .form-row textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 5px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: #fafaf7;
    transition: all 0.15s;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26, 58, 82, 0.08);
  }
  .form-row textarea { min-height: 70px; resize: vertical; }
  .form-row.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Empty state */
  .empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--ink-faint);
    font-size: 14px;
  }
  .empty-icon { font-size: 32px; opacity: 0.4; margin-bottom: 10px; }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    align-items: center;
  }
  .filter-chip {
    padding: 6px 14px; border-radius: 16px;
    border: 1px solid var(--line-strong);
    background: var(--bg-card); font-family: inherit; font-size: 12px;
    cursor: pointer; transition: all 0.15s;
    color: var(--ink-muted);
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active {
    background: var(--accent); color: #f5f3ee; border-color: var(--accent);
  }
  .search-input {
    flex: 1; min-width: 200px; max-width: 300px;
    padding: 7px 12px;
    border: 1px solid var(--line-strong);
    border-radius: 5px;
    font-family: inherit; font-size: 13px;
    background: var(--bg-card);
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  /* Action card list (for daily report) */
  .action-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 16px 18px;
    margin-bottom: 10px;
    border-inline-end: 3px solid var(--ink-muted);
    transition: all 0.15s;
  }
  .action-card.amber { border-inline-end-color: var(--amber); }
  .action-card.red { border-inline-end-color: var(--red); }
  .action-card.crit { border-inline-end-color: var(--crit); }
  .action-card:hover { box-shadow: var(--shadow); }
  .ac-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .ac-title { font-weight: 600; font-size: 14px; }
  .ac-meta { display: flex; gap: 14px; font-size: 12px; color: var(--ink-muted); margin-top: 6px; flex-wrap: wrap; }
  .ac-meta-item { display: flex; gap: 5px; align-items: center; }
  .ac-reason { font-size: 13px; color: var(--ink); margin-top: 10px; padding: 8px 12px; background: #faf8f3; border-radius: 4px; border-inline-end: 2px solid var(--line-strong); }

  /* Detail page */
  .detail-grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
  .detail-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 22px;
  }
  .detail-card h3 { font-size: 16px; margin-bottom: 14px; }
  .kv { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--line); font-size: 13px; }
  .kv:last-child { border: none; }
  .kv-label { color: var(--ink-muted); }
  .kv-value { font-weight: 500; }

  /* Print */
  @media print {
    .sidebar, .page-head .btn, .filters, .modal-overlay, .btn { display: none !important; }
    .app { display: block; }
    .main { padding: 0; max-width: 100%; }
    body { background: white; }
    .stat, .table-wrap, .action-card { break-inside: avoid; }
  }

  /* Hidden helper */
  .hidden { display: none !important; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 24px;
    background: var(--accent); color: #f5f3ee;
    padding: 12px 20px; border-radius: 6px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    transform: translateY(120%);
    transition: transform 0.3s;
    z-index: 200;
  }
  .toast.show { transform: translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  /* Compact table actions */
  .row-actions { display: flex; gap: 4px; }
  .row-btn {
    background: none; border: 1px solid var(--line);
    padding: 5px 10px; border-radius: 4px; font-family: inherit; font-size: 11px;
    cursor: pointer; color: var(--ink-muted); transition: all 0.15s;
  }
  .row-btn:hover { border-color: var(--accent); color: var(--accent); background: #faf8f3; }
  .row-btn.danger:hover { border-color: var(--red); color: var(--red); }

  /* Attachments */
  .upload-zone {
    border: 2px dashed var(--line-strong);
    border-radius: 8px;
    padding: 28px 20px;
    text-align: center;
    background: #faf8f3;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 14px;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: #f0eee5;
  }
  .upload-zone .upload-ico { font-size: 28px; margin-bottom: 6px; opacity: 0.5; }
  .upload-zone .upload-text { font-size: 13px; color: var(--ink-muted); }
  .upload-zone .upload-hint { font-size: 11px; color: var(--ink-faint); margin-top: 4px; }

  .attach-list { display: flex; flex-direction: column; gap: 8px; }
  .attach-item {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s;
  }
  .attach-item:hover { border-color: var(--line-strong); }
  .attach-icon {
    width: 40px; height: 40px;
    background: #f0eee5;
    border-radius: 5px;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .attach-icon.pdf { background: #fae0de; color: var(--red); }
  .attach-icon.img { background: #e1ebf2; color: var(--accent); }
  .attach-icon.doc { background: #e6ecf2; color: var(--accent); }
  .attach-info { flex: 1; min-width: 0; }
  .attach-name {
    font-weight: 500; font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .attach-meta { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
  .attach-desc { font-size: 12px; color: var(--ink-muted); margin-top: 4px; font-style: italic; }
  .attach-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .series-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--accent-warm);
    margin-inline-end: 8px;
    background: #f5ebd4;
    padding: 2px 8px; border-radius: 10px;
    border: 1px solid rgba(184, 136, 74, 0.25);
  }

  /* Language toggle */
  .lang-toggle {
    display: flex;
    background: rgba(245,243,238,0.06);
    border: 1px solid rgba(245,243,238,0.1);
    border-radius: 6px;
    padding: 3px;
    margin-bottom: 8px;
  }

  /* Tracking entries */
  .tracking-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .tracking-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 12px;
    background: #faf8f3;
    border-inline-start: 3px solid var(--accent-warm);
    border-radius: 4px;
  }
  .tracking-item-body { flex: 1; }
  .tracking-item-text { font-size: 13px; line-height: 1.5; color: var(--ink); }
  .tracking-item-date {
    font-size: 11px; color: var(--ink-faint);
    font-family: 'Reem Kufi', serif; margin-top: 3px;
  }
  .tracking-item-delete {
    background: none; border: none; cursor: pointer;
    color: var(--ink-faint); font-size: 18px; padding: 0 4px;
    line-height: 1;
  }
  .tracking-item-delete:hover { color: var(--red); }
  .tracking-empty {
    font-size: 12px; color: var(--ink-faint);
    padding: 10px; text-align: center; font-style: italic;
  }
  .tracking-add-row { display: flex; gap: 8px; }
  .tracking-add-row input { flex: 1; }

  /* Toggle chip (checkbox styled as chip) */
  .toggle-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 18px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    color: var(--ink-muted);
  }

  },

  }
};
// Pristine defaults snapshot (for "reset to defaults")
const IMPORTANCE_DEFAULTS = JSON.parse(JSON.stringify(IMPORTANCE_CONFIG));

// Deep-merge saved overrides into IMPORTANCE_CONFIG (mutates in place, keeping the const ref).
function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    Object.keys(IMPORTANCE_CONFIG).forEach(section => {
      if (saved[section] && typeof saved[section] === 'object') {
        Object.keys(IMPORTANCE_CONFIG[section]).forEach(key => {
          const v = saved[section][key];
          if (typeof v === 'number' && !isNaN(v)) IMPORTANCE_CONFIG[section][key] = v;
        });
      }
    });
  } catch (e) { /* ignore corrupt config */ }
}
function saveConfig() {
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(IMPORTANCE_CONFIG)); } catch (e) {}
}
function resetConfig() {
  Object.keys(IMPORTANCE_DEFAULTS).forEach(section => {
    Object.keys(IMPORTANCE_DEFAULTS[section]).forEach(key => {
      IMPORTANCE_CONFIG[section][key] = IMPORTANCE_DEFAULTS[section][key];
    });
  });
  saveConfig();
}

let currentLang = (typeof localStorage !== 'undefined' && localStorage.getItem(LANG_KEY)) || 'ar';

function t(key, ...args) {
  let str = (T[currentLang] && T[currentLang][key]) || (T.ar[key]) || key;
  if (args.length) {
    str = str.replace(/\{(\d+)\}/g, (_, i) => args[i] !== undefined ? args[i] : '');
  }
  return str;
}

function setLang(lang) {
  const previousLang = currentLang;
  currentLang = lang;
  try { localStorage.setItem(LANG_KEY, lang); } catch(e){}
  applyLangToDocument();
  // Bidirectional: show task titles & project names in the active language,
  // translating any that don't have a stored version yet (manual edits preserved).
  if (lang !== previousLang) {
    applyContentLanguage(lang);
  }
  renderSidebar();
  render(state.detailParam);
}

function applyLangToDocument() {
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.title = t('appTitle');
}

let state = {
  partners: [],
  projects: [],
  actions: [],
  reports: [],
  team: [],
  lastReportNumber: 0,
  translationCache: {},
  currentView: 'dashboard',
  filters: {}
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.partners = data.partners || [];
      state.projects = data.projects || [];
      state.actions = data.actions || [];
      state.reports = data.reports || [];
      state.team = data.team || [];
      state.lastReportNumber = data.lastReportNumber || 0;
      state.translationCache = data.translationCache || {};
      // Migration: ensure every action has a type
      state.actions.forEach(a => {
        if (!a.type) a.type = 'task';
        // Migration: convert legacy `reason` string to `tracking` array
        if (!Array.isArray(a.tracking)) {
          a.tracking = [];
          if (a.reason && a.reason.trim()) {
            a.tracking.push({
              id: 'tr_' + uid(),
              text: a.reason,
              date: a.completedDate || a.dueDate || todayDate()
            });
          }
        }
        // Migration: task owner + dependency fields
        if (a.type !== 'meeting') {
          if (a.ownerId === undefined) a.ownerId = '';
          if (a.ownerKind === undefined) a.ownerKind = '';   // 'internal' | 'partner'
          if (a.note === undefined) a.note = '';              // optional context / delay reason
          if (a.isMilestone === undefined) a.isMilestone = false;
          // NEW: task startDate migration
          if (!a.startDate) {
            const proj = state.projects.find(pr => pr.id === a.projectId);
            if (proj && proj.startDate) {
              a.startDate = proj.startDate;
            } else if (a.dueDate) {
              const d = new Date(a.dueDate + 'T00:00:00');
              d.setDate(d.getDate() - 7);
              a.startDate = d.toISOString().slice(0,10);
            } else {
              a.startDate = a.createdAt ? a.createdAt.slice(0,10) : todayDate();
            }
          }
          // Migration: single dependsOn string → dependsOnIds array
          if (!Array.isArray(a.dependsOnIds)) {
            a.dependsOnIds = (a.dependsOn && typeof a.dependsOn === 'string' && a.dependsOn.trim()) ? [a.dependsOn.trim()] : [];
          }
          if ('dependsOn' in a) delete a.dependsOn;
        }
        // Migration: ensure meeting-specific fields exist
        if (a.type === 'meeting') {
          if (a.participants === undefined) a.participants = '';
          if (a.meetingNotes === undefined) a.meetingNotes = '';
          if (a.meetingLink === undefined) a.meetingLink = '';
          if (a.linkedTaskId === undefined) a.linkedTaskId = '';
        }
      });
      // Migration: partners get a team members array + keep custom type support
      state.partners.forEach(p => {
        if (!Array.isArray(p.team)) p.team = [];
      });
      // Migration: ensure every project has attachments array
      state.projects.forEach(p => {
        if (!Array.isArray(p.attachments)) p.attachments = [];
      });
      // Migration: move legacy partnership data from partner → projects
      // Any partner that has partnership data copies it to its projects (if not already set),
      // then the partnership data is removed from the partner.
      state.partners.forEach(p => {
        if (p.partnershipModel !== undefined || p.partnershipAmount !== undefined || p.partnershipValue !== undefined) {
          const partnerProjects = state.projects.filter(pr => pr.partnerId === p.id);
          partnerProjects.forEach(pr => {
            if (pr.partnershipModel === undefined) {
              pr.partnershipModel = p.partnershipModel || 'fixed';
              pr.partnershipAmount = p.partnershipAmount !== undefined ? p.partnershipAmount : 0;
              pr.partnershipCurrency = p.partnershipCurrency || (pr.partnershipModel === 'percentage' ? '%' : 'SAR');
              pr.partnershipValue = p.partnershipValue || '';
            }
          });
          delete p.partnershipModel;
          delete p.partnershipAmount;
          delete p.partnershipCurrency;
          delete p.partnershipValue;
        }
      });
      // Migration: multi-partner + team assignment on projects
      state.projects.forEach(pr => {
        if (!Array.isArray(pr.partnerIds)) {
          pr.partnerIds = pr.partnerId ? [pr.partnerId] : [];
        }
        if (!Array.isArray(pr.teamMemberIds)) pr.teamMemberIds = [];
      });
      // Migration: ensure every project has partnership fields
      state.projects.forEach(pr => {
        if (pr.partnershipModel === undefined) pr.partnershipModel = 'fixed';
        if (pr.partnershipAmount === undefined) pr.partnershipAmount = 0;
        if (pr.partnershipCurrency === undefined) pr.partnershipCurrency = pr.partnershipModel === 'percentage' ? '%' : 'SAR';
        if (pr.partnershipValue === undefined) pr.partnershipValue = '';
        if (pr.partnershipCurrency === 'USD') pr.partnershipCurrency = 'SAR';
        if (!pr.engagementModel) {
          pr.engagementModel = pr.partnershipModel === 'percentage' ? 'joint-venture' : 'client-fixed';
        }
        if (pr.revenueCertainty === undefined || pr.revenueCertainty === null) {
          pr.revenueCertainty = ['joint-venture', 'own-strategic', 'own-vendor'].includes(pr.engagementModel) ? 0.4 : 1.0;
        }
      });
      // Migration: convert old engagement model → ownershipType + partnerContributions
      migrateProjectsToContributions();
      return true;
    }
  } catch (e) { console.error('Load error:', e); }
  return false;
}

// Save a report entry to the archive
function saveReportEntry(type, params, title) {
  if (!Array.isArray(state.reports)) state.reports = [];
  const entry = {
    id: 'rpt_' + uid(),
    number: generateReportNumber(),
    type,
    title,
    date: new Date().toISOString(),
    params: params || {}
  };
  state.reports.unshift(entry); // newest first
  saveState();
  return entry;
}

function formatDateTime(iso) {

  const mm = String(d.getMinutes()).padStart(2, '0');

}

/* ========== HELPERS ========== */
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString(t('locale'), { year: 'numeric', month: 'short', day: 'numeric' });
}

function todayDate() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function daysBetween(a, b) {
  const da = new Date(a); const db = new Date(b);
  return Math.floor((db - da) / (1000 * 60 * 60 * 24));
}

// NEW: parse a YYYY-MM-DD string into a LOCAL date (avoids timezone day-shift)
function parseDateLocal(s) {
  if (!s) return null;
  const parts = String(s).slice(0, 10).split('-');
  if (parts.length !== 3) return new Date(s);
  return new Date(+parts[0], (+parts[1]) - 1, +parts[2]);
}

// NEW: count Saudi BUSINESS days (Sun–Thu) strictly after date `a` up to and
// including date `b`. Friday(5) and Saturday(6) are weekend and never counted.
// Returns 0 when b <= a. Used everywhere for objective, consistent delay tracking.
function businessDaysBetween(a, b) {
  const da = parseDateLocal(a); const db = parseDateLocal(b);
  if (!da || !db || db <= da) return 0;
  let count = 0;
  const cur = new Date(da);
  while (cur < db) {
    cur.setDate(cur.getDate() + 1);
    const day = cur.getDay(); // 0=Sun ... 4=Thu work; 5=Fri,6=Sat weekend
    if (day !== 5 && day !== 6) count++;
  }
  return count;
}

function getDelayDays(action) {
  if (isCompleted(action)) {
    if (!action.completedDate || !action.dueDate) return 0;
    return Math.max(0, businessDaysBetween(action.dueDate, action.completedDate));
  }
  // Postponed meetings reset the clock — no delay against the new date
  if (action.status === 'postponed') return 0;
  if (!action.dueDate) return 0;
  return Math.max(0, businessDaysBetween(action.dueDate, todayDate()));
}

// Status helpers (work for both tasks and meetings)
function isOpen(a) {
  return a.status === 'open' || a.status === 'scheduled' || a.status === 'postponed';
}
function isCompleted(a) { return a.status === 'completed'; }
function isMissed(a) { return a.status === 'missed'; }
function isMeeting(a) { return a.type === 'meeting'; }
function isTask(a) { return a.type !== 'meeting'; }

// --- Task vs Meeting separation helpers (meetings must never count as tasks) ---
function getTasks() { return state.actions.filter(isTask); }
function getMeetingsList() { return state.actions.filter(isMeeting); }
// Meetings linked to a given task (deliverable). Multiple meetings may link to one task.
function getMeetingsForTask(taskId) {
  return state.actions.filter(a => isMeeting(a) && a.linkedTaskId === taskId);
}

// --- Owner / dependency / internal-team helpers ---
function getTeamMember(id) { return (state.team || []).find(m => m.id === id); }
function isInternalOwned(task) { return task && task.ownerKind === 'internal' && task.ownerId; }

// Resolve the display name of a task's owner (internal team member or partner team member)
function getOwnerName(task) {
  if (!task || !task.ownerId) return '';
  if (task.ownerKind === 'internal') {
    const m = getTeamMember(task.ownerId);
    return m ? m.name : '';
  }
  if (task.ownerKind === 'partner') {
    const partner = getPartner(task.partnerId);
    if (partner && Array.isArray(partner.team)) {
      const m = partner.team.find(x => x.id === task.ownerId);
      if (m) return m.name;
    }
  }
  return '';
}

// Small owner tag for cards/tables
function ownerTag(task) {
  const name = getOwnerName(task);
  if (!name) return '';
  const icon = task.ownerKind === 'internal' ? '🧑‍💼' : '🤝';
  return `<span class="owner-tag">${icon} ${escapeHtml(name)}</span>`;
}

// Determine the cause of a task being late: dependency, other factor, or on-track
function getTaskDelayCause(task) {
  if (!isTask(task) || !isOpen(task) || getDelayDays(task) <= 0) {
    return { key: 'ok', label: t('onTrackLabel') };
  }
  // Check multiple dependencies
  const depIds = Array.isArray(task.dependsOnIds) ? task.dependsOnIds : [];
  if (depIds.length > 0) {
    const unresolvedDeps = depIds
      .map(id => state.actions.find(a => a.id === id))
      .filter(dep => dep && !isCompleted(dep));
    if (unresolvedDeps.length > 0) {
      const titles = unresolvedDeps.map(d => d.title).join(', ');
      return { key: 'dep', label: t('delayedDueToDependencyMulti') + ': ' + titles, depTasks: unresolvedDeps };
    }
  }
  return { key: 'other', label: task.note ? task.note : t('delayedOtherFactor') };
}

// Internal team performance: one row per internal member who owns tasks
function getInternalTeamPerformance() {
  return (state.team || []).map(m => {
    const tasks = state.actions.filter(a => isTask(a) && a.ownerKind === 'internal' && a.ownerId === m.id);
    const completed = tasks.filter(isCompleted);
    const open = tasks.filter(isOpen);
    const delayed = open.filter(a => getDelayDays(a) > DELAY_THRESHOLD_DAYS);
    const closingRate = tasks.length ? Math.round((completed.length / tasks.length) * 100) : 0;
    const projectIds = [...new Set(tasks.map(a => a.projectId))];
    return { member: m, total: tasks.length, completed: completed.length, open: open.length,
             delayed: delayed.length, closingRate, projectIds, tasks };
  }).filter(r => r.total > 0)
    .sort((a, b) => b.delayed - a.delayed || a.closingRate - b.closingRate);
}


// Open the meeting link in a new tab (avoids embedding raw URLs in HTML attributes)
window.joinMeeting = function(id) {
  const a = state.actions.find(x => x.id === id);
  if (a && a.meetingLink) {
    let url = a.meetingLink.trim();
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    window.open(url, '_blank', 'noopener');
  }
};

// Returns a "Join Meeting" button if the meeting has a link, else empty string
function joinMeetingBtn(a, cls) {
  if (!isMeeting(a) || !a.meetingLink) return '';
  return `<button class="join-meeting-btn ${cls || ''}" onclick="event.stopPropagation();joinMeeting('${a.id}')">${t('joinMeeting')}</button>`;
}

// Add recurrence interval to a date string, returns new YYYY-MM-DD
function addRecurrence(dateStr, type) {
  const d = new Date(dateStr);
  if (type === 'weekly') d.setDate(d.getDate() + 7);
  else if (type === 'biweekly') d.setDate(d.getDate() + 14);
  else if (type === 'monthly') d.setMonth(d.getMonth() + 1);
  return d.toISOString().split('T')[0];
}

// Returns the Friday on or before the given date (start of the Friday-Friday week)
function startOfFridayWeek(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay(); // 0=Sun, 1=Mon, ..., 5=Fri, 6=Sat
  const diff = (day - 5 + 7) % 7; // days to subtract to land on Friday
  d.setDate(d.getDate() - diff);
  return d.toISOString().split('T')[0];
}
function endOfFridayWeek(dateStr) {
  const d = new Date(startOfFridayWeek(dateStr));
  d.setDate(d.getDate() + 6); // 6 more days → Thursday inclusive (Friday-Thursday)
  return d.toISOString().split('T')[0];
}
// Sunday-based week (Sunday → Saturday, 7 days) — used by weekly reports
function startOfSundayWeek(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() - d.getDay()); // getDay() 0=Sunday → back to Sunday
  return d.toISOString().split('T')[0];
}
function endOfSundayWeek(dateStr) {
  const d = new Date(startOfSundayWeek(dateStr));
  d.setDate(d.getDate() + 6); // Saturday inclusive
  return d.toISOString().split('T')[0];
}
function startOfMonth(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-01';
}
function endOfMonth(dateStr) {
  const d = new Date(dateStr);
  const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
  return last.toISOString().split('T')[0];
}

// Returns the date range for a given report period
// Subtract n days from a YYYY-MM-DD date string
function dateMinusDays(dateStr, n) {
  const d = new Date(dateStr || todayDate());
  d.setDate(d.getDate() - n);
  return d.toISOString().split('T')[0];
}

function getReportPeriodRange(period, dateStr) {
  const d = dateStr || todayDate();
  if (period === 'today') return { start: d, end: d };
  // Weekly = the last 7 days ending on the selected date (default: today → backward 7 days)
  if (period === 'week') return { start: dateMinusDays(d, 6), end: d };
  // Monthly = the last 30 days ending on the selected date (default: today → backward 30 days)
  if (period === 'month') return { start: dateMinusDays(d, 29), end: d };
  if (period === 'range') {
    let s = state.filters.reportRangeStart || todayDate();
    let e = state.filters.reportRangeEnd || s;
    if (e < s) { const tmp = s; s = e; e = tmp; }
    return { start: s, end: e };
  }
  return null; // 'all' — comprehensive, to-date (no date filter)
}

function filterActionsByPeriod(actions, period, dateStr) {
  const range = getReportPeriodRange(period, dateStr);
  if (!range) return actions;
  return actions.filter(a => a.dueDate && a.dueDate >= range.start && a.dueDate <= range.end);
}

// Risk level for an open action based on days overdue
function getRiskLevel(daysOverdue) {
  if (daysOverdue <= DELAY_THRESHOLD_DAYS) return { key: 'low', label: t('riskLow'), cls: 'green' };
  if (daysOverdue <= 7) return { key: 'medium', label: t('riskMedium'), cls: 'amber' };
  if (daysOverdue <= 14) return { key: 'high', label: t('riskHigh'), cls: 'red' };
  return { key: 'critical', label: t('riskCritical'), cls: 'crit' };
}

// Calculate partner importance score
function getPartnerCommitment(partnerId) {
  // Commitment = an OBJECTIVE measure of how reliably the partner delivers on
  // tasks that have actually come DUE. Key principles:
  //   - Meetings excluded (tracked separately).
  //   - Internally-owned tasks excluded (our delays never penalize the partner).
  //   - Upcoming tasks (open, not yet past due) are NOT yet evaluable — they never
  //     count for or against the partner, so a brand-new upcoming task does not
  //     produce an arbitrary mid score.
  const relevant = state.actions.filter(a =>
    a.partnerId === partnerId && isTask(a) && !isInternalOwned(a));

  const completed = relevant.filter(isCompleted);
  const open = relevant.filter(isOpen);
  const missed = relevant.filter(isMissed);
  const completedOnTime = completed.filter(a => getDelayDays(a) <= DELAY_THRESHOLD_DAYS);
  const completedLate = completed.filter(a => getDelayDays(a) > DELAY_THRESHOLD_DAYS);
  const openDelayed = open.filter(a => getDelayDays(a) > DELAY_THRESHOLD_DAYS); // overdue & still open

  // Average delay across items that are/were actually late
  const lateItems = openDelayed.concat(completedLate);
  const avgDelay = lateItems.length ? Math.round(lateItems.reduce((s,a)=>s+getDelayDays(a),0)/lateItems.length) : 0;

  // Objective weighted average over evaluable tasks. Per-task points (delay = BUSINESS days):
  //   on-time completion (≤0)        = 100
  //   late completion 1–3 days       = 70
  //   late completion 4–7 days       = 50
  //   late completion 8–10 days      = 30
  //   late completion > 10 days      = 10
  //   overdue and still open         = 20
  //   missed                         = 0
  function taskCommitmentPoints(a) {
    const C = IMPORTANCE_CONFIG.commitment;
    if (isMissed(a)) return C.missed;
    if (isCompleted(a)) {
      const d = getDelayDays(a);
      if (d <= 0) return C.onTime;
      if (d <= 3) return C.late1to3;
      if (d <= 7) return C.late4to7;
      if (d <= 10) return C.late8to10;
      return C.lateOver10;
    }
    if (isOpen(a)) {
      return getDelayDays(a) > 0 ? C.overdueOpen : null; // overdue open; upcoming = not evaluable
    }
    return null;
  }

  const evaluable = relevant.map(taskCommitmentPoints).filter(pts => pts !== null);

  if (evaluable.length === 0) {
    // Nothing has come due yet → cannot fairly rate (e.g. only upcoming tasks).
    return { score: null, level: 'na', label: t('notRatedLabel'),
             completed: completed.length, completedOnTime: completedOnTime.length,
             open: open.length, delayed: openDelayed.length, missed: missed.length,
             avgDelay, total: relevant.length };
  }

  let pct = Math.round(evaluable.reduce((s, p) => s + p, 0) / evaluable.length);
  pct = Math.max(0, Math.min(100, pct));

  let level, label;
  if (pct >= IMPORTANCE_CONFIG.commitment.highThreshold) { level = 'high'; label = t('importanceHigh'); }
  else if (pct >= IMPORTANCE_CONFIG.commitment.midThreshold) { level = 'mid'; label = t('importanceMid'); }
  else { level = 'low'; label = t('importanceLow'); }

  return {
    score: pct, rawScore: pct, level, label,
    total: relevant.length, completed: completed.length,
    completedOnTime: completedOnTime.length, open: open.length,
    delayed: openDelayed.length, missed: missed.length, avgDelay
  };
}

// Manual importance from partner inputs (stars + project count + any-percentage bonus from projects)
function getPartnerImportance(partnerId) {
  const p = getPartner(partnerId);
  if (!p) return { stars: 0, score: 0, level: 'low', label: t('importanceLow'), projectCount: 0, hasPercentageProject: false };
  const partnerProjects = getPartnerProjects(partnerId);
  const projectCount = partnerProjects.length;
  // OBJECTIVE: a partner's importance = average strategic importance of their projects
  let score = 0;
  if (projectCount > 0) {
    score = Math.round(partnerProjects.reduce((s, pr) => s + getProjectImportance(pr), 0) / projectCount);
  }
  score = Math.max(0, Math.min(100, score));
  const stars = Math.max(0, Math.min(5, Math.round(score / 20)));
  const hasPercentageProject = partnerProjects.some(pr => pr.partnershipModel === 'percentage' || pr.engagementModel === 'joint-venture');
  let level, label;
  if (score >= 70) { level = 'high'; label = t('importanceHigh'); }
  else if (score >= 40) { level = 'mid'; label = t('importanceMid'); }
  else { level = 'low'; label = t('importanceLow'); }
  return { stars, score, level, label, projectCount, hasPercentageProject };
}

// Convert legacy engagement-model projects into ownershipType + partnerContributions.
function migrateProjectsToContributions() {
  (state.projects || []).forEach(pr => {
    if (pr.ownershipType && Array.isArray(pr.partnerContributions)) return; // already migrated
    const em = pr.engagementModel || 'client-fixed';
    const amount = parseFloat(pr.partnershipAmount) || 0;
    const certainty = (typeof pr.revenueCertainty === 'number') ? pr.revenueCertainty : IMPORTANCE_CONFIG.financial.defaultCertainty;

    let ownershipType = 'noOwnership', ownershipStake = 0, ownershipCertainty = 1.0, internalProject = false;
    if (em === 'own-strategic' || em === 'own-vendor') ownershipType = 'majorityOwn';
    else if (em === 'joint-venture') {
      ownershipType = 'jointVenture';
      ownershipStake = pr.partnershipModel === 'percentage' ? amount : 0;
      ownershipCertainty = certainty;
    } else if (em === 'internal') { ownershipType = 'majorityOwn'; internalProject = true; }
    else ownershipType = 'noOwnership'; // client-fixed / outsourcing-retainer / other

    const partnerIds = (Array.isArray(pr.partnerIds) && pr.partnerIds.length) ? pr.partnerIds : (pr.partnerId ? [pr.partnerId] : []);
    const contribs = [];
    if (!internalProject) {
      partnerIds.forEach(pid => {
        let role = 'Customer', financialType = 'Revenue (fixed)', entryCertainty = null;
        if (em === 'joint-venture' || em === 'own-strategic') { role = 'Strategic Partner'; financialType = 'Revenue (percentage)'; entryCertainty = certainty; }
        else if (em === 'client-fixed' || em === 'outsourcing-retainer') { role = 'Customer'; financialType = 'Revenue (fixed)'; }
        else if (em === 'own-vendor') { role = 'Vendor'; financialType = 'Cost'; }
        const entry = { partnerId: pid, role, financialType, amount };
        if (financialType === 'Revenue (percentage)') entry.certainty = entryCertainty;
        contribs.push(entry);
      });
    }
    if (pr.ownershipType === undefined) pr.ownershipType = ownershipType;
    if (pr.ownershipStake === undefined) pr.ownershipStake = ownershipStake;
    if (pr.ownershipCertainty === undefined) pr.ownershipCertainty = ownershipCertainty;
    if (pr.internalProject === undefined) pr.internalProject = internalProject;
    if (pr.internalProject && !pr.internalTier) pr.internalTier = 'operational';
    if (!Array.isArray(pr.partnerContributions)) pr.partnerContributions = contribs;
  });
}

// Duration of a project in whole months (rounded up, min 1). Falls back to config default.
function getDurationMonths(startDate, endDate) {
  if (!startDate || !endDate) return IMPORTANCE_CONFIG.financial.defaultProjectDurationMonths;
  const s = parseDateLocal(startDate), e = parseDateLocal(endDate);
  if (!s || !e || e <= s) return IMPORTANCE_CONFIG.financial.defaultProjectDurationMonths;
  const days = (e - s) / (1000 * 60 * 60 * 24);
  return Math.max(1, Math.ceil(days / 30.4375));
}

// OBJECTIVE strategic importance of a single project (0–100), data-driven.
function getProjectImportance(project) {
  if (!project) return 0;
  const CFG = IMPORTANCE_CONFIG;
  let total = 0;

  // 1) Ownership contribution
  const ownershipType = project.ownershipType || 'noOwnership';
  const noPartners = (!(project.partnerContributions || []).length) &&
                     (!(project.partnerIds || []).length) && !project.partnerId;
  if (ownershipType === 'majorityOwn') {
    if (project.internalProject || noPartners) {
      // Internal projects use a 3-tier business-impact score
      const tier = project.internalTier || 'operational';
      total += (CFG.internalTier[tier] !== undefined) ? CFG.internalTier[tier] : CFG.internalTier.operational;
    } else {
      total += CFG.ownership.majorityOwn;
    }
  } else if (ownershipType === 'jointVenture') {
    const stake = (parseFloat(project.ownershipStake) || 0) / 100;
    const certainty = (typeof project.ownershipCertainty === 'number') ? project.ownershipCertainty : CFG.financial.defaultCertainty;
    total += CFG.ownership.jointVentureBase * stake * certainty;
  } else { // noOwnership
    total += CFG.ownership.noOwnership;
  }

  // 2) Partner contributions
  const months = getDurationMonths(project.startDate, project.targetDate);
  (project.partnerContributions || []).forEach(c => {
    const roleKey = ROLE_WEIGHT_KEY[c.role];
    const roleWeight = roleKey ? (CFG.roleWeight[roleKey] || 0) : 0;
    const amount = parseFloat(c.amount) || 0;
    const certainty = (typeof c.certainty === 'number') ? c.certainty : CFG.financial.defaultCertainty;
    let points = 0;
    if (c.financialType === 'Revenue (fixed)') {
      const monthlyRevenue = amount / months;
      points = Math.min(CFG.financial.maxRevenuePoints, monthlyRevenue / CFG.financial.monthlyRevenueDivisor);
    } else if (c.financialType === 'Monthly Retainer') {
      // Amount is already a per-month figure; multiplier recognises recurring, predictable income
      const basePoints = amount / CFG.financial.monthlyRevenueDivisor;
      points = Math.min(CFG.financial.maxRevenuePoints, basePoints * CFG.financial.monthlyRetainerMultiplier);
    } else if (c.financialType === 'Revenue (percentage)') {
      points = Math.min(CFG.financial.maxRevenuePoints, (amount * certainty) / CFG.financial.revenuePercentDivisor);
    } else if (c.financialType === 'Cost') {
      points = Math.min(CFG.financial.maxCostPoints, amount / CFG.financial.costDivisor);
    }

    // Customer role weight is scaled by contract value so small/zero deals contribute less.
    // (Non-Customer roles keep their full weight; financial points are unchanged for all.)
    let effectiveRoleWeight = roleWeight;
    if (c.role === 'Customer' && (c.financialType === 'Revenue (fixed)' || c.financialType === 'Monthly Retainer')) {
      const T = CFG.customerValueTier;
      const basis = (c.financialType === 'Monthly Retainer') ? amount * 12 : amount; // annualise retainers
      let mult;
      if (basis < T.tier1Max) mult = T.tier1Mult;
      else if (basis < T.tier2Max) mult = T.tier2Mult;
      else if (basis < T.tier3Max) mult = T.tier3Mult;
      else mult = T.tier4Mult;
      effectiveRoleWeight = roleWeight * mult;
    }
    total += effectiveRoleWeight + points;
  });

  return Math.min(100, Math.round(total));
}

// Agreement-type weight contributes to a project's STRATEGIC importance.
function agreementWeight(project) {
  if (!project) return 0;
  if (project.partnershipModel === 'percentage') return 8; // equity-style upside → more strategic
  if (project.partnershipModel === 'fixed') return 4;
  return 2; // custom / other
}

// Combined project score. Keeps two SEPARATE axes:
//  - importance: how much the project matters strategically (NOT lowered by poor execution)
//  - health:     how well execution is going (milestones reached + partner commitment − delays)
// Then focus = importance × risk, so important + struggling projects rise to the top.
function getProjectScore(projectId) {
  const project = getProject(projectId);
  if (!project) return null;
  const partnerImp = getPartnerImportance(project.partnerId);
  const commit = getPartnerCommitment(project.partnerId);

  // Importance (0–100): objective strategic value of the project
  const importance = getProjectImportance(project);

  // Milestones
  const milestones = getProjectMilestones(projectId);
  const milestonesReached = milestones.filter(isCompleted).length;
  const milestonesTotal = milestones.length;
  const milestoneProgress = milestonesTotal ? Math.round((milestonesReached / milestonesTotal) * 100) : null;

  // Task progress (pure tasks, excluding milestones & meetings)
  const tasks = getProjectPureTasks(projectId);
  const tasksDone = tasks.filter(isCompleted).length;
  const taskProgress = tasks.length ? Math.round((tasksDone / tasks.length) * 100) : null;

  // Delays on open work
  const allOpen = [...tasks, ...milestones].filter(isOpen);
  const delayedOpen = allOpen.filter(a => getDelayDays(a) > DELAY_THRESHOLD_DAYS).length;

  // Weighted progress: milestones 60% + tasks 40% when both exist; otherwise whichever
  // exists. When NEITHER tasks nor milestones exist, health is "not rated" (null).
  let progress, health;
  const H = IMPORTANCE_CONFIG.health;
  const hasWork = (milestoneProgress !== null) || (taskProgress !== null);
  if (!hasWork) {
    health = null; // not rated — no defined work to assess
  } else {
    if (milestoneProgress !== null && taskProgress !== null) {
      progress = Math.round(milestoneProgress * H.milestoneWeight + taskProgress * H.taskWeight);
    } else if (milestoneProgress !== null) {
      progress = milestoneProgress;
    } else {
      progress = taskProgress;
    }
    const commitScore = commit.score === null ? 50 : commit.score;
    health = Math.round(H.progressWeight * progress + H.commitmentWeight * commitScore) - Math.min(H.delayPenaltyCap, delayedOpen * H.delayPenaltyPerTask);
    health = Math.max(0, Math.min(100, health));
  }

  // Focus (0–100): important AND at-risk → needs attention. Unrated health → no focus value.
  const focus = (health === null) ? null : Math.round(importance * (100 - health) / 100);
  let focusLevel;
  if (focus === null) focusLevel = 'na';
  else if (focus >= 45) focusLevel = 'critical';
  else if (focus >= 28) focusLevel = 'high';
  else if (focus >= 14) focusLevel = 'watch';
  else focusLevel = 'ok';

  return {
    importance, health, focus, focusLevel,
    milestonesReached, milestonesTotal, milestoneProgress,
    taskProgress, delayedOpen,
    commitment: commit.score, commitmentLevel: commit.level,
    stars: partnerImp.stars
  };
}

  return text.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Returns a short string summarizing the tracking entries of an action
function trackingSummary(action) {
  const list = action.tracking || [];
  if (list.length === 0) return action.reason || '';
  const last = list[list.length - 1];
  if (list.length === 1) return last.text;
  return `${last.text} · +${list.length - 1}`;
}

// Render the complete tracking list of an action, ordered by date (oldest first).
// Returns HTML — already escapes user content internally.
function trackingFullDisplay(action) {
  const list = (action.tracking || []).slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  if (list.length === 0) {
    if (action.reason) return `<div style="font-size:11px;color:var(--ink-muted)">${escapeHtml(action.reason)}</div>`;
    return '<span style="color:var(--ink-faint)">—</span>';
  }
  return `<ol style="margin:0;padding-inline-start:18px;font-size:11px;line-height:1.5;color:var(--ink)">

      <div>${escapeHtml(e.text)}</div>
    </li>`).join('')}

}

// Format a tracking timestamp short — e.g. "15 May, 10:30"
function fmtTrackingDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const dateStr = d.toLocaleDateString(t('locale'), { month: 'short', day: 'numeric' });
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${dateStr} · ${hh}:${mm}`;
}

// Translate a single string via the free MyMemory API
async function translateText(text, from, to) {
  if (!text || !text.trim()) return text;
  // Primary: Google's free translate endpoint — far more accurate than community memories.
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data) && Array.isArray(data[0])) {
        const out = data[0].map(seg => (seg && seg[0]) ? seg[0] : '').join('').trim();
        if (out) return out;
      }
    }
  } catch (e) { /* fall through to fallback */ }
  // Fallback: MyMemory — but reject junk/low-quality community matches that cause bad results.
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`;
    const res = await fetch(url);
    const data = await res.json();
    const rd = data && data.responseData;
    if (rd && rd.translatedText &&
        !/PLEASE SELECT|INVALID|QUERY LENGTH|MYMEMORY WARNING|NO QUERY/i.test(rd.translatedText)) {
      const match = parseFloat(rd.match);
      if (isNaN(match) || match >= 0.5) return rd.translatedText; // only confident matches
    }
  } catch (e) { /* ignore */ }
  throw new Error('Translation unavailable');
}

// Collect every user-entered Arabic string from state that has no cached translation yet
function collectUntranslatedStrings() {
  const seen = new Set();
  const cache = state.translationCache || {};
  function maybeAdd(text) {
    if (text && containsArabic(text) && !cache[text]) seen.add(text);
  }
  state.partners.forEach(p => {
    maybeAdd(p.name); maybeAdd(p.contact); maybeAdd(p.notes);
  });
  state.projects.forEach(p => {
    maybeAdd(p.name); maybeAdd(p.description); maybeAdd(p.partnershipValue);
  });
  state.actions.forEach(a => {
    maybeAdd(a.title); maybeAdd(a.reason);
    (a.tracking || []).forEach(e => maybeAdd(e.text));
  });
  return Array.from(seen);
}

let isTranslating = false;
async function translateAllUserContent(silent) {
  if (isTranslating) return;
  const items = collectUntranslatedStrings();
  if (items.length === 0) {
    if (!silent) toast(t('translationNothingToDo'));
    return;
  }
  isTranslating = true;
  if (!state.translationCache) state.translationCache = {};
  let count = 0, failures = 0;
  for (const text of items) {
    try {
      const translated = await translateText(text, 'ar', 'en');
      state.translationCache[text] = translated;
      count++;
      // Progress feedback every 3 items
      if (count % 3 === 0 || count === items.length) {
        toast(t('translatingContent', count, items.length));
      }
      // Tiny delay to be respectful of free API
      await new Promise(r => setTimeout(r, 150));
    } catch (e) {
      failures++;
      // If many consecutive failures, bail
      if (failures >= 3 && count === 0) {
        isTranslating = false;
        toast(t('translationOffline'));
        return;
      }
    }
  }
  saveState();
  isTranslating = false;
  toast(t('translationDone', count));
  render();
}

// ===== Bidirectional content language (task titles & project names) =====
// Goal: a name entered in one language auto-appears translated when the UI is
// toggled to the other language, while any language a user has TYPED themselves
// is treated as manual and never overwritten by auto-translation.
function detectContentLang(text) { return containsArabic(text) ? 'ar' : 'en'; }

// Store an entered title/name into dual-language slots with manual-edit protection.
// Store dual-language slots for an action's editable text fields (title + note/meetingNotes).
function storeActionBilingual(a) {
  if (a.title) setBilingualField(a, 'title', a.title);
  const noteKey = a.type === 'meeting' ? 'meetingNotes' : 'note';
  if (a[noteKey]) setBilingualField(a, noteKey, a[noteKey]);
}
// Best-effort background translation of an action's text fields into the other language.
function autoTranslateAction(a) {
  const jobs = [];
  if (a.title) jobs.push(ensureBilingual(a, 'title', detectContentLang(a.title) === 'ar' ? 'en' : 'ar'));
  const noteKey = a.type === 'meeting' ? 'meetingNotes' : 'note';
  if (a[noteKey]) jobs.push(ensureBilingual(a, noteKey, detectContentLang(a[noteKey]) === 'ar' ? 'en' : 'ar'));
  if (jobs.length) Promise.all(jobs).then(rs => { if (rs.some(Boolean)) saveState(); });
}

function setBilingualField(obj, baseKey, value) {
  // Slot strictly by the CURRENT UI language — what the user typed belongs to that language.
  const cap = currentLang === 'ar' ? 'Ar' : 'En';
  const v = value || '';
  obj[baseKey + cap] = v;                  // store in the current language slot
  obj[baseKey + 'Manual' + cap] = true;    // current language is now user-authored
  obj[baseKey] = v;                        // canonical mirror = current-language text (for legacy display paths)
  // The OTHER language slot and its manual flag are left completely untouched —
  // editing one language must never overwrite or erase the other.
}

// Heuristic: an auto-translation is "broken" if it contains characters from the WRONG script —
// an Arabic slot containing Latin words, or an English slot containing Arabic letters. This catches
// the garbage mixed-language results some translation services return (e.g. "...Startegy" in Arabic).
function looksBroken(text, cap) {
  if (!text) return false;
  if (cap === 'Ar') return /[A-Za-z]{2,}/.test(text);   // Arabic slot containing a Latin word
  return /[\u0600-\u06FF]/.test(text);                   // English slot containing Arabic letters
}

// Fill obj[baseKey + <targetLang>] by translating from the other slot. Writes when the target slot
// is empty, OR (force=true) when the existing auto-translation is broken — but NEVER overwrites a
// manually-authored slot, and never stores a result that is itself broken.
async function ensureBilingual(obj, baseKey, targetLang, force) {
  const cap = targetLang === 'ar' ? 'Ar' : 'En';
  const otherCap = cap === 'Ar' ? 'En' : 'Ar';
  if (obj[baseKey + 'Manual' + cap]) return false;       // manual → never overwrite
  if (!force && obj[baseKey + cap]) return false;        // non-empty & not forcing a fix
  const source = obj[baseKey + otherCap];                // translate only from the other slot
  if (!source) return false;
  try {
    const translated = await translateText(source, targetLang === 'ar' ? 'en' : 'ar', targetLang);
    const tr = translated && translated.trim();
    if (tr && !looksBroken(tr, cap)) {                   // only store a clean result
      obj[baseKey + cap] = tr;
      return true;
    }
  } catch (e) { /* offline / failed → keep slots as they are, no crash */ }
  return false;
}

// Backfill bilingual slots for existing data (first run / legacy records).
// Detect the language of the legacy value, store it in the matching slot with manual flag FALSE,
// leave the other slot empty. No auto-translation here.
function migrateBilingualContent() {
  const mig = (obj, key) => {
    const v = obj[key];
    if (v && !obj[key + 'En'] && !obj[key + 'Ar']) {
      const cap = detectContentLang(v) === 'ar' ? 'Ar' : 'En';
      obj[key + cap] = v; obj[key + 'Manual' + cap] = false;
    }
  };
  (state.actions || []).forEach(a => {
    mig(a, 'title');
    if (a.type === 'meeting') mig(a, 'meetingNotes');
    else mig(a, 'note');
  });
  (state.projects || []).forEach(p => {
    mig(p, 'name');
    mig(p, 'description');
  });
}

// On language switch: show every task title & project name in the active language,
// translating any missing ones in the background (best-effort) then re-rendering.
let isApplyingContentLang = false;
async function applyContentLanguage(lang) {
  const cap = lang === 'ar' ? 'Ar' : 'En';
  const otherCap = cap === 'Ar' ? 'En' : 'Ar';
  const missing = [];
  // Apply the active language to a single field on an object (display the current slot,
  // "—" placeholder when empty, queue translation from the other slot — never fall back).
  const applyField = (obj, key, opt) => {
    const cur = obj[key + cap];
    // A non-manual slot whose text is broken (wrong-script garbage) should be re-translated.
    const broken = cur && !obj[key + 'Manual' + cap] && looksBroken(cur, cap);
    if (cur && !broken) { obj[key] = cur; }
    else if (obj[key + otherCap]) {            // empty OR broken → (re)translate from the other slot
      obj[key] = opt ? '' : '—';
      missing.push({ obj, key, force: !!broken });
    }
    else if (cur) { obj[key] = cur; }          // broken but no source to fix it → show as-is
    else if (opt) { obj[key] = ''; }
  };
  // Show ONLY the current language's slot for titles, notes, names and descriptions.
  (state.actions || []).forEach(a => {
    applyField(a, 'title');
    if (a.type === 'meeting') applyField(a, 'meetingNotes', true);
    else applyField(a, 'note', true);
  });
  (state.projects || []).forEach(p => {
    applyField(p, 'name');
    applyField(p, 'description', true);
  });
  if (missing.length === 0 || isApplyingContentLang) return;
  isApplyingContentLang = true;
  let changed = false;
  for (const m of missing) {
    const ok = await ensureBilingual(m.obj, m.key, lang, m.force);
    if (ok) { m.obj[m.key] = m.obj[m.key + cap]; changed = true; }
    await new Promise(r => setTimeout(r, 120)); // be gentle with the free API
  }
  isApplyingContentLang = false;
  if (changed) { saveState(); render(state.detailParam); }
}

        <span class="stat-drill">${t('drillDown')} ›</span>

      <div class="stat warn clickable" onclick="goToTasksFiltered('delayed')" title="${t('drillHint')}">
        <div class="stat-label">${t('statDelayedActions')}</div>
        <div class="stat-value">${delayedActions.length}</div>

        <span class="stat-drill">${t('drillDown')} ›</span>

      <div class="stat danger clickable" onclick="goToTasksFiltered('critical')" title="${t('drillHint')}">

          if (scored.length === 0) return `<div class="empty">${t('noPriorityProjects')}</div>`;
          scored.sort((a, b) => ((b.s.focus===null?-1:b.s.focus) - (a.s.focus===null?-1:a.s.focus)) || b.s.importance - a.s.importance);
          return `<table>
            <thead><tr><th>${t('colProject')}</th><th>${t('colImportance')}</th><th>${t('colHealth')}</th><th>${t('colMilestones')}</th><th>${t('colFocus')}</th></tr></thead>

            <tbody>
              ${topPartners.map(({p, importance}) => `

        <div class="table-wrap">

function renderActionCard(a) {
  const delay = getDelayDays(a);
  const risk = getRiskLevel(delay);
  const partner = getPartner(a.partnerId);
  const project = getProject(a.projectId);
  const meeting = isMeeting(a);
  const linkedTask = meeting && a.linkedTaskId ? state.actions.find(x => x.id === a.linkedTaskId && isTask(x)) : null;
  return `
    <div class="action-card ${isMissed(a) ? 'crit' : risk.cls}">
      <div class="ac-head">
        <div>
          <div class="ac-title">${meeting ? '🗓 ' : (isMilestone(a) ? '🎯 ' : '')}${escapeHtml(a.title)}${isMilestone(a) ? ` <span class="badge sup" style="font-size:10px">${t('milestoneBadge')}</span>` : ''}</div>
          <div class="ac-meta">
            <div class="ac-meta-item">${t('metaProject')} ${escapeHtml(project ? project.name : '—')}</div>
            <div class="ac-meta-item">${t('metaPartner')} ${escapeHtml(partner ? partner.name : '—')}</div>
            <div class="ac-meta-item">${t('metaDate')} ${meeting ? t('meetingDateLabel') : t('dueLabel')}: ${fmtDate(a.dueDate)}${meeting && a.meetingTime ? ' — ' + fmtTime(a.meetingTime) : ''}</div>
            ${!meeting && getOwnerName(a) ? `<div class="ac-meta-item">${t('ownerLabel')}: ${ownerTag(a)}${isInternalOwned(a) ? ` · <span style="color:var(--ink-faint)">${t('internalOwnedNote')}</span>` : ''}</div>` : ''}
            ${!meeting && Array.isArray(a.dependsOnIds) && a.dependsOnIds.length > 0 ? `<div class="ac-meta-item">⛓ ${t('blockedByLabel')}: ${a.dependsOnIds.map(did => { const dt = state.actions.find(x=>x.id===did); return `<span class="badge" style="font-size:10px;margin-inline:2px">${escapeHtml(dt ? dt.title : '—')}</span>`; }).join(' ')}</div>` : ''}
            ${meeting && a.participants ? `<div class="ac-meta-item">👥 ${escapeHtml(a.participants)}</div>` : ''}
            ${linkedTask ? `<div class="ac-meta-item">🔗 ${t('linkedToLabel')}: ${escapeHtml(linkedTask.title)}</div>` : ''}
            ${isOpen(a) && delay > 0 ? `<div class="ac-meta-item">${t('metaDelayClock')} ${t('delayLabel')}: ${delay} ${t('days')}</div>` : ''}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-items:flex-start">
          ${statusBadge(a.status)}
          ${priorityBadge(a.priority)}
          ${isOpen(a) && delay > 0 ? `<span class="badge ${risk.cls}">${t('riskColon')} ${risk.label}</span>` : ''}
          ${joinMeetingBtn(a)}
        </div>
      </div>
      ${meeting && a.meetingNotes ? `<div class="ac-reason">🗒 ${escapeHtml(a.meetingNotes)}</div>` : ''}
      ${(() => { if (meeting) return ''; const c = getTaskDelayCause(a); if (c.key === 'dep') return `<div class="ac-reason">⛓ ${escapeHtml(c.label)}</div>`; if (c.key === 'other' && a.note) return `<div class="ac-reason">📝 ${escapeHtml(a.note)}</div>`; return ''; })()}
    </div>
  `;
}

views.report = () => {
  const period = state.filters.reportPeriod || 'today';
  const reportDate = state.filters.reportDate || todayDate();
  const groupBy = state.filters.reportGroupBy || 'status';
  const range = getReportPeriodRange(period, reportDate);
  const includePrevious = !!state.filters.reportIncludePrevious;

  let actions;
  if (period === 'all') {
    actions = [...state.actions];
  } else {
    actions = filterActionsByPeriod(state.actions, period, reportDate);
  }
  // Scheduled/postponed/missed meetings are NOT part of reporting — only conducted (completed) meetings count.
  actions = actions.filter(a => isTask(a) || isCompleted(a));

  // Carried-over: open TASKS whose due date is BEFORE the period starts (meetings never carry over)
  // Only relevant for non-'all' periods, and only when the toggle is on
  let carriedOver = [];
  if (period !== 'all' && includePrevious && range) {
    carriedOver = state.actions
      .filter(a => a.dueDate && a.dueDate < range.start && isOpen(a) && isTask(a))
      .sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
  }

  const completed = actions.filter(isCompleted);
  const open = actions.filter(isOpen);
  // Reports show only CONDUCTED (completed) meetings — scheduled/postponed/missed are excluded.
  const meetings = actions.filter(a => isMeeting(a) && isCompleted(a));
  const openTasks = open.filter(a => !isMeeting(a) && getDelayDays(a) === 0);
  const openTasksDelayed = open.filter(a => !isMeeting(a) && getDelayDays(a) > 0);
  const completedTasks = completed.filter(a => !isMeeting(a));

  // Period label for the header (also picked up by print)
  let periodLabel;
  if (period === 'today') {
    periodLabel = fmtDate(reportDate);
  } else if (period === 'week' || period === 'month' || period === 'range') {
    periodLabel = t('reportRange', fmtDate(range.start), fmtDate(range.end));
  } else {
    periodLabel = t('reportPeriodAll');
  }

  const sortByDue = (a, b) => (a.dueDate || '').localeCompare(b.dueDate || '');

  return `
    <div class="page-head">
      <div>
        <h1 class="page-title">${t('reportSectionNav')}</h1>
        <div class="page-sub">${periodLabel}${includePrevious && carriedOver.length>0 ? ` · +${carriedOver.length} ${t('sectionCarriedOver').replace('📌 ','')}` : ''}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn ghost" onclick="exportCSV()">${t('exportCSV')}</button>
        <button class="btn ghost" onclick="openDailyReportPopup()">${t('exportPDF')}</button>
        <button class="btn" onclick="openDailyReportPopup()">${t('printReport')}</button>
      </div>
    </div>

    <div class="filters no-print">
      <select class="search-input" style="max-width:220px;min-width:180px" onchange="setReportPeriod(this.value)">
        <option value="today" ${period==='today'?'selected':''}>${t('reportPeriodToday')}</option>
        <option value="week" ${period==='week'?'selected':''}>${t('reportPeriodWeek')}</option>
        <option value="month" ${period==='month'?'selected':''}>${t('reportPeriodMonth')}</option>
        <option value="range" ${period==='range'?'selected':''}>${t('reportPeriodRange')}</option>
        <option value="all" ${period==='all'?'selected':''}>${t('reportPeriodAll')}</option>
      </select>
      <select class="search-input" style="max-width:200px;min-width:160px" title="${t('reportGroupByLabel')}" onchange="setReportGroupBy(this.value)">
        <option value="status" ${groupBy==='status'?'selected':''}>${t('groupByStatus')}</option>
        <option value="project" ${groupBy==='project'?'selected':''}>${t('groupByProject')}</option>
        <option value="partner" ${groupBy==='partner'?'selected':''}>${t('groupByPartner')}</option>
      </select>
      ${period === 'range' ? `
        <span style="font-size:12px;color:var(--ink-muted);align-self:center">${t('reportRangeFrom')}</span>
        <input type="date" class="search-input" style="max-width:170px" value="${state.filters.reportRangeStart || ''}" onchange="setReportRangeStart(this.value)">
        <span style="font-size:12px;color:var(--ink-muted);align-self:center">${t('reportRangeTo')}</span>
        <input type="date" class="search-input" style="max-width:170px" value="${state.filters.reportRangeEnd || ''}" onchange="setReportRangeEnd(this.value)">
      ` : ''}
      ${(period !== 'all' && period !== 'range') ? `
        <input type="date" class="search-input" style="max-width:180px" value="${reportDate}" onchange="setReportDate(this.value)">
      ` : ''}
      ${period !== 'all' ? `
        <label class="toggle-chip ${includePrevious?'active':''}" title="${t('carriedOverHint')}">
          <input type="checkbox" ${includePrevious?'checked':''} onchange="toggleIncludePrevious(this.checked)">
          📌 ${t('includePrevious')}
        </label>
      ` : ''}
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">${t('statTotalInPeriod')}</div>
        <div class="stat-value">${actions.length}</div>
      </div>
      <div class="stat good">
        <div class="stat-label">${t('statCompletedInPeriod')}</div>
        <div class="stat-value">${completed.length}</div>
      </div>
      <div class="stat warn">
        <div class="stat-label">${t('statOpenInPeriod')}</div>
        <div class="stat-value">${open.length}</div>
      </div>
      <div class="stat ${meetings.length>0?'':'good'}">
        <div class="stat-label">${t('statMeetingsConducted')}</div>
        <div class="stat-value">${meetings.length}</div>
      </div>
    </div>

    ${carriedOver.length > 0 ? `
      <div class="section">
        <div class="section-head">
          <div class="section-title">${t('sectionCarriedOver')} (${carriedOver.length})<span class="accent-line"></span></div>
          <div style="font-size:11px;color:var(--ink-faint)">${t('carriedOverHint')}</div>
        </div>
        ${carriedOver.map(renderActionCard).join('')}
      </div>
    ` : ''}

    ${actions.length === 0 && carriedOver.length === 0 ? `
      <div class="table-wrap"><div class="empty"><div class="empty-icon">📭</div>${t('noActionsInPeriod')}</div></div>
    ` : actions.length === 0 ? '' : groupBy !== 'status' ? renderReportGrouped(actions, groupBy) : period === 'all' ? renderReportComprehensive(open, completed) : `
      ${meetings.length > 0 ? `
        <div class="section">
          <div class="section-head">
            <div class="section-title">${t('sectionMeetingsConducted')} (${meetings.length})<span class="accent-line"></span></div>
            <div style="font-size:11px;color:var(--ink-faint)">${t('meetingsConductedHint')}</div>
          </div>
          ${meetings.sort(sortByDue).map(m => {
            const lt = m.linkedTaskId ? state.actions.find(x => x.id === m.linkedTaskId && isTask(x)) : null;
            return `<div class="action-card good">
              <div class="ac-head">
                <div>
                  <div class="ac-title">🗓 ${escapeHtml(m.title)}</div>
                  <div class="ac-meta">
                    <div class="ac-meta-item">${t('metaDate')} ${fmtDate(m.completedDate || m.dueDate)}</div>
                    ${m.participants ? `<div class="ac-meta-item">👥 ${escapeHtml(m.participants)}</div>` : ''}
                    <div class="ac-meta-item">🔗 ${lt ? escapeHtml(lt.title) : t('noRelatedTask')}</div>
                  </div>
                </div>
                <div>${statusBadge(m.status)}</div>
              </div>
              ${m.meetingNotes ? `<div class="ac-reason">🗒 ${escapeHtml(m.meetingNotes)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      ` : ''}

      ${openTasksDelayed.length > 0 ? `
        <div class="section">
          <div class="section-head">
            <div class="section-title">${t('sectionTasksMissedInPeriod')} (${openTasksDelayed.length})<span class="accent-line"></span></div>
          </div>
          ${openTasksDelayed.sort((a,b)=>getDelayDays(b)-getDelayDays(a)).map(renderActionCard).join('')}
        </div>
      ` : ''}

      ${openTasks.length > 0 ? `
        <div class="section">
          <div class="section-head">
            <div class="section-title">${t('sectionTasksOpenInPeriod')} (${openTasks.length})<span class="accent-line"></span></div>
          </div>
          ${openTasks.sort(sortByDue).map(renderActionCard).join('')}
        </div>
      ` : ''}

      ${completedTasks.length > 0 ? `
        <div class="section">
          <div class="section-head">
            <div class="section-title">${t('sectionTasksCompletedInPeriod')} (${completedTasks.length})<span class="accent-line"></span></div>
          </div>
          ${completedTasks.sort(sortByDue).map(renderActionCard).join('')}
        </div>
      ` : ''}
    `}
  `;
};

// Group the report's actions by project or partner (project-wise / partner-wise view)
function setReportGroupBy(v) {
  state.filters.reportGroupBy = v;
  render();
}

function renderReportGrouped(actions, groupBy) {
  // Build groups keyed by projectId or partnerId
  const groups = {};
  actions.forEach(a => {
    const key = (groupBy === 'partner' ? a.partnerId : a.projectId) || '__none__';
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  });

  const groupName = (key) => {
    if (key === '__none__') return '—';
    if (groupBy === 'partner') { const p = getPartner(key); return p ? p.name : '—'; }
    const pr = getProject(key); return pr ? pr.name : '—';
  };
  const groupSubName = (key, items) => {
    // secondary line: partner for project groups, or nothing for partner groups
    if (groupBy === 'project') {
      const pr = getProject(key);
      const partner = pr ? getPartner(pr.partnerId) : null;
      return partner ? partner.name : '';
    }
    return '';
  };

  // Order groups: most pending/delayed first
  const orderedKeys = Object.keys(groups).sort((ka, kb) => {
    const a = groups[ka], b = groups[kb];
    const aPend = a.filter(x => isTask(x) && isOpen(x) && getDelayDays(x) > 0).length;
    const bPend = b.filter(x => isTask(x) && isOpen(x) && getDelayDays(x) > 0).length;
    if (aPend !== bPend) return bPend - aPend;
    const aOpen = a.filter(x => isTask(x) && isOpen(x)).length;
    const bOpen = b.filter(x => isTask(x) && isOpen(x)).length;
    if (aOpen !== bOpen) return bOpen - aOpen;
    return groupName(ka).localeCompare(groupName(kb));
  });

  // Within a group, order by urgency: delayed-open tasks, open tasks, meetings, completed
  const orderItems = (items) => {
    const delayedOpen = items.filter(x => isTask(x) && isOpen(x) && getDelayDays(x) > 0)
      .sort((a,b)=>getDelayDays(b)-getDelayDays(a));
    const openOnTime = items.filter(x => isTask(x) && isOpen(x) && getDelayDays(x) === 0)
      .sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
    const mtgs = items.filter(isMeeting).sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
    const done = items.filter(x => isTask(x) && isCompleted(x))
      .sort((a,b)=>(b.completedDate||'').localeCompare(a.completedDate||''));
    const missed = items.filter(x => isTask(x) && isMissed(x));
    return [...delayedOpen, ...openOnTime, ...mtgs, ...done, ...missed];
  };

  return orderedKeys.map(key => {
    const items = groups[key];
    const done = items.filter(x => isTask(x) && isCompleted(x)).length;
    const openCnt = items.filter(x => isTask(x) && isOpen(x)).length;
    const mtgCnt = items.filter(isMeeting).length;
    const sub = groupSubName(key, items);
    return `
      <div class="section report-group">
        <div class="section-head">
          <div class="section-title">
            ${groupBy === 'partner' ? '👤' : '📁'} ${escapeHtml(groupName(key))}
            ${sub ? `<span style="font-size:12px;color:var(--ink-faint);font-weight:400;margin-inline-start:8px">${escapeHtml(sub)}</span>` : ''}
            <span class="accent-line"></span>
          </div>
          <div style="font-size:11px;color:var(--ink-muted)">${t('groupSummaryLine', items.length, done, openCnt, mtgCnt)}</div>
        </div>
        ${orderItems(items).map(renderActionCard).join('')}
      </div>
    `;
  }).join('');
}

// Comprehensive view: keeps the original risk-grouped open-actions display
function renderReportComprehensive(open, completed) {
  const sorted = [...open].sort((a, b) => getDelayDays(b) - getDelayDays(a));
  const byRisk = { critical: [], high: [], medium: [], low: [] };
  sorted.forEach(a => {
    const r = getRiskLevel(getDelayDays(a)).key;
    byRisk[r].push(a);
  });
  const labels = {
    critical: t('riskCriticalGroup'), high: t('riskHighGroup'),
    medium: t('riskMediumGroup'), low: t('riskLowGroup')
  };
  return `

      const list = byRisk[key];
      if (list.length === 0) return '';
      return `
        <div class="section">
          <div class="section-head">
            <div class="section-title">${labels[key]} <span style="color:var(--ink-faint);font-weight:400;font-size:13px;margin-inline-start:6px">(${list.length})</span><span class="accent-line"></span></div>
